function isDispatchPayrollPeriod(d, y, m) {
    if(y==='all'||m==='all') return true; if(!d) return false;
    let p=d.split('-'); if(p.length!==3) return false;
    let rY=parseInt(p[0],10), rM=parseInt(p[1],10), rD=parseInt(p[2],10);
    let tY=parseInt(y,10), tM=parseInt(m,10), pY=tY, pM=tM-1;
    if(pM===0){pM=12; pY-=1;}
    if(rY===pY && rM===pM && rD>=26) return true;
    if(rY===tY && rM===tM && rD<=25) return true;
    return false;
}
function formatTimeInput(e) {
    let v=e.value.replace(/[^0-9]/g,''); if(!v){e.value='';return;}
    if(v.length===1)v='0'+v+'00'; else if(v.length===2)v=v+'00'; else if(v.length===3)v='0'+v; else if(v.length>4)v=v.substring(0,4);

    if(h>23)h=23; if(m>59)m=59;
    e.value=String(h).padStart(2,'0')+':'+String(m).padStart(2,'0');
}

function standardizeData() {
  attendData = (attendData||[]).filter(x=>x).map(x => ({ company: x.company||'', staff: x.staff||'', date: x.date||'', service: x.service||'', remark: x.remark||'', am_s: x.am_s||'', am_e: x.am_e||'', pm_s: x.pm_s||'', pm_e: x.pm_e||'', salary_hours: x.salary_hours!==undefined?x.salary_hours:'', deduct_points: x.deduct_points!==undefined?x.deduct_points:'' }));

  ftStaffData = (ftStaffData||[]).filter(x=>x).map(x => ({ ...x, account: String(x.account||'').trim(), pwd: String(x.pwd||'').trim(), drive: x.drive||'', salary: x.salary||30000, labor: x.labor||0, health: x.health||0, doc_id: !!x.doc_id, doc_bank: !!x.doc_bank, doc_contract: !!x.doc_contract, doc_resume: !!x.doc_resume, hire_date: x.hire_date||'', tel: x.tel||'', id: x.id||'', birthday: x.birthday||'', status: x.status||'在職' }));

  talentData = (talentData||[]).filter(x => x && typeof x === 'object' && String(x.name || '').trim() !== '').map(x => { const ks = Object.keys(x); const gv = (ws) => { for(let k of ks){ let c = String(k).replace(/\s+/g, '').toLowerCase(); for(let w of ws){ if(c.includes(w.toLowerCase())) return x[k]; } } return ''; }; return { ...x, name: String(x.name || gv(['姓名','名字','全名','name'])).trim(), tel: String(x.tel || gv(['電話','手機','號碼','tel','聯絡'])).trim(), source: x.source || gv(['來源','管道'])||'Google表單', location: x.location || gv(['地區','地點','縣市']), shift: x.shift || gv(['班別','時段','時間']), role: x.role || gv(['職務','專業','應徵','職位','感興趣']), status: x.status || gv(['狀態']) || '待聯絡', eval: x.eval || gv(['評價','面試']), resume: x.resume || gv(['履歷','連結','附件']), exp: x.exp || gv(['專長','經歷','備註','經驗']), date: x.date || gv(['時間戳記','日期','時間']) || new Date().toISOString().split('T')[0] }; });

  custData = (custData||[]).filter(x=>x).map(x => ({...x, coop: x.coop||'正合作', name: x.name||''}));
  contractData = (contractData||[]).filter(x=>x).map(x => ({...x, customer: x.customer||''}));
}
function getHours(s,e){ if(!s||!e) return 0; try { let [sh,sm] = s.split(':').map(Number); let [eh,em] = e.split(':').map(Number); let min = (eh*60+em) - (sh*60+sm); if(min < 0) min += 1440; return (min/60).toFixed(1); } catch (e) { return 0; } }
function getItemClockHours(item) { return (+getHours(item.am_s, item.am_e)) + (+getHours(item.pm_s, item.pm_e)); }
function getItemSalaryHours(item) { if (item.salary_hours !== undefined && item.salary_hours !== '') return Number(item.salary_hours); return getItemClockHours(item); }
function getItemDeductPoints(item) { if (item.deduct_points !== undefined && item.deduct_points !== '') return Number(item.deduct_points); return Math.ceil(getItemClockHours(item)); }
function getStaffTotalHours(name) { return attendData.filter(x=>x.staff===name).reduce((s,i)=> s + getItemSalaryHours(i),0); }
function getStaffTieredHourly(name) { const h = getStaffTotalHours(name); if (h<=175) return 210; if (h<=350) return 220; if (h<=525) return 230; if (h<=700) return 240; return 250; }

function loadDataFromCloud(forceRender = false) {
  if (el('sync-status')) updateSyncStatus('<i class="fas fa-spinner fa-spin"></i> 同步...');
  fetch(SCRIPT_URL).then(res => res.json()).then(r => {
      let nA = 0;
      if(r.sysConfig) {
          if(r.sysConfig.adminAcc) { localStorage.setItem('adminAcc', r.sysConfig.adminAcc); if(el('setting_admin_acc')) el('setting_admin_acc').value=r.sysConfig.adminAcc; }
          if(r.sysConfig.adminPwd) { localStorage.setItem('adminPwd', r.sysConfig.adminPwd); if(el('setting_admin_pwd')) el('setting_admin_pwd').value=r.sysConfig.adminPwd; }
          if(r.sysConfig.hrAcc) { localStorage.setItem('hrAcc', r.sysConfig.hrAcc); if(el('setting_hr_acc')) el('setting_hr_acc').value=r.sysConfig.hrAcc; }
          if(r.sysConfig.hrPwd) { localStorage.setItem('hrPwd', r.sysConfig.hrPwd); if(el('setting_hr_pwd')) el('setting_hr_pwd').value=r.sysConfig.hrPwd; }

          if(r.sysConfig.portalConf) { let c = JSON.parse(r.sysConfig.portalConf); portalConf={...defaultPortalConf,...c}; localStorage.setItem('portalConf',JSON.stringify(portalConf)); renderPortalConfigUI(); applyPortalConfigToStaff(); renderServiceTypes(); }
          if(r.sysConfig.loginLogo) { localStorage.setItem('loginLogo', r.sysConfig.loginLogo); loginLogoBase64=r.sysConfig.loginLogo; }
          if(r.sysConfig.pdfLogo) { localStorage.setItem('pdfLogo', r.sysConfig.pdfLogo); pdfLogoBase64=r.sysConfig.pdfLogo; }
          if(r.sysConfig.loginBg) { localStorage.setItem('loginBg', r.sysConfig.loginBg); loginBgBase64=r.sysConfig.loginBg; }
          updateLogoPreview();
      }
      if(!r.talentData) r.talentData=talentData||[]; r.talentData=r.talentData.filter(x=>x&&String(x.name||'').trim()!==''); let pC = r.talentData.length;
      let fm = r['Form_Responses']||r['表單回應 1']||r['表單回應']||r['Form Responses 1'];
      if(fm&&Array.isArray(fm)&&fm.length>0) {
          const hH = String(fm[0][0]).includes('時間')||String(fm[0][1]).includes('姓名')||String(fm[0][1]).includes('全名');
          const dR = hH?fm.slice(1):fm;

// 🚀 終極 PDF 引擎：徹底解決 table 撐破寬度導致裁切的問題！
function exportPDF(title, tgt, isC, fUrl, cHtml) {
  showToast(isC ? '📄 雲端上傳中...' : '📄 PDF 產出中...');
  const wrapper = document.createElement('div');
  // 把隱藏的 wrapper 定位到頂端，設定 750px 寬度，這保證相機能完整對焦
  wrapper.style.cssText = 'width:750px; padding:20px; box-sizing:border-box; background:#fff; color:#333; font-family:"Microsoft JhengHei",sans-serif; position:absolute; top:0; left:-9999px;';
  wrapper.innerHTML = cHtml;
  document.body.appendChild(wrapper);
  const fn = `${tgt}_${title}_${new Date().getTime()}.pdf`;
  const opt = { margin: 10, filename: fn, image: {type:'jpeg', quality:1}, html2canvas: {scale:2, useCORS:true, windowWidth:750}, jsPDF: {unit:'mm', format:'a4', orientation:'portrait'} };
  
  if(isC) {
     if(el('sync-status')) updateSyncStatus('<i class="fas fa-spinner fa-spin"></i> 上傳...');
     html2pdf().set(opt).from(wrapper).outputPdf('datauristring').then(b64 => { 
        document.body.removeChild(wrapper);
        fetch(SCRIPT_URL, { method:'POST', body:JSON.stringify({action:'savePDF',folderUrl:fUrl,fileName:fn,base64Data:b64}) })
        .then(r=>r.json()).then(r=>{ if(r.status==='success'){showToast('🚀 已歸檔'); if(el('sync-status'))updateSyncStatus('<i class="fas fa-cloud"></i> 就緒');} else {showToast('失敗',true); if(el('sync-status'))updateSyncStatus('<i class="fas fa-exclamation-triangle"></i> 失敗',true);} }).catch(e=>{showToast('網路錯誤',true); if(el('sync-status'))updateSyncStatus('<i class="fas fa-exclamation-triangle"></i> 失敗',true);}); 
     });
  } else { 
      html2pdf().set(opt).from(wrapper).save().then(()=>{ document.body.removeChild(wrapper); showToast('✅ 完成！'); }); 
  }
}

function showLeaveInfo() {
    const s = el('fta_staff').value; const p = el('leave-info-panel'); if(!p) return; if(!s || s === 'all' || s === '') { p.style.display = 'none'; return; }
    const st = ftStaffData.find(x => x.name === s); if(!st || !st.hire_date) { el('leave-info-name').textContent=s; el('leave-info-tenure').textContent='無'; el('leave-info-total').textContent='-'; el('leave-info-used').textContent='-'; el('leave-info-remain').textContent='-'; el('leave-info-next').textContent='請先設定'; p.style.display='block'; return; }
    const hd = new Date(st.hire_date), td = new Date(); let m = (td.getFullYear()-hd.getFullYear())*12+(td.getMonth()-hd.getMonth()); if(td.getDate()<hd.getDate()) m--; let y = m/12;
    let ent = 0, nD = new Date(hd), nx = 0, pS = new Date(hd), pE = new Date(hd);
    if(m < 6) { ent=0; nD.setMonth(nD.getMonth()+6); nx=3; pS = new Date(td); pE = new Date(td); } 
    else if (m >= 6 && m < 12) { ent=3; nD.setFullYear(nD.getFullYear()+1); nx=7; pS.setMonth(pS.getMonth()+6); pE.setFullYear(pE.getFullYear()+1); } 
    else { let yF = Math.floor(y); if(yF>=10) { ent=15+yF-9; if(ent>30)ent=30; } else if(yF>=5) ent=15; else if(yF>=3) ent=14; else if(yF>=2) ent=10; else if(yF>=1) ent=7; nD.setFullYear(nD.getFullYear()+yF+1); let nYF = yF+1; if(nYF>=10) { nx=15+nYF-9; if(nx>30)nx=30; } else if(nYF>=5) nx=15; else if(nYF>=3) nx=14; else if(nYF>=2) nx=10; else if(nYF>=1) nx=7; pS.setFullYear(pS.getFullYear()+yF); pE.setFullYear(pE.getFullYear()+yF+1); }
    let uh = 0; if(ent>0) { const sS = pS.toISOString().split('T')[0], eS = pE.toISOString().split('T')[0]; let lv = ftAttendData.filter(x=>x.staff===s&&x.record_type==='請假'&&x.leave_type==='特休假'&&x.date>=sS&&x.date<eS&&x.approval==='已核准'); uh = lv.reduce((s,x)=>s+(Number(x.hours)||0),0); }
    let ud = uh/8, rm = ent-ud;
    el('leave-info-name').textContent = s; el('leave-info-tenure').textContent=`${Math.floor(y)} 年 ${m%12} 個月`; el('leave-info-total').textContent=`${ent} 天`; el('leave-info-used').textContent=`${ud.toFixed(1)} 天`; el('leave-info-remain').textContent=`${rm.toFixed(1)} 天`; el('leave-info-next').textContent=`${nD.toLocaleDateString('zh-TW')}起獲 ${nx} 天`; p.style.display='block';
}

function clearTalentForm(){ document.querySelectorAll('#page-talent .grid input').forEach(i=>i.value=''); el('tp_status').value='待聯絡'; editTalentIndex=-1; el('btnUpdateTalent').style.display='none'; const b=el('btnAddTalent'); if(b) b.style.display='inline-block'; }

function renderPoint(){ const c=el('point_filter_company').value; let l=custData.filter(x=>!c||x.name===c); const {pagedList,total,totalPages}=getPagedData(l,'point'); let h=''; pagedList.forEach(ct=>{ const cP=contractData.filter(x=>x.customer===ct.name).reduce((s,i)=>s+(+i.point||0),0), uP=attendData.filter(x=>x.company===ct.name).reduce((s,i)=>s+getItemDeductPoints(i),0), rP=cP-uP; h+=`<tr><td>${ct.name}</td><td>${cP}</td><td>${uP}</td><td class="${rP<0?'red':'green'}">${rP}</td><td>${rP<0?'不足':'充足'}</td></tr>`; }); el('pointTable').innerHTML=h||'<tr><td colspan=5 style="text-align:center;">無資料</td></tr>'; renderPagination('point',total,totalPages); }
function renderBill(){ const c=el('bill_filter_company').value, y=el('bill_filter_year').value, m=el('bill_filter_month').value; if(!c)return; let l=attendData.filter(x=>x.company===c&&(y==='all'||x.date.startsWith(y))&&(m==='all'||x.date.slice(5,7)===String(m).padStart(2,'0'))); const {pagedList,total,totalPages}=getPagedData(l,'bill'); let h=''; pagedList.forEach(i=>{ h+=`<tr><td>${i.date}</td><td>${i.staff}</td><td>${i.service||'-'}</td><td>${getItemClockHours(i).toFixed(1)}</td><td>${getItemDeductPoints(i)}</td></tr>`; }); el('billTable').innerHTML=h||'<tr><td colspan="5" style="text-align:center;">無資料</td></tr>'; renderPagination('bill',total,totalPages); }

function renderSalary(){ 
    const s=el('sal_filter_staff').value, y=el('sal_filter_year').value, m=el('sal_filter_month').value; 
    let l=attendData.filter(x=>(s==='all'||x.staff===s)&&isDispatchPayrollPeriod(x.date, y, m)); 
    const {pagedList,total,totalPages}=getPagedData(l,'salary'); 
    let h='', tH=0, tA=0; 
    l.forEach(i=>{ const pH=getItemSalaryHours(i); let hy=0; const si=staffData.find(x=>x.name===i.staff); if(si) hy=+si.hourly||getStaffTieredHourly(i.staff); tH+=pH; tA+=Math.round(pH*hy); }); 
    pagedList.forEach(i=>{ const pH=getItemSalaryHours(i); let hy=0; const si=staffData.find(x=>x.name===i.staff); if(si) hy=+si.hourly||getStaffTieredHourly(i.staff); const a=Math.round(pH*hy); h+=`<tr><td>${i.staff}</td><td>${i.date}</td><td>${i.company}</td><td>${i.service||'-'}</td><td>${pH.toFixed(1)}</td><td>${a}</td></tr>`; }); 
    el('salaryTable').innerHTML=h||'<tr><td colspan="6" style="text-align:center;">無資料</td></tr>'; 
    renderPagination('salary',total,totalPages); el('salResult').innerHTML=`工時: ${tH.toFixed(1)} <br> 應付: ${tA} 元`; let lb=0, hl=0; if(s!=='all'){ const si=staffData.find(x=>x.name===s); if(si){ lb=Number(si.labor)||0; hl=Number(si.health)||0; } } el('salLabor').textContent=lb; el('salHealth').textContent=hl; el('salNet').textContent=tA-lb-hl; 
}

function showBoss() {
  const y=el('boss_year').value, m=el('boss_month').value, c=el('boss_cust_filter').value; let h='';
  custData.forEach(ct => {
      if(c&&ct.name!==c) return;
      const cs = contractData.filter(x=>x.customer===ct.name).sort((a,b)=>new Date(b.date)-new Date(a.date));
      const tP = cs.reduce((s,i)=>s+(+i.point||0),0), cD = cs.map(x=>x.date).join('<br>'), cS = cs.length>0?cs[0].status:'-';
      const uH = attendData.filter(x=>x.company===ct.name&&isInPayrollPeriod(x.date,y,m)).reduce((s,i)=>s+getItemSalaryHours(i),0);
      const tUP = attendData.filter(x=>x.company===ct.name).reduce((s,i)=>s+getItemDeductPoints(i),0), rP = tP-tUP;
      h+=`<tr><td>${ct.coop}</td><td>${ct.name}</td><td>${cD||'-'}</td><td>${tP}</td><td>${uH.toFixed(1)} h</td><td class="${rP<0?'red':'green'}">${rP}</td><td>${cS}</td></tr>`;
  }); el('bossTable').innerHTML=h||'<tr><td colspan="7" style="text-align:center;">無資料</td></tr>';
}

function renderDashboard(){
  el('dash_total_cust').textContent=custData.length; el('dash_active_cust').textContent=custData.filter(x=>x.coop==='正合作').length;
  let pG=0, pL=0, aH='';
  custData.forEach(c=>{ const cP=contractData.filter(x=>x.customer===c.name).reduce((s,i)=>s+(+i.point||0),0), uP=attendData.filter(x=>x.company===c.name).reduce((s,i)=>s+getItemDeductPoints(i),0), rP=cP-uP; if(rP>=50) pG++; else { pL++; if(c.coop!=='無合作') aH+=`<tr><td>${c.name}</td><td class="red">${rP} 點</td><td><button class="btn-sm btn-success" onclick="showAdminPage('contract');"><i class="fas fa-file-contract"></i></button></td></tr>`; } });
  el('dash_point_ge50').textContent=pG; el('dash_point_lt50').textContent=pL; el('dash_alert_table').innerHTML=aH||'<tr><td colspan="3" style="text-align:center; color:#999; padding: 15px;">無</td></tr>';
  
  let aS=staffData.filter(x=>x.status==='在職'), aF=ftStaffData.filter(x=>x.status==='在職'), aA=aS.concat(aF);
  el('dash_staff_active').textContent=aA.length; el('dash_miss_id').textContent=aA.filter(x=>!x.doc_id).length; el('dash_miss_bank').textContent=aA.filter(x=>!x.doc_bank).length; el('dash_miss_contract').textContent=aA.filter(x=>!x.doc_contract).length;

  let mH=''; aA.forEach(s=>{ let m=[]; if(!s.doc_id)m.push('<span class="badge badge-red">身分</span>'); if(!s.doc_bank)m.push('<span class="badge badge-red">存摺</span>'); if(!s.doc_contract)m.push('<span class="badge badge-red">合約</span>'); if(!s.doc_resume)m.push('<span class="badge badge-red">履歷</span>'); if(m.length>0){ const iF=ftStaffData.some(x=>x.name===s.name), tg=iF?'<span class="badge badge-blue">正職</span>':'<span class="badge badge-yellow">派遣</span>'; mH+=`<tr><td style="font-weight:bold;color:#444;">${s.name} ${tg}</td><td><div style="display:flex;flex-wrap:wrap;gap:5px;">${m.join('')}</div></td><td><button class="btn-sm btn-warning" onclick="showAdminPage('${iF?'ft_staff':'staff'}'); setTimeout(()=>${iF?'editFtStaff':'editStaff'}(${iF?ftStaffData.findIndex(x=>x.name===s.name):staffData.findIndex(x=>x.name===s.name)}), 300);"><i class="fas fa-edit"></i></button></td></tr>`; } });
  el('dash_missing_docs_table').innerHTML=mH||'<tr><td colspan="3" style="text-align:center; color:#999; padding: 20px;">資料齊全</td></tr>';

  const td=new Date(), tS=td.getFullYear()+'-'+String(td.getMonth()+1).padStart(2,'0')+'-'+String(td.getDate()).padStart(2,'0');
  let tH=''; attendData.filter(x=>x.date===tS).forEach(i=>{ const am=i.am_s&&i.am_e?`${i.am_s}-${i.am_e}`:'', pm=i.pm_s&&i.pm_e?`${i.pm_s}-${i.pm_e}`:''; tH+=`<tr><td>${i.staff}</td><td>${i.company}</td><td>${[am,pm].filter(x=>x).join('/')||'-'}</td></tr>`; });
  el('dash_today_table').innerHTML=tH||'<tr><td colspan="3" style="text-align:center;color:#999;">本日無記錄</td></tr>';
  let bH=''; const cm=td.getMonth()+1; aA.filter(x=>x.birthday&&parseInt(x.birthday.split('-')[1],10)===cm).sort((a,b)=>parseInt(a.birthday.split('-')[2],10)-parseInt(b.birthday.split('-')[2],10)).forEach(i=>{ const iF=ftStaffData.some(x=>x.name===i.name), tg=iF?'<span class="badge badge-blue">正</span>':'<span class="badge badge-yellow">派</span>'; bH+=`<tr><td style="font-weight:bold;">${i.name} ${tg}</td><td>${i.birthday.substring(5)}</td><td><span style="color:#e91e63;"><i class="fas fa-gift"></i></span></td></tr>`; });
  el('dash_birthday_table').innerHTML=bH||'<tr><td colspan="3" style="text-align:center;color:#999;">無</td></tr>';

  let apH=''; let tMs=td.getTime();
  supplierData.forEach((s, idx) => { if(s.pay_date){ let pD=new Date(s.pay_date).getTime(), dD=Math.ceil((pD-tMs)/(1000*60*60*24)); if(dD<=7){ let st=dD<0?`<span class="badge badge-red">逾期 ${Math.abs(dD)} 天</span>`:(dD===0?`<span class="badge badge-red">今日到期</span>`:`<span class="badge badge-yellow">剩 ${dD} 天</span>`); apH+=`<tr><td style="font-weight:bold;">${s.name}</td><td>$${s.invoice_amt||0}</td><td>${s.pay_date}</td><td>${st}</td><td><button class="btn-sm btn-warning" onclick="showAdminPage('supplier'); setTimeout(()=>editSupplier(${idx}),300)"><i class="fas fa-eye"></i></button></td></tr>`; } } });
  el('dash_ap_table').innerHTML=apH||'<tr><td colspan="5" style="text-align:center; color:#999; padding: 15px;">無</td></tr>';
}

function initStaffFrontend() {
    if(!currentLoginStaff) return;
    if(el('staff-welcome-name')) el('staff-welcome-name').textContent=currentLoginStaff.name||''; if(el('staff-profile-name')) el('staff-profile-name').textContent=currentLoginStaff.name||'-'; if(el('staff-profile-tel')) el('staff-profile-tel').textContent=currentLoginStaff.tel||'-'; if(el('staff-profile-id')) el('staff-profile-id').textContent=currentLoginStaff.id||'-'; if(el('staff-profile-acc')) el('staff-profile-acc').textContent=currentLoginStaff.account||'-';
    if(el('staff_status_id')) el('staff_status_id').innerHTML=currentLoginStaff.doc_id?'<span class="badge badge-green">已繳</span>':'<span class="badge badge-red">缺件</span>'; if(el('staff_status_bank')) el('staff_status_bank').innerHTML=currentLoginStaff.doc_bank?'<span class="badge badge-green">已繳</span>':'<span class="badge badge-red">缺件</span>'; if(el('staff_status_contract')) el('staff_status_contract').innerHTML=currentLoginStaff.doc_contract?'<span class="badge badge-green">已繳</span>':'<span class="badge badge-red">缺件</span>'; if(el('staff_status_resume')) el('staff_status_resume').innerHTML=currentLoginStaff.doc_resume?'<span class="badge badge-green">已繳</span>':'<span class="badge badge-red">缺件</span>';
    renderStaffRecords(); renderStaffMyPayFilters(); renderStaffMyPay();
}

function showStaffPage(p,a) { document.querySelectorAll('#staff-screen .page').forEach(x=>x.classList.remove('active')); const t=el('staff-page-'+p); if(t)t.classList.add('active'); document.querySelectorAll('#staff-screen .sidebar-nav a').forEach(x=>x.classList.remove('active')); if(a)a.classList.add('active'); localStorage.setItem('staffPage',p); }
function renderStaffRecords() { if(!el('staffRecordsTable')||!currentLoginStaff)return; let h=''; attendData.filter(x=>x.staff===currentLoginStaff.name).sort((a,b)=>new Date(b.date)-new Date(a.date)).forEach(i=>{h+=`<tr><td>${i.date}</td><td>${i.company}</td><td>${i.service||'-'}</td><td>${getItemSalaryHours(i)}</td><td>${i.remark||'-'}</td></tr>`;}); el('staffRecordsTable').innerHTML=h||'<tr><td colspan="5" style="text-align:center;">無</td></tr>'; }
function renderStaffMyPayFilters() { if(!el('staff_my_year')||!el('staff_my_month'))return; const y=new Date().getFullYear(); let yr=''; for(let i=y-1;i<=y;i++)yr+=`<option value="${i}">${i}</option>`; el('staff_my_year').innerHTML=yr; el('staff_my_year').value=y; let mh=''; for(let i=1;i<=12;i++)mh+=`<option value="${i}">${i}月</option>`; el('staff_my_month').innerHTML=mh; el('staff_my_month').value=new Date().getMonth()+1; }
function renderStaffMyPay() { if(!el('staffMyPayTable')||!currentLoginStaff)return; const y=el('staff_my_year').value, m=el('staff_my_month').value; let h=''; attendData.filter(x=>x.staff===currentLoginStaff.name&&isDispatchPayrollPeriod(x.date,y,m)).forEach(i=>{h+=`<tr><td>${i.date}</td><td>${i.company}</td><td>${i.service||'-'}</td><td>${getItemSalaryHours(i)}</td></tr>`;}); el('staffMyPayTable').innerHTML=h||'<tr><td colspan="4" style="text-align:center;">無</td></tr>'; }
function staffDownloadPayslip() { if(!currentLoginStaff)return; const iF=ftStaffData.some(x=>x.name===currentLoginStaff.name); if(iF){el('fts_filter_staff').value=currentLoginStaff.name; const y=el('staff_my_year').value, m=el('staff_my_month').value; el('fts_filter_month').value=`${y}-${String(m).padStart(2,'0')}`; generateFtPayslipPDF(false);} else{el('sal_filter_staff').value=currentLoginStaff.name; el('sal_filter_year').value=el('staff_my_year').value; el('sal_filter_month').value=el('staff_my_month').value; generatePayslipPDF(false);} }
function openStaffDrive() { if(currentLoginStaff&&currentLoginStaff.drive) window.open(currentLoginStaff.drive,'_blank'); else showToast('無資料夾',true); }
</script>
