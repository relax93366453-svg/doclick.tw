<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>愜易居客戶及派遣管理系統</title>
    
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* 基礎設定 */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Microsoft JhengHei', sans-serif; }
        body { background: #f4f7fb; color: #334155; line-height: 1.6; transition: background-color 0.4s ease; }
        
        /* 滾動條美化 */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        
        /* 登入畫面 */
        #login-screen {
            display: flex; justify-content: center; align-items: center; height: 100vh;
            background: url('https://images.unsplash.com/photo-1560250097-0b93528c311a?q=80&w=2069&auto=format&fit=crop') center/cover no-repeat;
            background-color: #1e293b; position: fixed; top: 0; left: 0; width: 100%; z-index: 9998;
        }
        #login-screen::before { content: ''; position: absolute; inset: 0; background: rgba(15,23,42,.65); }
        
        .login-box {
            background: rgba(255,255,255,.85); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,.5);
            padding: 45px 40px; border-radius: 16px; box-shadow: 0 25px 50px -12px rgba(0,0,0,.5);
            width: 100%; max-width: 420px; text-align: center; position: relative; z-index: 1; border-top: 6px solid #2d9d5c;
        }
        .login-logo-container { margin-bottom: 20px; height: 80px; display: flex; justify-content: center; align-items: center; }
        .login-logo-container img { max-width: 100%; max-height: 100%; object-fit: contain; display: none; }
        #login-logo-icon { font-size: 50px; color: #2d9d5c; }
        .login-box h1 { color: #1e293b; margin-bottom: 5px; font-size: 24px; font-weight: 900; }
        .pro-badge { display: inline-block; background: linear-gradient(135deg,#f59e0b,#d97706); color: white; padding: 5px 14px; border-radius: 20px; font-size: 12px; font-weight: bold; margin-bottom: 25px; }
        
        .login-field { margin-bottom: 18px; text-align: left; }
        .login-field label { display: block; margin-bottom: 6px; font-weight: 700; color: #475569; font-size: 13px; }
        .login-field input, .login-field select { width: 100%; padding: 14px 16px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 15px; outline: none; }
        .btn-login { width: 100%; padding: 16px; background: linear-gradient(135deg,#2d9d5c,#15803d); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        /* 系統框架 */
        .app-container, .staff-container { display: none; min-height: 100vh; }
        .sidebar { width: 240px; background-color: #fff; box-shadow: 2px 0 15px rgba(0,0,0,.03); padding: 20px 0; position: fixed; height: 100vh; overflow-y: auto; z-index: 10; border-right: 1px solid #e2e8f0; }
        .sidebar-header { padding: 0 20px 20px; border-bottom: 1px solid #f1f5f9; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .sidebar-header img { max-height: 40px; margin-bottom: 10px; display: none; }
        .sidebar-header h1 { font-size: 16px; color: #2d9d5c; font-weight: 800; display: flex; align-items: center; gap: 8px; margin: 0; }
        .sidebar-nav { list-style: none; padding: 0 10px; }
        .sidebar-nav li { margin: 4px 0; }
        .sidebar-nav a { display: flex; align-items: center; gap: 12px; padding: 12px 15px; color: #64748b; text-decoration: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .sidebar-nav a:hover, .sidebar-nav a.active { background-color: #ecfdf5; color: #2d9d5c; }
        
        .main-content { flex: 1; margin-left: 240px; padding: 25px 35px; width: calc(100% - 240px); overflow-x: auto; }
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .header-actions { display: flex; align-items: center; gap: 15px; }
        .sys-time { font-size: 14px; font-weight: 700; color: #334155; background: #fff; padding: 8px 16px; border-radius: 8px; border: 1px solid #cbd5e1; }
        #sync-status { font-size: 13px; font-weight: 700; padding: 8px 14px; border-radius: 8px; background: #f1f5f9; border: 1px solid #e2e8f0; }
        .switch-role-btn { background: #fff; color: #3b82f6; border: 1px solid #e2e8f0; padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; }
        
        /* 頁面內容 */
        .page { display: none; background: #fff; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,.05); padding: 30px; margin-bottom: 20px; border: 1px solid #f1f5f9; }
        .page.active { display: block; }
        .page-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid #f1f5f9; display: flex; align-items: center; gap: 10px; }
        
        .filter-bar { background: #f8fafc; padding: 15px 20px; border-radius: 8px; margin-bottom: 20px; display: flex; gap: 15px; align-items: center; border: 1px solid #e2e8f0; flex-wrap: wrap; }
        .filter-bar label { font-size: 14px; font-weight: 600; }
        .filter-bar select, .filter-bar input { padding: 8px 12px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 14px; }
        
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 25px; }
        .grid div { display: flex; flex-direction: column; }
        .grid label { margin-bottom: 6px; font-weight: 600; font-size: 13px; color: #475569; }
        .grid input, .grid select { padding: 10px 12px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 14px; }
        
        .checkbox-group { display: flex; gap: 15px; align-items: center; background: #fff; padding: 10px 15px; border: 1px solid #cbd5e1; border-radius: 6px; }
        
        button.btn { padding: 10px 18px; border: none; border-radius: 6px; cursor: pointer; margin-right: 10px; margin-bottom: 10px; font-size: 13px; font-weight: 600; color: #fff; }
        .btn-success { background: #10b981; }
        .btn-warning { background: #f59e0b; }
        .btn-excel { background: #3b82f6; }
        .btn-pdf { background: #ef4444; }
        .btn-backup { background: #8b5cf6; }
        .btn-restore { background: #06b6d4; }
        .btn-sync { background: #0ea5e9; }
        .btn-sm { padding: 6px 12px; font-size: 12px; margin-bottom: 0; }
        
        .btn-clear-filter { background: #94a3b8 !important; color: white !important; margin-left: 8px !important; margin-bottom: 0 !important; padding: 8px 12px !important; font-size: 13px !important; display: inline-flex; align-items: center; gap: 5px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; }
        .btn-clear-filter:hover { background: #64748b !important; }
        
        table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 800px; background: #fff; }
        table th { padding: 14px 12px; background: #f8fafc; font-weight: 700; text-align: left; border-bottom: 2px solid #e2e8f0; }

        .badge-red { background: #fee2e2; color: #991b1b; }
        .badge-blue { background: #dbeafe; color: #075985; }
        .badge-yellow { background: #fef3c7; color: #92400e; }
        
        .pagination { margin-top: 20px; display: flex; gap: 8px; justify-content: flex-end; }
        .pagination button { padding: 8px 14px; border: 1px solid #cbd5e1; background: #fff; cursor: pointer; border-radius: 6px; }
        
        .dashboard-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .dash-card { background: #fff; border-radius: 12px; padding: 25px 20px; border: 1px solid #f1f5f9; position: relative; }
        .dash-card.primary { border-top: 4px solid #3b82f6; }
        .dash-card.success { border-top: 4px solid #10b981; }
        .dash-card.danger { border-top: 4px solid #ef4444; }
        .dash-icon { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); font-size: 45px; opacity: .08; }
        .dash-card .label { font-size: 14px; font-weight: 700; color: #64748b; margin-bottom: 8px; }
        .dash-card .num { font-size: 36px; font-weight: 800; color: #1e293b; }
        
        #toast { display: none; position: fixed; top: 30px; right: 30px; background: #10b981; color: #fff; padding: 15px 25px; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,.5); z-index: 1000000; font-weight: bold; font-size: 16px; }
        
        #preview-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 99999; overflow-y: auto; padding: 20px; }
        #preview-header-bar { background: #fff; padding: 15px 25px; border-radius: 8px; margin: 0 auto 20px auto; max-width: 850px; display: flex; justify-content: space-between; align-items: center; }
        #preview-body { max-width: 850px; margin: 0 auto; padding-bottom: 40px; }
        .pdf-box { width: 100%; max-width: 794px; margin: 0 auto; background: #fff; padding: 35px; color: #333; font-family: 'Microsoft JhengHei', sans-serif; text-align: left; box-shadow: 0 5px 15px rgba(0,0,0,0.3); -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        .pdf-box table { min-width: 0 !important; }
        
        .section-divider { grid-column: span 4; margin-top: 15px; margin-bottom: 5px; padding-bottom: 8px; border-bottom: 2px solid #e2e8f0; color: #1e293b; font-weight: 800; font-size: 15px; display: flex; align-items: center; gap: 8px; }
        
        /* 權限顯示控制 (解決廣告阻擋器誤殺問題) */
        .workspace-business .ws-hr, .workspace-business .ws-sales { display: none !important; }
        .workspace-hr .ws-business, .workspace-hr .ws-sales { display: none !important; }
        .workspace-sales .ws-business, .workspace-sales .ws-hr { display: none !important; }
        .sys-auth { display: none; } /* 已經替換掉所有被阻擋的 admin-only */
        
        /* 手機版 RWD 響應式排版 */
        #mobile-menu-btn { display: none; background: linear-gradient(135deg, #3b82f6, #2563eb); color: white; border: none; padding: 12px 20px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; width: 100%; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        @media (max-width: 768px) {
            .sidebar { left: -260px; transition: 0.3s all ease; z-index: 9999; }
            .sidebar.open { left: 0; box-shadow: 10px 0 25px rgba(0,0,0,0.3); }
            .main-content { margin-left: 0 !important; width: 100% !important; padding: 15px !important; }
            .grid, .dashboard-grid, #fta_time_block { grid-template-columns: 1fr !important; }
            .page-header { flex-direction: column; align-items: flex-start; gap: 10px; }
            .header-actions { flex-wrap: wrap; justify-content: flex-start; width: 100%; }
            .filter-bar { flex-direction: column; align-items: stretch; }
            .filter-bar select, .filter-bar input { width: 100%; margin-bottom: 5px; }
            #mobile-menu-btn { display: block; }
            .quick-actions button { flex: 1 1 100%; margin-bottom: 10px !important; }
            table { min-width: 800px; }
            .table-responsive { overflow-x: auto; width: 100%; -webkit-overflow-scrolling: touch; border: 1px solid #e2e8f0; border-radius: 8px; }
        }
    </style>
</head>

const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbywZSMycd8za6Nllo9F0jkGuygqalO8N6AKX20bNXR1RWCXEGU5BGHMlpet-fo-oPJY-Q/exec';
const el = id => document.getElementById(id);

function showToast(m, err = false) { 
    const t = el('toast'); 
    if(!t) return; 
    t.style.background = err ? '#ef4444' : '#10b981'; 
    t.innerHTML = m; 
    t.style.display = 'block'; 
    t.style.opacity = '1'; 
    setTimeout(() => {
        t.style.opacity = '0'; 
        setTimeout(() => t.style.display = 'none', 300);
    }, 3500); 
}

function updateSyncStatus(m, err = false) { 
    const e = el('sync-status'); 
    if(!e) return; 
    e.innerHTML = m; 
    e.style.backgroundColor = err ? '#fee2e2' : '#f1f5f9'; 
    e.style.color = err ? '#dc2626' : '#475569'; 
}

function safeJSONParse(k, f) { 
    try { 
        const v = localStorage.getItem(k); 
        return v ? JSON.parse(v) : f; 
    } catch(e) { 
        return f; 
    } 
}

function isDispatchPayrollPeriod(d, y, m, cycle = '26') { 
    if(y === 'all' || m === 'all' || !y || !m) return true; 
    if(!d) return false; 
    let p = d.split('-'); 
    if(p.length !== 3) return false;
    let rY = parseInt(p[0], 10), rM = parseInt(p[1], 10), rD = parseInt(p[2], 10); 
    let tY = parseInt(y, 10), tM = parseInt(m, 10);
    if(cycle === '1') { 
        return rY === tY && rM === tM; 
    } else {
        let pY = tY, pM = tM - 1; 
        if(pM === 0) { pM = 12; pY -= 1; } 
        if(rY === pY && rM === pM && rD >= 26) return true; 
        if(rY === tY && rM === tM && rD <= 25) return true;
        return false;
    }
}

function toggleBillManualDate() {
    const cycle = el('bill_cycle').value;
    const mDates = el('bill_manual_dates');
    const ymLabels = document.querySelectorAll('.bill-ym-label');
    if(cycle === 'manual') { 
        mDates.style.display = 'flex'; 
        ymLabels.forEach(e => e.style.display = 'none'); 
    } else { 
        mDates.style.display = 'none'; 
        ymLabels.forEach(e => e.style.display = 'inline-block'); 
    }
}

function toRocDate(d) { return d || '-'; }

function formatTimeInput(e) { 
    let v = e.value.replace(/[^0-9]/g,''); 
    if(!v){ e.value = ''; return; } 
    if(v.length === 1) v = '0' + v + '00'; 
    else if(v.length === 2) v = v + '00'; 
    else if(v.length === 3) v = '0' + v; 
    else if(v.length > 4) v = v.substring(0,4); 
    
    let h = parseInt(v.substring(0,2)), m = parseInt(v.substring(2,4)); 
    if(h > 23) h = 23; 
    if(m > 59) m = 59; 
    e.value = String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0'); 
}

// 變數庫初始化
let custData = safeJSONParse('custData',[]);

function setupGlobalNavigation() { 
    document.addEventListener('keydown', (e) => { 
        const activePage = document.querySelector('.page.active'); 
        if (!activePage) return; 
        const target = e.target; 
        if (!target.matches('.grid input:not([readonly]):not([type="checkbox"]), .grid select, .grid textarea')) return; 
        
        const inputs = Array.from(activePage.querySelectorAll('.grid input:not([readonly]):not([type="checkbox"]), .grid select, .grid textarea')); 
        const idx = inputs.indexOf(target); 
        if (idx === -1) return; 
        
        const isDate = target.type === 'date'; 
        const isSelect = target.tagName === 'SELECT'; 
        const canSelect = ['text', 'password', 'search', 'tel', 'url'].includes(target.type) || !target.type; 
        
        if (e.key === 'Enter') { 
            e.preventDefault(); 
            if (idx === inputs.length - 1) { 
                const saveBtn = activePage.querySelector('.btn-success[id^="btnAdd"]'); 
                if (saveBtn && saveBtn.style.display !== 'none') { saveBtn.click(); return; } 
                const updateBtn = activePage.querySelector('.btn-warning[id^="btnUpdate"]'); 
                if (updateBtn && updateBtn.style.display !== 'none') { updateBtn.click(); return; } 
            } else { 
                const nextEl = inputs[idx + 1]; 
                if (nextEl) { nextEl.focus(); if (canSelect && nextEl.select) nextEl.select(); } 
            } 
        } else if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { 
            if (isSelect) return; 
            if (isDate && e.key === 'ArrowRight') return; 
            if (e.key === 'ArrowRight' && target.tagName === 'INPUT' && canSelect && target.selectionEnd !== null && target.selectionEnd < target.value.length) return; 
            e.preventDefault(); 
            const nextEl = inputs[idx + 1]; 
            if (nextEl) { nextEl.focus(); if (['text', 'password', 'search', 'tel', 'url'].includes(nextEl.type) || !nextEl.type) nextEl.select(); } 
        } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { 
            if (isSelect) return; 
            if (isDate && e.key === 'ArrowLeft') return; 
            if (e.key === 'ArrowLeft' && target.tagName === 'INPUT' && canSelect && target.selectionStart !== null && target.selectionStart > 0) return; 
            e.preventDefault(); 
            const prevEl = inputs[idx - 1]; 
            if (prevEl) { prevEl.focus(); if (['text', 'password', 'search', 'tel', 'url'].includes(prevEl.type) || !prevEl.type) prevEl.select(); } 
        } 
    }); 
}

function handleLogin() {
    const role = el('login_role').value, acc = el('login_acc').value.trim(), pwd = el('login_pwd').value.trim();
    if(!acc || !pwd) return showToast('請輸入帳密', true);
    
    const sAA = localStorage.getItem('adminAcc') || 'admin';
    const sAP = localStorage.getItem('adminPwd') || '1234';
    const sHA = localStorage.getItem('hrAcc') || 'hr';
    const sHP = localStorage.getItem('hrPwd') || '1234';
    const sSA = localStorage.getItem('salesAcc') || 'sales';
    const sSP = localStorage.getItem('salesPwd') || '1234';
    
    if (role === 'admin') {
        if ((acc === sAA && pwd === sAP) || (acc === 'admin' && pwd === 'doclick888')) { 
            localStorage.setItem('loginRole','admin'); localStorage.setItem('sysRole','admin'); localStorage.setItem('workspace','business'); 
            restoreLoginState(); showToast('登入成功'); 
        } 
        else if ((acc === sHA && pwd === sHP) || (acc === 'hr' && pwd === 'doclick888')) { 
            localStorage.setItem('loginRole','admin'); localStorage.setItem('sysRole','hr'); localStorage.setItem('workspace','hr'); 
            restoreLoginState(); showToast('登入成功'); 
        } 
        else if ((acc === sSA && pwd === sSP) || (acc === 'sales' && pwd === 'doclick888')) { 
            localStorage.setItem('loginRole','admin'); localStorage.setItem('sysRole','sales'); localStorage.setItem('workspace','sales'); 
            restoreLoginState(); showToast('登入成功'); 
        } 
        else {
            showToast('帳密錯誤', true);
        }
    } else {
        const s = staffData.find(x => x && String(x.account||'').trim() === acc && String(x.pwd||'').trim() === pwd);
        const fs = ftStaffData.find(x => x && String(x.account||'').trim() === acc && String(x.pwd||'').trim() === pwd);
        if(s || fs) { 
            currentLoginStaff = s || fs; 
            localStorage.setItem('loginRole','staff'); 
            localStorage.setItem('loginAcc',acc); 
            restoreLoginState(); 
            showToast('登入成功'); 
        } else {
            showToast('帳密錯誤', true);
        }
    }
}

function restoreLoginState() {

        const r = localStorage.getItem('loginRole'), a = localStorage.getItem('loginAcc');

            el('login-screen').style.display='flex'; 
            el('sys-screen').style.display='none'; 
            el('staff-screen').style.display='none'; 
            return; 
        }
        el('login-screen').style.display='none';
        
        if(r === 'admin') {
            const sc = el('sys-screen'); 
            sc.style.display='flex'; 
            el('staff-screen').style.display='none';
            let sysRole = localStorage.getItem('sysRole') || 'admin';
            
            if(sysRole === 'hr') { 
                currentWorkspace = 'hr'; localStorage.setItem('workspace', 'hr'); 
                if(el('workspace-toggle-btn')) el('workspace-toggle-btn').style.display='none'; 
            }
            else if(sysRole === 'sales') { 
                currentWorkspace = 'sales'; localStorage.setItem('workspace', 'sales'); 
                if(el('workspace-toggle-btn')) el('workspace-toggle-btn').style.display='none'; 
            }
            else { 
                currentWorkspace = localStorage.getItem('workspace')||'business'; 
                if(el('workspace-toggle-btn')) el('workspace-toggle-btn').style.display='inline-block'; 
            }

            sc.classList.remove('workspace-business', 'workspace-hr', 'workspace-sales', 'mode-hr');
            if(el('sys-sidebar-title-business')) el('sys-sidebar-title-business').style.display='none';
            if(el('sys-sidebar-title-hr')) el('sys-sidebar-title-hr').style.display='none';
            if(el('sys-sidebar-title-sales')) el('sys-sidebar-title-sales').style.display='none';

            if(currentWorkspace === 'hr') { 
                sc.classList.add('workspace-hr','mode-hr'); 
                if(el('sys-sidebar-title-hr')) el('sys-sidebar-title-hr').style.display='flex'; 
                if(sysRole === 'admin' && el('workspace-toggle-btn')) el('workspace-toggle-btn').innerHTML='<i class="fas fa-exchange-alt"></i> 切換至業務區'; 
                document.body.style.backgroundColor = '#f0fdfa';

                sc.classList.add('workspace-sales'); 
                if(el('sys-sidebar-title-sales')) el('sys-sidebar-title-sales').style.display='flex'; 
                if(sysRole === 'admin' && el('workspace-toggle-btn')) el('workspace-toggle-btn').innerHTML='<i class="fas fa-exchange-alt"></i> 切換至營業區'; 
                document.body.style.backgroundColor = '#f5f3ff'; 
            }
            else { 
                sc.classList.add('workspace-business'); 
                if(el('sys-sidebar-title-business')) el('sys-sidebar-title-business').style.display='flex'; 
                if(sysRole === 'admin' && el('workspace-toggle-btn')) el('workspace-toggle-btn').innerHTML='<i class="fas fa-exchange-alt"></i> 切換至人事區'; 
                document.body.style.backgroundColor = '#f4f7fb'; 
            }
            
            fillFilters(); 
            showAdminPage(localStorage.getItem('adminPage')||'dashboard');
            
        } else if(r === 'staff') {
            el('staff-screen').style.display='flex'; 
            el('sys-screen').style.display='none';
            
            if(!currentLoginStaff) {
                currentLoginStaff = staffData.find(x => x && String(x.account||'').trim() === String(a||'').trim()) 
                                 || ftStaffData.find(x => x && String(x.account||'').trim() === String(a||'').trim());
            }
            initStaffFrontend(); 
            showStaffPage(localStorage.getItem('staffPage')||'home');
        }
    } catch(e) { 
        console.error(e); el('login-screen').style.display='flex'; 
    }

function getHours(s,e) {
    if(!s||!e) return 0;
    try{
        let[sh,sm]=s.split(':').map(Number);
        let[eh,em]=e.split(':').map(Number);
        let min=(eh*60+em)-(sh*60+sm);
        if(min<0) min+=1440;
        return(min/60).toFixed(1);
    } catch(e) { return 0; }
}

function getItemClockHours(item) { return (+getHours(item.am_s,item.am_e))+(+getHours(item.pm_s,item.pm_e)); }
function getItemSalaryHours(item) { if(item.salary_hours!==undefined&&item.salary_hours!=='') return Number(item.salary_hours); return getItemClockHours(item); }
function getItemDeductPoints(item) { if(item.deduct_points!==undefined&&item.deduct_points!=='') return Number(item.deduct_points); return Number(getItemClockHours(item)); }
function getStaffTotalHours(name) { return attendData.filter(x=>x.staff===name).reduce((s,i)=>s+getItemSalaryHours(i),0); }

function getStaffCurrentHourlyInfo(name) {
    const si = staffData.find(x=>x.name===name);
    if(!si) return {wage:210, nextTier:null, nextWage:null, hours:0, rule:'未知'};
    const h = getStaffTotalHours(name); 
    const rule = si.salary_rule||'114年標準'; 
    const agreed = (si.remark||'').includes('已同意調薪');
    
    let w=Number(si.hourly)||0, nt=null, nw=null;
    
    if(rule.includes('自訂') || rule.includes('接案')){ w=Number(si.hourly)||0; return {wage:w, nextTier:'FIXED', nextWage:null, hours:h, rule:rule}; }
    
    if(rule.includes('114年標準') || rule.includes('標準階梯')){ 
        if(h<=175){w=210;nt=176;nw=220;}
        else if(h<=350){w=220;nt=351;nw=230;}
        else if(h<=525){w=230;nt=526;nw=240;}
        else if(h<=700){w=240;nt=701;nw=agreed?250:'250(需備註同意)';}
        else{w=agreed?250:240; if(!agreed){nt=701;nw='250(需備註同意)';}}
    }
    else if(rule.includes('早期約') || rule.includes('245起跳')){ 
        if(h<=700){w=245;nt=701;nw=agreed?250:'250(需備註同意)';}
        else{w=agreed?250:245; if(!agreed){nt=701;nw='250(需備註同意)';}}
    }
    else if(rule.includes('固定205')){ 
        if(h<=350){w=205;nt=351;nw=220;}
        else if(h<=700){w=220;nt=701;nw=agreed?250:'250(需備註同意)';}
        else{w=agreed?250:220; if(!agreed){nt=701;nw='250(需備註同意)';}}
    }
    else if(rule.includes('固定220')){ 
        if(h<=350){w=220;nt=351;nw=245;}
        else if(h<=700){w=245;nt=701;nw=agreed?250:'250(需備註同意)';}
        else{w=agreed?250:245; if(!agreed){nt=701;nw='250(需備註同意)';}}
    }
    else if(rule.includes('特殊225')){ 
        if(h<=350){w=225;nt=351;nw=245;}
        else if(h<=700){w=245;nt=701;nw=agreed?250:'250(需備註同意)';}
        else{w=agreed?250:245; if(!agreed){nt=701;nw='250(需備註同意)';}} 
    }
    if(w===0) w=210; 
    return {wage:w, nextTier:nt, nextWage:nw, hours:h, rule:rule};
}

function getHistoricalRate(item) {
    if(item.special_hourly) return Number(item.special_hourly);
    const si = staffData.find(x=>x.name===item.staff); 
    if(!si) return 210;
    
    let staffRecords = attendData.map((r, i) => ({ record: r, idx: i })).filter(r => r.record.staff === item.staff).sort((a, b) => new Date(a.record.date) - new Date(b.record.date) || a.idx - b.idx);
    
    let h = 0; 
    for (let sr of staffRecords) { 
        h += getItemSalaryHours(sr.record); 
        h = Math.round(h * 10) / 10; 
        if (sr.record === item) break; 
    }
    
    const rule = si.salary_rule || '114年標準'; 
    const agreed = (si.remark||'').includes('已同意調薪'); 
    let w = Number(si.hourly)||0;
    
    if(rule.includes('自訂') || rule.includes('接案')) return w;
    if(rule.includes('114年標準') || rule.includes('標準階梯')){ if(h<=175) w=210; else if(h<=350) w=220; else if(h<=525) w=230; else if(h<=700) w=240; else w=agreed?250:240; }
    else if(rule.includes('早期約') || rule.includes('245起跳')){ if(h<=700) w=245; else w=agreed?250:245; }
    else if(rule.includes('固定205')){ if(h<=350) w=205; else if(h<=700) w=220; else w=agreed?250:220; }
    else if(rule.includes('固定220')){ if(h<=350) w=220; else if(h<=700) w=245; else w=agreed?250:245; }
    else if(rule.includes('特殊225')){ if(h<=350) w=225; else if(h<=700) w=245; else w=agreed?250:245; }
    
    if(w===0) w=210; 
    return w;
}

function autoFillSplitWithTime(h1, rate1, h2) {
    const c = el('attend_company').value, s = el('attend_staff').value, d = el('attend_date').value, srv = el('attend_service').value;
    const amS = el('am_s').value, amE = el('am_e').value, pmS = el('pm_s').value, pmE = el('pm_e').value;
    
    if(!c || !s || !d || (!amS && !pmS)) { 
        alert('請確認公司、人員、日期與至少一段上班時間都有填寫！'); 
        return; 
    }
    
    function addHoursToTime(timeStr, hours) { 
        if(!timeStr) return ''; 
        let [h, m] = timeStr.split(':').map(Number); 
        let totalMinutes = h * 60 + m + Math.round(hours * 60); 
        let nh = Math.floor(totalMinutes / 60) % 24; 
        let nm = totalMinutes % 60; 
        return String(nh).padStart(2,'0') + ":" + String(nm).padStart(2,'0'); 
    }
    
    let amHrs = amS && amE ? getHours(amS, amE) : 0;
    let r1 = { company:c, staff:s, date:d, service:srv, am_s:'', am_e:'', pm_s:'', pm_e:'', salary_hours:h1, project_fee:0, deduct_points:h1, special_hourly:rate1, remark:'跨階前(自動時間拆分)' };
    let r2 = { company:c, staff:s, date:d, service:srv, am_s:'', am_e:'', pm_s:'', pm_e:'', salary_hours:h2, project_fee:0, deduct_points:h2, special_hourly:'', remark:'升級後(自動時間拆分)' };
    
    if (h1 <= amHrs) { 
        r1.am_s = amS; r1.am_e = addHoursToTime(amS, h1); 
        r2.am_s = r1.am_e; r2.am_e = amE; r2.pm_s = pmS; r2.pm_e = pmE; 
    } else { 
        r1.am_s = amS; r1.am_e = amE; 
        let diff = h1 - amHrs; 
        r1.pm_s = pmS; r1.pm_e = addHoursToTime(pmS, diff); 
        r2.pm_s = r1.pm_e; r2.pm_e = pmE; 
    }
    
    if (editAttendIndex > -1) { 
        attendData[editAttendIndex] = {...attendData[editAttendIndex], ...r1}; 
        attendData.push(r2); 
        editAttendIndex = -1; 
    } else { 
        attendData.push(r1); 
        attendData.push(r2); 
    }
    saveAll(); 
    renderAttend(); 
    clearAttendForm(); 
    alert(`✅ 魔法時間拆單完成！`);
}

            tr += `<td>${it.name}(${parseFloat(it.hrs.toFixed(1))}H)</td><td>${parseFloat(it.hrs.toFixed(1))}</td><td>${it.rate}</td><td>${parseFloat(it.amt.toFixed(1))}</td>`; 
            if(idx === 0) tr += `<td rowspan="${rs}">${parseFloat(s.tAmt.toFixed(1))}</td><td rowspan="${rs}">${s.l}</td><td rowspan="${rs}">${s.h}</td><td rowspan="${rs}">0</td><td rowspan="${rs}">${net}</td><td rowspan="${rs}">${s.b}</td><td rowspan="${rs}">${s.id}</td>`; 
            tr += '</tr>'; 
            body += tr; 
        }); 
    }); 
    
    body += `<tr><td colspan="2" style="font-weight:bold;text-align:right;">合計：</td><td>${parseFloat(gHrs.toFixed(1))}</td><td></td><td>${parseFloat(gAmt.toFixed(1))}</td><td>${parseFloat(gAmt.toFixed(1))}</td><td>${gL}</td><td>${gH}</td><td>0</td><td>${parseFloat(gNet.toFixed(1))}</td><td></td><td></td></tr></tbody>`; 
    tb.innerHTML = head + body; 
    XLSX.writeFile(XLSX.utils.table_to_book(tb, {sheet: "薪資表"}), `愜易居_${y}年${m}月_老闆專用薪資彙整表.xlsx`); 
    showToast('✅ 匯出成功'); 
}

function calcSalesBonus() {
    if(!el('sales_target')) return;
    let target = parseFloat(el('sales_target').value) || 0;
    let newSales = parseFloat(el('sales_new').value) || 0;
    let renewSales = parseFloat(el('sales_renew').value) || 0;
    let newRate = (parseFloat(el('sales_new_rate').value) || 0) / 100;
    let renewRate = (parseFloat(el('sales_renew_rate').value) || 0) / 100;

    let total = newSales + renewSales;
    let resEl = el('sales_bonus_result');
    if(total >= target) { 
        let bonus = Math.round((newSales * newRate) + (renewSales * renewRate)); 
        resEl.style.background = '#ecfdf5'; 
        resEl.style.border = '1px solid #10b981'; 
        resEl.style.color = '#065f46'; 
        resEl.innerHTML = `🎉 <strong>恭喜達標！</strong> 累積總業績 <strong>$${total.toLocaleString()}</strong> (門檻 $${target.toLocaleString()})<br><span style="font-size:14px;">新客獎金: $${Math.round(newSales*newRate).toLocaleString()} + 續約獎金: $${Math.round(renewSales*renewRate).toLocaleString()}</span><br><strong style="font-size:20px; color:#047857; margin-top:5px; display:inline-block;">💰 本月預估總發放獎金：$${bonus.toLocaleString()}</strong>`; 
    } else { 
        let diff = target - total; 
        resEl.style.background = '#fef2f2'; 
        resEl.style.border = '1px solid #ef4444'; 
        resEl.style.color = '#991b1b'; 
        resEl.innerHTML = `⚠️ <strong>尚未達標</strong> 累積總業績 <strong>$${total.toLocaleString()}</strong><br>距離目標 $${target.toLocaleString()} 還差 <strong style="color:#dc2626;">$${diff.toLocaleString()}</strong>，請繼續加油！<br><span style="font-size:13px; color:#ef4444;">(未達標目前系統無法計算獎金)</span>`; 
    }
}

            localStorage.setItem('ftAttendData',JSON.stringify(ftAttendData));
            localStorage.setItem('talentData',JSON.stringify(talentData));
            localStorage.setItem('supplierData',JSON.stringify(supplierData));
            localStorage.setItem('matchData',JSON.stringify(matchData));
            localStorage.setItem('reqData',JSON.stringify(reqData));
            localStorage.setItem('dispatchData',JSON.stringify(dispatchData));
        } catch(e) {}

        if(el('sync-status')) updateSyncStatus('<i class="fas fa-cloud"></i> 就緒');
        
        const cp = localStorage.getItem('adminPage')||'dashboard';
        if(el('sys-screen') && el('sys-screen').style.display !== 'none'){

        if(el('sync-status')) updateSyncStatus('<i class="fas fa-exclamation-triangle"></i> 離線',true);

                if(r.sysConfig.loginLogo) localStorage.setItem('loginLogo',r.sysConfig.loginLogo);
                if(r.sysConfig.pdfLogo) localStorage.setItem('pdfLogo',r.sysConfig.pdfLogo);

                if(r.sysConfig.hrAcc) localStorage.setItem('hrAcc',r.sysConfig.hrAcc);

                if(r.sysConfig.salesAcc) localStorage.setItem('salesAcc',r.sysConfig.salesAcc);
                if(r.sysConfig.salesPwd) localStorage.setItem('salesPwd',r.sysConfig.salesPwd);
                if(r.sysConfig.adminPin) localStorage.setItem('adminPin',r.sysConfig.adminPin);
                if(r.sysConfig.portalConf) localStorage.setItem('portalConf',r.sysConfig.portalConf);

}function renderAttend(){ 
    const y = el('filter_year').value, m = el('filter_month').value, c = el('filter_company').value.trim(), s = el('filter_staff').value.trim();
    calculateMilestones(s, 'attend_milestoneRedBox', 'attend_milestoneContent');
    
    let l = attendData.filter(x => {
        let matchCust = (!c || c === '全部' || x.company === c);
        let matchStaff = (!s || s === '全部人員' || x.staff === s);
        let matchDate = isDispatchPayrollPeriod(x.date, y, m);
        return matchCust && matchStaff && matchDate;
    });
    
    l.sort((a, b) => { 
        let dDiff = new Date(b.date) - new Date(a.date); 
        if(dDiff !== 0) return dDiff; 
        let tA = a.am_s || a.pm_s || '00:00'; 
        let tB = b.am_s || b.pm_s || '00:00'; 
        return tB.localeCompare(tA); 
    });
    
    let sumH = 0, sumP = 0;
    l.forEach(i => { sumH += getItemSalaryHours(i); sumP += getItemDeductPoints(i); });
    
    let accH = 0, accHtml = '';
    if (s && s !== '全部人員') {
        let cutoffDate = '9999-12-31';
        if (y !== 'all' && m !== 'all') { cutoffDate = `${y}-${String(m).padStart(2,'0')}-25`; }
        accH = attendData.filter(x => x.staff === s && x.date <= cutoffDate).reduce((sum, i) => sum + getItemSalaryHours(i), 0);
        accHtml = `目前累積工時：<strong style="font-size:20px;color:#3b82f6;">${accH.toFixed(1)} h</strong> &nbsp; | &nbsp; `;
    }

    let sumEl = el('attend_summary');
    if(sumEl) {
        if(l.length > 0 && (y !== 'all' || m !== 'all' || (c && c !== '全部') || (s && s !== '全部人員'))) {
            let ptxt = '';
            if(y !== 'all' && m !== 'all') { 
                let pm = parseInt(m) - 1, py = parseInt(y);
                if (pm === 0) { pm = 12; py -= 1; } 
                ptxt = ` <span style="color:#64748b;font-size:13px;margin-left:10px;">(區間：${py}/${String(pm).padStart(2,'0')}/26 ~ ${y}/${String(m).padStart(2,'0')}/25)</span>`;
            }
            sumEl.style.display = 'flex';
            sumEl.innerHTML = `<span><i class="fas fa-info-circle"></i> 篩選結果共 ${l.length} 筆紀錄 ${ptxt}</span> <span style="font-size:15px;">${accHtml}發薪工時：<strong style="font-size:20px;color:#059669;">${sumH.toFixed(1)} h</strong> &nbsp; | &nbsp; 扣除點數：<strong style="font-size:20px;color:#dc2626;">${sumP.toFixed(1)} 點</strong></span>`;
        } else { 
            sumEl.style.display = 'none'; 
        }
    }
    
    const {pagedList, total, totalPages} = getPagedData(l, 'attend');
    let cumulativeMap = {};
    let staffSet = new Set(pagedList.map(item => item.staff));
    staffSet.forEach(staffName => {
        let staffRecords = attendData
            .map((r, i) => ({ record: r, idx: i }))
            .filter(r => r.record.staff === staffName)
            .sort((a, b) => new Date(a.record.date) - new Date(b.record.date) || a.idx - b.idx);
        
        let runSum = 0;
        staffRecords.forEach(sr => {
            runSum += getItemSalaryHours(sr.record);
            cumulativeMap[sr.idx] = runSum;
        });
    });
    
    let h = '';
    pagedList.forEach(item => { 
        const idx = attendData.indexOf(item); 
        const am = item.am_s && item.am_e ? `${item.am_s}-${item.am_e}` : '-'; 
        const pm = item.pm_s && item.pm_e ? `${item.pm_s}-${item.pm_e}` : '-';
        const hr = getHistoricalRate(item); 
        const hrDisplay = item.special_hourly ? `<span class="badge badge-yellow">${item.special_hourly} (特)</span>` : `<span style="color:#059669; font-weight:bold;">$${hr}</span>`;
        const cumulative = cumulativeMap[idx] || 0;
        const fee = Number(item.project_fee) || 0;

        h += `<tr><td>${item.company}</td><td>${item.staff}</td><td>${item.date}</td><td>${item.service||'-'}</td><td>${am}</td><td>${pm}</td><td>${getItemSalaryHours(item)}</td><td style="color:#2563eb; font-weight:bold;">${cumulative.toFixed(1)}</td><td>${hrDisplay}</td><td><b style="color:#ea580c;">${fee>0?fee:"-"}</b></td><td><b class="red">${getItemDeductPoints(item)}</b></td><td>${item.remark||'-'}</td><td style="white-space:nowrap;"><button class="btn-sm btn-warning" onclick="editAttend(${idx})"><i class="fas fa-edit"></i></button> <button class="btn-sm btn-pdf" onclick="delAttend(${idx})"><i class="fas fa-trash"></i></button></td></tr>`;
    });
    el('attendTable').innerHTML = h || '<tr><td colspan="13" style="text-align:center;">無資料</td></tr>'; 
    renderPagination('attend', total, totalPages); 
}

function addAttend() { 
    const o = { 
        company:el('attend_company').value.trim(), staff:el('attend_staff').value.trim(), 
        date:el('attend_date').value, service:el('attend_service').value,

function generateStatementPDF() {
    const cb = el('bill_filter_company').value.trim(), yb = el('bill_filter_year').value, mb = el('bill_filter_month').value; 
    const cycle = el('bill_cycle').value;
    
    if(!cb || cb === '全部' || cb === '') return showToast('請選公司', true); 
    const ci = custData.find(x => x.name === cb);
    
    let periodStart = '0000-00-00', periodEnd = '9999-99-99', pt = '全部';
    if (cycle === 'manual') {
        periodStart = el('bill_start_date').value || '0000-00-00';
        periodEnd = el('bill_end_date').value || '9999-99-99';
        let ptStart = periodStart === '0000-00-00' ? '最前' : periodStart;
        let ptEnd = periodEnd === '9999-99-99' ? '最後' : periodEnd;
        pt = `${ptStart} ~ ${ptEnd}`;
        if(periodStart === '0000-00-00' && periodEnd === '9999-99-99') pt = '全部';
    } else {
        if(yb !== 'all' && mb !== 'all') {
            if(cycle === '1') { 
                periodStart = `${yb}-${String(mb).padStart(2,'0')}-01`;
                let lastDay = new Date(yb, mb, 0).getDate(); 
                periodEnd = `${yb}-${String(mb).padStart(2,'0')}-${lastDay}`; 
                pt = `${yb}/${String(mb).padStart(2,'0')}/01 ~ ${yb}/${String(mb).padStart(2,'0')}/${lastDay}`;
            } else { 
                let py = parseInt(yb); let pm = parseInt(mb) - 1;
                if(pm === 0) { pm = 12; py -= 1; } 
                periodStart = `${py}-${String(pm).padStart(2,'0')}-26`; 
                periodEnd = `${yb}-${String(mb).padStart(2,'0')}-25`;
                pt = `${py}/${String(pm).padStart(2,'0')}/26 ~ ${yb}/${String(mb).padStart(2,'0')}/25`; 
            }
        }
    }
    
    const cs = contractData.filter(x => x.customer === cb && (!x.date || x.date <= periodEnd)).sort((a,b) => new Date(a.date) - new Date(b.date));
    let tp = 0, ph = '', ps = new Set(); 
    cs.forEach(c => {
        tp += Number(c.point) || 0;
        if(c.price_plan) ps.add(c.price_plan);
        ph += `<div style="margin-bottom:4px;">📅 ${c.date||'無'} <b style="color:#2d9d5c;">${Number(c.point)||0} 點</b></div>`;
    });
    if(cs.length === 0){ ph = '<div style="color:#999;">無</div>'; ps.add('無'); }
    
    let pastRecords = attendData.filter(x => x.company === cb && x.date < periodStart); 
    let pastDeducted = 0; let pastBreakdown = {};
    
    pastRecords.forEach(i => { 
        let pts = getItemDeductPoints(i); 
        pastDeducted += pts; 
        let parts = i.date.split('-');

        return isDispatchPayrollPeriod(x.date, yb, mb, cycle);
    });

    });
    
    let ats = Object.values(gl).sort((a,b) => new Date(a.date) - new Date(b.date));

        });

    }

    const lh = pdfLogoBase64 ? `<img src="${pdfLogoBase64}" style="height:60px;margin-right:15px;vertical-align:middle;">` : '';
    
    let c = `<div style="text-align:center;margin-bottom:25px;border-bottom:3px solid #2d9d5c;padding-bottom:15px;display:flex;align-items:center;justify-content:center;">${lh}<h2 style="font-size:30px;margin:0;color:#2d9d5c;">愜易居有限公司 - 服務對帳單</h2></div><table class="info-table" style="margin-bottom:20px;width:100%;"><tr><td style="font-size:15px;line-height:1.8;color:#333;vertical-align:top;"><strong>客戶名稱：</strong> ${cb}<br><strong>結算期間：</strong> ${pt}<br><strong>使用方案：</strong> ${Array.from(ps).join('、')}</td><td style="text-align:right;vertical-align:top;"><div style="display:inline-block;background:#f8fafc;padding:12px 18px;border-radius:8px;border:1px solid #e2e8f0;text-align:left;vertical-align:top;"><div style="font-weight:bold;margin-bottom:8px;border-bottom:1px solid #cbd5e1;padding-bottom:4px;color:#333;">儲值紀錄</div>${ph}</div><div style="display:inline-block;background:#f8fafc;padding:12px 18px;border-radius:8px;border:1px solid #e2e8f0;text-align:left;margin-left:10px;vertical-align:top;"><div style="font-weight:bold;margin-bottom:8px;border-bottom:1px solid #cbd5e1;padding-bottom:4px;color:#333;">歷史扣除明細</div>${pastHistoryHtml}</div></td></tr></table><table class="summary-table" style="width:100%;background:#fff;border-radius:8px;margin-bottom:25px;text-align:center;font-size:15px;border:1px solid #cbd5e1;box-shadow:0 4px 6px rgba(0,0,0,0.05);"><tr><td style="padding:12px 8px;border-right:1px solid #cbd5e1;color:#333;width:20%;vertical-align:top;background:#f8fafc;">購買總點數<br><strong style="font-size:24px;color:#1e293b;">${tp} 點</strong></td><td style="padding:12px 8px;border-right:1px solid #cbd5e1;color:#333;vertical-align:top;background:#f8fafc;width:20%;">歷史已扣<br><strong style="font-size:24px;color:#64748b;">${pastDeducted.toFixed(1)}</strong></td><td style="padding:12px 8px;border-right:1px solid #cbd5e1;color:#dc2626;background:#fff5f5;vertical-align:top;width:20%;">本期扣除<br><strong style="font-size:24px;">${periodDeducted.toFixed(1)}</strong></td><td style="padding:12px 8px;border-right:1px solid #cbd5e1;color:#ea580c;background:#fff7ed;vertical-align:top;width:20%;">累計總扣除<br><strong style="font-size:24px;">${totalDeducted.toFixed(1)}</strong></td><td style="padding:12px 8px;color:#059669;background:#ecfdf5;vertical-align:top;width:20%;">最新剩餘點數<br><strong style="font-size:28px;color:${endingPoints<0?'#ef4444':'#059669'};">${endingPoints.toFixed(1)}</strong></td></tr></table><table style="width:100%;border-collapse:collapse;text-align:center;"><thead><tr style="background:#f1f5f9;"><th>日期</th><th>人員</th><th>服務項目</th><th>現場工時</th><th>扣除點數</th></tr></thead><tbody>${ah}</tbody></table><div class="footer" style="text-align:right;font-size:13px;color:#94a3b8;margin-top:30px;">列印日期：${new Date().toLocaleDateString('zh-TW')}</div>`;
    openPreview('對帳單', c, ci ? ci.drive : '', cb);
}

function renderSalary() { 
    const s = el('sal_filter_staff').value.trim(), y = el('sal_filter_year').value, m = el('sal_filter_month').value; 
    calculateMilestones(s, 'sal_milestoneRedBox', 'sal_milestoneContent');
    
    let l = attendData.filter(x => (!s || s === '全部人員' || x.staff === s) && isDispatchPayrollPeriod(x.date, y, m)); 
    l.sort((a,b) => new Date(a.date) - new Date(b.date)); 
    
    const {pagedList, total, totalPages} = getPagedData(l, 'salary'); 
    let h = ''; 
    let sumH = 0, sumAmt = 0;
    
    l.forEach(item => { 
        const pH = getItemSalaryHours(item); 
        sumH += pH; 
        let fee = Number(item.project_fee) || 0;
        sumAmt += fee > 0 ? fee : parseFloat((pH * getHistoricalRate(item)).toFixed(1));
    });
    
    pagedList.forEach(item => { 
        const pH = getItemSalaryHours(item); 
        const hr = getHistoricalRate(item); 
        const fee = Number(item.project_fee) || 0;
        const amt = fee > 0 ? fee : parseFloat((pH * hr).toFixed(1)); 
        const hrDisplay = item.special_hourly ? `<span class="badge badge-yellow">${hr} (特)</span>` : (fee > 0 ? '-' : hr); 
        h += `<tr><td>${item.staff}</td><td>${item.date}</td><td>${item.company}</td><td>${item.service||'-'}</td><td>${pH.toFixed(1)}</td><td>${hrDisplay}</td><td style="color:#ea580c;">${fee>0?fee:"-"}</td><td>${amt}</td></tr>`; 
    });
    
    el('salaryTable').innerHTML = h || '<tr><td colspan="8" style="text-align:center;">無紀錄</td></tr>'; 
    renderPagination('salary', total, totalPages); 
    
    if(s && s !== '全部人員' && y !== 'all' && m !== 'all') { 
        const si = staffData.find(x => x.name === s) || {};
        let lb = Number(si.labor) || 0, hl = Number(si.health) || 0; 
        el('salLabor').textContent = lb; 
        el('salHealth').textContent = hl; 
        el('salNet').textContent = Math.round(sumAmt - lb - hl); 
        el('salDetailResult').style.display = 'block';
        
        let pm = parseInt(m) - 1, py = parseInt(y); 
        if(pm === 0) { pm = 12; py -= 1; } 
        el('salResult').innerHTML = `[${s}] ${py}/${String(pm).padStart(2,'0')}/26 ~ ${y}/${String(m).padStart(2,'0')}/25 結算：<br><span style="color:#059669;">總工時：${sumH.toFixed(1)} h</span> &nbsp; | &nbsp; <span style="color:#d97706;">應發金額：${sumAmt.toFixed(1)} 元</span>`; 
    } else { 
        el('salDetailResult').style.display = 'none'; 
        el('salResult').innerHTML = ''; 
    } 
}

function generatePayslipPDF() { 
    const s = el('sal_filter_staff').value.trim(), y = el('sal_filter_year').value, m = el('sal_filter_month').value;
    if(!s || s === '全部人員' || y === 'all' || m === 'all') return showToast('請選人員與年月', true); 
    
    let pm = parseInt(m) - 1, py = parseInt(y); 
    if(pm === 0) { pm = 12; py -= 1; } 
    let ptxt = `${py}/${String(pm).padStart(2,'0')}/26 ~ ${y}/${String(m).padStart(2,'0')}/25`; 
    
    let ats = attendData.filter(x => x.staff === s && isDispatchPayrollPeriod(x.date, y, m)).sort((a,b) => new Date(a.date) - new Date(b.date)); 
    if(ats.length === 0) return showToast('無紀錄', true);
    
    const si = staffData.find(x => x.name === s) || {}; 
    let tAmt = 0, ah = ''; 
    
    ats.forEach(i => { 
        let pH = getItemSalaryHours(i); 
        let hy = getHistoricalRate(i); 
        let fee = Number(i.project_fee) || 0;
        let exactAmt = fee > 0 ? fee : parseFloat((pH * hy).toFixed(1)); 
        tAmt += exactAmt; 
        ah += `<tr><td>${i.date}</td><td>${i.company}</td><td>${i.service||'-'}</td><td>${pH.toFixed(1)}</td><td>${fee>0?'專案':hy}</td><td>${exactAmt}</td></tr>`; 
    });
    
    let lb = Number(si.labor) || 0, hl = Number(si.health) || 0; 
    let net = Math.round(tAmt - lb - hl); 
    const lh = pdfLogoBase64 ? `<img src="${pdfLogoBase64}" style="height:60px;margin-right:15px;vertical-align:middle;">` : ''; 
    
    let c = `<div style="text-align:center;margin-bottom:25px;border-bottom:3px solid #f59e0b;padding-bottom:15px;display:flex;align-items:center;justify-content:center;">${lh}<h2 style="font-size:30px;margin:0;color:#d97706;">愜易居有限公司 - 薪資明細單</h2></div><table class="info-table" style="margin-bottom:20px;width:100%;"><tr><td style="font-size:15px;line-height:1.8;color:#333;"><strong>人員姓名：</strong> ${s}<br><strong>結算期間：</strong> ${ptxt}</td><td style="text-align:right;"><strong>入帳帳戶：</strong><br>${si.bank||''} ${si.bank_branch||''}<br>${si.bank_acc||''}</td></tr></table><table class="summary-table" style="width:100%;margin-bottom:20px;border:1px solid #fde68a;"><tr><td>應發總額<br><strong style="font-size:24px;color:#1e293b;">${tAmt.toFixed(1)}</strong></td><td>代扣勞保<br><strong style="font-size:24px;color:#ef4444;">-${lb}</strong></td><td>代扣健保<br><strong style="font-size:24px;color:#ef4444;">-${hl}</strong></td><td style="background:#fffbeb;">實付金額<br><strong style="font-size:28px;color:#d97706;">${net}</strong></td></tr></table><table style="width:100%;border-collapse:collapse;text-align:center;"><thead><tr style="background:#f1f5f9;"><th>日期</th><th>公司</th><th>服務</th><th>工時</th><th>時薪/專案</th><th>金額</th></tr></thead><tbody>${ah}</tbody></table><div class="footer">列印日期：${new Date().toLocaleDateString('zh-TW')}</div>`;
    openPreview(`${s}的薪資單`, c, si.drive||'', s); 
}

function initStaffFrontend() {
    if(!currentLoginStaff) return;
    if(el('staff-welcome-name')) el('staff-welcome-name').textContent = currentLoginStaff.name || '';
    if(el('staff-profile-name')) el('staff-profile-name').textContent = currentLoginStaff.name || '-';
    if(el('staff-profile-tel')) el('staff-profile-tel').textContent = currentLoginStaff.tel || '-'; 
    if(el('staff-profile-id')) el('staff-profile-id').textContent = currentLoginStaff.id || '-'; 
    if(el('staff-profile-acc')) el('staff-profile-acc').textContent = currentLoginStaff.account || '-';
    
    if(el('staff_status_id')) el('staff_status_id').innerHTML = currentLoginStaff.doc_id ? '<span class="badge badge-green">已繳</span>' : '<span class="badge badge-red">缺件</span>'; 
    if(el('staff_status_bank')) el('staff_status_bank').innerHTML = currentLoginStaff.doc_bank ? '<span class="badge badge-green">已繳</span>' : '<span class="badge badge-red">缺件</span>';
    if(el('staff_status_contract')) el('staff_status_contract').innerHTML = currentLoginStaff.doc_contract ? '<span class="badge badge-green">已繳</span>' : '<span class="badge badge-red">缺件</span>'; 
    if(el('staff_status_resume')) el('staff_status_resume').innerHTML = currentLoginStaff.doc_resume ? '<span class="badge badge-green">已繳</span>' : '<span class="badge badge-red">缺件</span>';
    
    renderStaffRecords(); 
    renderStaffMyPayFilters(); 
    renderStaffMyPay();
}

function showStaffPage(p, a) { 
    document.querySelectorAll('#staff-screen .page').forEach(x => x.classList.remove('active'));
    const t = el('staff-page-' + p); 
    if(t) t.classList.add('active'); 
    document.querySelectorAll('#staff-screen .sidebar-nav a').forEach(x => x.classList.remove('active')); 
    if(a) a.classList.add('active'); 
    localStorage.setItem('staffPage', p);
}

function renderStaffRecords() { 
    if(!el('staffRecordsTable') || !currentLoginStaff) return; 
    let h = ''; 
    attendData.filter(x => x.staff === currentLoginStaff.name).sort((a,b) => new Date(b.date) - new Date(a.date)).forEach(i => {
        let fee = Number(i.project_fee) || 0;
        h += `<tr><td>${i.date}</td><td>${i.company}</td><td>${i.service||'-'} ${fee>0?'(專案)':''}</td><td>${getItemSalaryHours(i).toFixed(1)}</td><td>${i.remark||'-'}</td></tr>`;
    });
    el('staffRecordsTable').innerHTML = h || '<tr><td colspan="5" style="text-align:center;">無資料</td></tr>';
}

function renderStaffMyPayFilters() { 
    if(!el('staff_my_year') || !el('staff_my_month')) return; 
    const y = new Date().getFullYear(); 
    let yr = ''; 
    for(let i=2024; i<=y; i++) yr += `<option value="${i}">${i}</option>`; 
    el('staff_my_year').innerHTML = yr; 
    el('staff_my_year').value = y;
    
    let mh = '';
    for(let i=1; i<=12; i++) mh += `<option value="${i}">${i}月</option>`; 
    el('staff_my_month').innerHTML = mh;
    el('staff_my_month').value = new Date().getMonth() + 1; 
}

function renderStaffMyPay() { 
    if(!el('staffMyPayTable') || !currentLoginStaff) return; 
    const y = el('staff_my_year').value, m = el('staff_my_month').value; 
    let h = '';
    attendData.filter(x => x.staff === currentLoginStaff.name && isDispatchPayrollPeriod(x.date, y, m)).forEach(i => {
        let fee = Number(i.project_fee) || 0;
        h += `<tr><td>${i.date}</td><td>${i.company}</td><td>${i.service||'-'} ${fee>0?'(專案)':''}</td><td>${getItemSalaryHours(i).toFixed(1)}</td></tr>`;
    }); 
    el('staffMyPayTable').innerHTML = h || '<tr><td colspan="4" style="text-align:center;">本月無派遣紀錄</td></tr>';
}

function staffDownloadPayslip() { 
    if(!currentLoginStaff) return;
    const iF = ftStaffData.some(x => x.name === currentLoginStaff.name);
    if(iF) {
        el('fts_filter_staff').value = currentLoginStaff.name; 
        const y = el('staff_my_year').value, m = el('staff_my_month').value; 
        el('fts_filter_month').value = `${y}-${String(m).padStart(2,'0')}`; 
        generateFtPayslipPDF_Single(currentLoginStaff.name);
    } else {
        el('sal_filter_staff').value = currentLoginStaff.name; 
        el('sal_filter_year').value = el('staff_my_year').value; 
        el('sal_filter_month').value = el('staff_my_month').value; 
        generatePayslipPDF();
    } 
}

function openStaffDrive() { 
    if(currentLoginStaff && currentLoginStaff.drive) window.open(currentLoginStaff.drive, '_blank'); 
    else showToast('尚未建立雲端資料夾', true);
}
</script>
</body>
</html>
