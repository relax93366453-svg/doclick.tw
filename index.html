<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>點籽響客戶及派遣管理系統 (專業企業版)</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
/* CSS 樣式區 - 延續專業版設計 */
*{margin:0;padding:0;box-sizing:border-box;font-family:'Microsoft JhengHei',sans-serif}body{background:#f4f7fb;color:#334155;line-height:1.6}::-webkit-scrollbar{width:8px;height:8px}::-webkit-scrollbar-track{background:#f1f5f9}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:4px}::-webkit-scrollbar-thumb:hover{background:#94a3b8}#login-screen{display:flex;justify-content:center;align-items:center;height:100vh;background:url('https://images.unsplash.com/photo-1560250097-0b93528c311a?q=80&w=2069&auto=format&fit=crop') center/cover no-repeat;background-color:#1e293b;position:fixed;top:0;left:0;width:100%;z-index:9998}#login-screen::before{content:'';position:absolute;inset:0;background:rgba(15,23,42,.65)}.login-box{background:rgba(255,255,255,.85);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.5);padding:45px 40px;border-radius:16px;box-shadow:0 25px 50px -12px rgba(0,0,0,.5);width:100%;max-width:420px;text-align:center;position:relative;z-index:1;border-top:6px solid #2d9d5c}.login-logo-container{margin-bottom:20px;height:80px;display:flex;justify-content:center;align-items:center}.login-logo-container i{font-size:50px;color:#2d9d5c}.login-box h1{color:#1e293b;margin-bottom:5px;font-size:24px;font-weight:900;letter-spacing:1px}.pro-badge{display:inline-block;background:linear-gradient(135deg,#f59e0b,#d97706);color:white;padding:5px 14px;border-radius:20px;font-size:12px;font-weight:bold;letter-spacing:1px;margin-bottom:25px}.login-field{margin-bottom:18px;text-align:left}.login-field label{display:block;margin-bottom:6px;font-weight:700;color:#475569;font-size:13px}.login-field input,.login-field select{width:100%;padding:14px 16px;border:1px solid #cbd5e1;border-radius:8px;font-size:15px;outline:none;background:rgba(255,255,255,.9);color:#1e293b}.btn-login{width:100%;padding:16px;background:linear-gradient(135deg,#2d9d5c,#15803d);color:white;border:none;border-radius:8px;font-size:16px;font-weight:bold;cursor:pointer;margin-top:10px;transition:all .3s}.app-container,.staff-container{display:none;min-height:100vh}.sidebar{width:240px;background-color:#fff;box-shadow:2px 0 15px rgba(0,0,0,.03);padding:20px 0;position:fixed;height:100vh;z-index:10;border-right:1px solid #e2e8f0}.sidebar-nav a{display:flex;align-items:center;gap:12px;padding:12px 15px;color:#64748b;text-decoration:none;border-radius:8px;transition:all .2s ease;cursor:pointer;font-size:14px;font-weight:600}.sidebar-nav a:hover, .sidebar-nav a.active{background-color:#ecfdf5;color:#2d9d5c}.main-content{flex:1;margin-left:240px;padding:25px 35px;width:calc(100% - 240px)}.page{display:none;background-color:#fff;border-radius:12px;box-shadow:0 4px 6px -1px rgba(0,0,0,.05);padding:30px;margin-bottom:20px;border:1px solid #f1f5f9}.page.active{display:block}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-bottom:25px}button.btn{padding:10px 18px;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:8px;color:#fff;transition:.2s}.btn-success{background:#10b981}.btn-warning{background:#f59e0b}.table-responsive{width:100%;overflow-x:auto;border-radius:8px;border:1px solid #e2e8f0}table{width:100%;border-collapse:collapse;font-size:13px}table th{padding:14px 12px;background:#f8fafc;color:#475569;font-weight:700;text-align:left}table td{padding:12px 12px;border-bottom:1px solid #e2e8f0}#toast{display:none;position:fixed;top:30px;right:30px;background:#10b981;color:#fff;padding:15px 25px;border-radius:8px;box-shadow:0 10px 25px rgba(0,0,0,.5);z-index:10000;font-weight:bold;font-size:16px}
</style>
</head>
<body>

<div id="toast"></div>

<div id="login-screen">
  <div class="login-box">
    <div class="login-logo-container"><i class="fas fa-leaf" id="login-logo-icon"></i></div>
    <h1>點籽響管理系統</h1><div class="pro-badge">專業企業版</div>
    <div class="login-field">
      <label>登入身分</label>
      <select id="login_role">
        <option value="admin">👑 系統管理員 (老闆/人資)</option>
        <option value="staff">💼 員工專區 (正職/派遣)</option>
      </select>
    </div>
    <div class="login-field"><label>登入帳號</label><input type="text" id="login_acc" placeholder="請輸入帳號"></div>
    <div class="login-field"><label>登入密碼</label><input type="password" id="login_pwd" placeholder="請輸入密碼"></div>
    <button class="btn-login" onclick="handleLogin()"><i class="fas fa-sign-in-alt"></i> 登 入 系 統</button>
  </div>
</div>

<div class="app-container workspace-business" id="admin-screen">
  <div class="sidebar">
    <div class="sidebar-header"><h1 id="admin-sidebar-title-business"><i class="fas fa-chart-pie"></i> 營業管理區</h1></div>
    <ul class="sidebar-nav">
      <li><a onclick="showAdminPage('dashboard')" class="active"><i class="fas fa-border-all"></i> 總覽儀表板</a></li>
      <li><a onclick="showAdminPage('customer')"><i class="fas fa-building"></i> 客戶資料</a></li>
      <li><a onclick="showAdminPage('contract')"><i class="fas fa-file-contract"></i> 合約方案</a></li>
      <li><a onclick="showAdminPage('staff')"><i class="fas fa-user-tag"></i> 員工管理</a></li>
      <li><a onclick="showAdminPage('attend')"><i class="fas fa-clock"></i> 派遣記錄</a></li>
      <li><a onclick="showAdminPage('talent')"><i class="fas fa-address-card"></i> 人才招募庫</a></li>
      <li><a onclick="logout()"><i class="fas fa-sign-out-alt"></i> 登出</a></li>
    </ul>
  </div>
  <div class="main-content">
    <div class="page active" id="page-dashboard">
      <h2><i class="fas fa-chart-line" style="color:#f59e0b;"></i> 營運摘要總覽</h2>
      <div class="grid" style="margin-top:20px;">
        <div style="background:#fff; padding:20px; border-radius:12px; border:1px solid #eee;">
          <div style="font-size:14px; color:#64748b;">客戶總數</div>
          <div style="font-size:32px; font-weight:bold;" id="dash_total_cust">0</div>
        </div>
      </div>
    </div>

    <div class="page" id="page-customer">
      <div class="page-title"><i class="fas fa-building"></i> 客戶資料管理</div>
      <div class="grid">
        <div><label>客戶名稱 *</label><input id="c_name"></div>
        <div><label>聯絡人</label><input id="c_user"></div>
        <div><label>電話</label><input id="c_tel"></div>
        <div><label>雲端資料夾</label><div style="display:flex; gap:5px;"><input id="c_drive" style="flex:1;"><button class="btn-sm btn-warning" onclick="autoCreateFolder()" id="btnCreateFolder" style="color:#fff;"><i class="fas fa-magic"></i> 第一次建立</button></div></div>
      </div>
      <button class="btn btn-success" id="btnAddCust" onclick="addCust()"><i class="fas fa-save"></i> 新增客戶</button>
      <button class="btn btn-warning" id="btnUpdateCust" style="display:none; color:#fff;" onclick="updateCust()"><i class="fas fa-edit"></i> 儲存修改</button>
      <button class="btn" style="background:#64748b;" onclick="clearCustForm()">清空</button>
      <div class="table-responsive" style="margin-top:20px;"><table id="custTableBox"><thead><tr><th>名稱</th><th>聯絡人</th><th>電話</th><th>雲端</th><th>操作</th></tr></thead><tbody id="custTable"></tbody></table></div>
    </div>

    <div class="page" id="page-talent">
      <div class="page-title"><i class="fas fa-address-card"></i> 人才招募庫</div>
      <div class="filter-bar" style="margin-bottom:20px;">
        <button class="btn btn-success" onclick="syncTalentFromForm()"><i class="fas fa-cloud-download-alt"></i> 啟動 AI 履歷同步</button>
      </div>
      <div class="table-responsive"><table id="talentTableBox"><thead><tr><th>姓名</th><th>電話</th><th>職務</th><th>狀態</th><th>建檔日</th><th>操作</th></tr></thead><tbody id="talentTable"></tbody></table></div>
    </div>
  </div>
</div>

<div class="staff-container" id="staff-screen">
  <div class="sidebar" style="background: #2d9d5c;">
    <div class="sidebar-header" style="border-bottom: 1px solid #4ade80;"><h1 style="color: white;"><i class="fas fa-user-circle"></i> 員工專區</h1></div>
    <ul class="sidebar-nav">
      <li><a onclick="showStaffPage('home', this)" class="active" style="color:white;"><i class="fas fa-bullhorn"></i> 管理規範</a></li>
      <li><a onclick="showStaffPage('profile', this)" style="color:white;"><i class="fas fa-id-card"></i> 個人資料</a></li>
      <li><a onclick="logout()" style="color:#ffcccb;margin-top:30px;"><i class="fas fa-sign-out-alt"></i> 登出</a></li>
    </ul>
  </div>
  <div class="main-content">
    <div class="page-header"><h2>歡迎回來，<span id="staff-welcome-name"></span>！</h2></div>
    <div class="page active" id="staff-page-home"><h3>最新公告</h3><p id="staff_r1_content">載入中...</p></div>
    <div class="page" id="staff-page-profile">
      <h3>個人繳件狀態</h3>
      <div id="staff-profile-status" style="margin-top:20px;"></div>
    </div>
  </div>
</div>

<script>
// ================= 全局核心設定 =================
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwTtT9kLu7OFl2zfxYhyWb94tVp6p-v3KIQYthcnwNE5mszbUDj7lm7Q7XS6LubWCjjXQ/exec';
let custData=[], staffData=[], ftStaffData=[], talentData=[], attendData=[], contractData=[];
let editCustIndex = -1, currentLoginStaff = null;

function showToast(msg, isErr = false) { 
    const t = document.getElementById('toast'); if(!t) return; 
    t.style.background = isErr ? '#ef4444' : '#10b981'; t.innerHTML = msg; t.style.display = 'block'; 
    setTimeout(() => { t.style.display = 'none'; }, 3000); 
}

// ================= ✅ 員工無縫登入修復 =================
function handleLogin() {
    const role = document.getElementById('login_role').value;
    const acc = document.getElementById('login_acc').value.trim();
    const pwd = document.getElementById('login_pwd').value.trim();

    if(!acc || !pwd) return showToast('請輸入帳密', true);

    if (role === 'admin') {
        if ((acc === 'admin' && pwd === 'doclick888') || (acc === 'admin' && pwd === '1234')) {
            localStorage.setItem('loginRole', 'admin');
            restoreLoginState();
            showToast('管理員登入成功');
        } else { showToast('管理員帳密錯誤', true); }
    } else {
        // 從資料庫精確比對
        const staff = staffData.find(x => String(x.account).trim() === acc && String(x.pwd).trim() === pwd);
        const ftStaff = ftStaffData.find(x => String(x.account).trim() === acc && String(x.pwd).trim() === pwd);
        
        if (staff || ftStaff) {
            currentLoginStaff = staff || ftStaff;
            localStorage.setItem('loginRole', 'staff');
            localStorage.setItem('loginAcc', acc);
            restoreLoginState();
            showToast('員工登入成功');
        } else { showToast('員工帳密錯誤，請洽人資', true); }
    }
}

function restoreLoginState() {
    const role = localStorage.getItem('loginRole');
    const acc = localStorage.getItem('loginAcc');
    if (!role) return;

    document.getElementById('login-screen').style.display = 'none';
    if (role === 'admin') {
        document.getElementById('admin-screen').style.display = 'flex';
        renderDashboard();
    } else {
        document.getElementById('staff-screen').style.display = 'flex';
        // 重新從資料庫抓取對象
        currentLoginStaff = staffData.find(x => x.account === acc) || ftStaffData.find(x => x.account === acc);
        if(currentLoginStaff) {
            document.getElementById('staff-welcome-name').textContent = currentLoginStaff.name;
            document.getElementById('staff_r1_content').textContent = "歡迎進入員工專區，請確認個人資料是否繳齊。";
        }
    }
}

// ================= ✅ AI 履歷同步與回報 =================
function loadDataFromCloud(isManual = false) {
    fetch(SCRIPT_URL).then(res => res.json()).then(result => {
        const oldTalentCount = talentData.length;
        if(result.custData) custData = result.custData;
        if(result.staffData) staffData = result.staffData;
        if(result.ftStaffData) ftStaffData = result.ftStaffData;
        if(result.talentData) talentData = result.talentData;

        if (isManual) {
            const newCount = talentData.length - oldTalentCount;
            alert(`🎉 AI 同步完成！本次為您新增了 【 ${newCount > 0 ? newCount : 0} 】 筆新履歷資料。`);
            renderTalentTable();
        }
        renderDashboard();
    }).catch(err => console.error("同步失敗", err));
}

function syncTalentFromForm() {
    showToast('<i class="fas fa-spinner fa-spin"></i> AI 正在抓取雲端表單...');
    fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'syncForm' }) })
    .then(() => loadDataFromCloud(true));
}

// ================= ✅ 按鈕連動模式 (新增/修改) =================
function editCust(i) {
    const d = custData[i];
    document.getElementById('c_name').value = d.name;
    document.getElementById('c_user').value = d.user || '';
    document.getElementById('c_tel').value = d.tel || '';
    document.getElementById('c_drive').value = d.drive || '';
    editCustIndex = i;
    // 切換按鈕狀態
    document.getElementById('btnAddCust').style.display = 'none';
    document.getElementById('btnUpdateCust').style.display = 'inline-block';
}

function clearCustForm() {
    document.getElementById('c_name').value = '';
    document.getElementById('c_user').value = '';
    document.getElementById('c_tel').value = '';
    document.getElementById('c_drive').value = '';
    editCustIndex = -1;
    // 還原按鈕狀態
    document.getElementById('btnAddCust').style.display = 'inline-block';
    document.getElementById('btnUpdateCust').style.display = 'none';
}

// ================= ✅ 系統工具 =================
function autoCreateFolder() {
    const name = document.getElementById('c_name').value;
    if(!name) return showToast('請先輸入名稱', true);
    const btn = document.getElementById('btnCreateFolder');
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 建檔中...';
    fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'createFolder', folderName: name }) })
    .then(res => res.json()).then(res => {
        document.getElementById('c_drive').value = res.folderUrl;
        showToast('資料夾建立成功');
    }).finally(() => { btn.innerHTML = '<i class="fas fa-magic"></i> 第一次建立'; });
}

function renderDashboard() {
    document.getElementById('dash_total_cust').textContent = custData.length;
}

function showAdminPage(page) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page-' + page).classList.add('active');
    if(page === 'customer') renderCustTable();
    if(page === 'talent') renderTalentTable();
}

function renderCustTable() {
    let html = '';
    custData.forEach((c, i) => {
        html += `<tr><td>${c.name}</td><td>${c.user||'-'}</td><td>${c.tel||'-'}</td><td><button class="btn-sm btn-success" onclick="window.open('${c.drive}')">雲端</button></td><td><button class="btn-sm btn-warning" style="color:#fff;" onclick="editCust(${i})">編輯</button></td></tr>`;
    });
    document.getElementById('custTable').innerHTML = html;
}

function renderTalentTable() {
    let html = '';
    talentData.forEach(t => {
        html += `<tr><td>${t.name}</td><td>${t.tel}</td><td>${t.role}</td><td>${t.status}</td><td>${t.date}</td><td><button class="btn-sm btn-warning" style="color:#fff;">查看</button></td></tr>`;
    });
    document.getElementById('talentTable').innerHTML = html;
}

function logout() { localStorage.clear(); window.location.reload(); }

// 初始加載
document.addEventListener('DOMContentLoaded', () => {
    loadDataFromCloud();
    setTimeout(restoreLoginState, 1000); // 延遲恢復狀態確保資料已加載
});
</script>
</body>
</html>
