function showToast(msg, isErr = false) { 
    const t = el('toast'); if(!t) return; 
    t.style.background = isErr ? '#ef4444' : '#10b981'; t.innerHTML = msg; t.style.display = 'block'; t.style.opacity = '1'; 
    setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.style.display = 'none', 300); }, 3500); 
}

// ================= 登入與導航 =================
function handleLogin() {
  try {
      const role = el('login_role').value; const acc = el('login_acc').value.trim(); const pwd = el('login_pwd').value.trim();
      if(!acc || !pwd) { showToast('請輸入帳號與密碼！', true); return; }

      const sAA = localStorage.getItem('adminAcc') || 'admin'; const sAP = localStorage.getItem('adminPwd') || '1234';
      const sHA = localStorage.getItem('hrAcc') || 'hr'; const sHP = localStorage.getItem('hrPwd') || '1234';

      if (role === 'admin') {
        if ((acc === sAA && pwd === sAP) || (acc === 'admin' && pwd === 'doclick888')) { localStorage.setItem('loginRole', 'admin'); localStorage.setItem('workspace', 'business'); showToast('登入成功'); setTimeout(() => restoreLoginState(), 100); } 
        else if ((acc === sHA && pwd === sHP) || (acc === 'hr' && pwd === 'doclick888')) { localStorage.setItem('loginRole', 'admin'); localStorage.setItem('workspace', 'hr'); showToast('登入成功'); setTimeout(() => restoreLoginState(), 100); } 
        else { showToast('帳密錯誤！', true); }
      } else {
        const staff = (staffData||[]).find(x => x && String(x.account||'').trim() === acc && String(x.pwd||'').trim() === pwd);
        const ftStaff = (ftStaffData||[]).find(x => x && String(x.account||'').trim() === acc && String(x.pwd||'').trim() === pwd);
        if (staff || ftStaff) { localStorage.setItem('loginRole', 'staff'); localStorage.setItem('loginAcc', acc); showToast('登入成功'); setTimeout(() => restoreLoginState(), 100); } 
        else { showToast('員工帳密錯誤！', true); }
      }
  } catch(e) { alert('登入異常：' + e.message); console.error(e); }
}

function restoreLoginState() {
  try {
      const role = localStorage.getItem('loginRole'); const acc = localStorage.getItem('loginAcc');
      if (!role) { 
          if(el('login-screen')) el('login-screen').style.display = 'flex'; 
          if(el('admin-screen')) el('admin-screen').style.display = 'none'; 
          if(el('staff-screen')) el('staff-screen').style.display = 'none'; 
          return; 
      }
      if(el('login-screen')) el('login-screen').style.display = 'none';

      if(role === 'admin') {
        if(el('admin-screen')) el('admin-screen').style.display = 'flex'; 
        if(el('staff-screen')) el('staff-screen').style.display = 'none';
        currentWorkspace = localStorage.getItem('workspace') || 'business';
        if(currentWorkspace === 'hr') { el('admin-screen').classList.remove('workspace-business'); el('admin-screen').classList.add('workspace-hr', 'mode-hr'); if(el('admin-sidebar-title-business')) el('admin-sidebar-title-business').style.display = 'none'; if(el('admin-sidebar-title-hr')) el('admin-sidebar-title-hr').style.display = 'flex'; } 
        else { el('admin-screen').classList.remove('workspace-hr', 'mode-hr'); el('admin-screen').classList.add('workspace-business'); if(el('admin-sidebar-title-business')) el('admin-sidebar-title-business').style.display = 'flex'; if(el('admin-sidebar-title-hr')) el('admin-sidebar-title-hr').style.display = 'none'; }
        fillFilters(); showAdminPage(localStorage.getItem('adminPage') || 'dashboard');
      } else if (role === 'staff') {
        if(el('staff-screen')) el('staff-screen').style.display = 'flex'; 
        if(el('admin-screen')) el('admin-screen').style.display = 'none';
        let staff = null;
        if(staffData && Array.isArray(staffData)) staff = staffData.find(x => x && String(x.account||'').trim() === String(acc||'').trim());
        if(!staff && ftStaffData && Array.isArray(ftStaffData)) staff = ftStaffData.find(x => x && String(x.account||'').trim() === String(acc||'').trim());
        currentLoginStaff = staff || { name: acc || '員工', account: acc };
        initStaffFrontend(); showStaffPage(localStorage.getItem('staffPage') || 'home');
      }
  } catch(e) { 
      alert('介面載入發生異常：' + e.message + '\n請重整網頁');
      console.error(e);
      if(el('login-screen')) el('login-screen').style.display = 'flex'; 
  }
}

function toggleWorkspace() {
  const scr = el('admin-screen');
  if (currentWorkspace === 'business') { currentWorkspace = 'hr'; localStorage.setItem('workspace', 'hr'); scr.classList.remove('workspace-business'); scr.classList.add('workspace-hr', 'mode-hr'); el('admin-sidebar-title-business').style.display = 'none'; el('admin-sidebar-title-hr').style.display = 'flex'; showAdminPage('dashboard'); }

}

function renderPricePlanOptions() { document.querySelectorAll('#co_price_plan').forEach(s => { const v = s.value; s.innerHTML = '<option value="">請選擇</option>'; Object.keys(priceTable).forEach(k => s.innerHTML += `<option value="${k}">${k}</option>`); s.value = v; }); }

function standardizeData() {
  attendData = (attendData||[]).filter(x=>x).map(x => ({ company: x.company||'', staff: x.staff||'', date: x.date||'', service: x.service||'', remark: x.remark||'', am_s: x.am_s||'', am_e: x.am_e||'', pm_s: x.pm_s||'', pm_e: x.pm_e||'', salary_hours: x.salary_hours!==undefined?x.salary_hours:'', deduct_points: x.deduct_points!==undefined?x.deduct_points:'' }));
  staffData = (staffData||[]).filter(x=>x).map(x => ({ ...x, account: String(x.account||'').trim(), pwd: String(x.pwd||'').trim(), drive: x.drive||'', doc_id: !!x.doc_id, doc_bank: !!x.doc_bank, doc_contract: !!x.doc_contract, doc_resume: !!x.doc_resume, addr: x.addr||'', labor: x.labor||0, health: x.health||0, remark: x.remark||'', tel: x.tel||'', id: x.id||'', birthday: x.birthday||'', status: x.status||'在職' }));
  ftStaffData = (ftStaffData||[]).filter(x=>x).map(x => ({ ...x, account: String(x.account||'').trim(), pwd: String(x.pwd||'').trim(), drive: x.drive||'', salary: x.salary||30000, labor: x.labor||0, health: x.health||0, doc_id: !!x.doc_id, doc_bank: !!x.doc_bank, doc_contract: !!x.doc_contract, doc_resume: !!x.doc_resume, hire_date: x.hire_date||'', tel: x.tel||'', id: x.id||'', birthday: x.birthday||'', status: x.status||'在職' }));
  ftAttendData = (ftAttendData||[]).filter(x=>x).map(x => ({ ...x, record_type: x.record_type||'正常出勤', hours: x.hours||0 }));
  
  talentData = (talentData||[]).filter(x=>x).map(x => {
      if (Array.isArray(x)) {
          let extra = []; if(x[8]) extra.push('經驗:'+x[8]); if(x[10]) extra.push('專長:'+x[10]); if(x[5]) extra.push('Line:'+x[5]);
          return { name: x[1]||'', tel: x[4]||x[2]||x[1]||'', source: 'Google表單', location: '', shift: '', role: x[9]||x[6]||'', status: '待聯絡', eval: '', resume: '', exp: extra.join(' | '), date: String(x[0]||'').split('T')[0].split(' ')[0] || new Date().toISOString().split('T')[0] };
      }
      const ks = Object.keys(x); const gv = (ws) => { for(let k of ks){ let cleanK = String(k).replace(/\s+/g, '').toLowerCase(); for(let w of ws){ if(cleanK.includes(w.toLowerCase())) return x[k]; } } return ''; };
      return { ...x, name: x.name || gv(['姓名','名字','全名','name']), tel: x.tel || gv(['電話','手機','號碼','tel','聯絡']), source: x.source || gv(['來源','管道'])||'Google表單', location: x.location || gv(['地區','地點','縣市']), shift: x.shift || gv(['班別','時段','時間']), role: x.role || gv(['職務','應徵','職位','感興趣']), status: x.status || gv(['狀態']) || '待聯絡', eval: x.eval || gv(['評價','面試']), resume: x.resume || gv(['履歷','連結','附件']), exp: x.exp || gv(['專長','經歷','備註','經驗']), date: x.date || gv(['時間戳記','日期','時間']) || new Date().toISOString().split('T')[0] };
  });
  
  supplierData = (supplierData||[]).filter(x=>x).map(x => ({...x, name: x.name||'', contact: x.contact||'', tel: x.tel||'', addr: x.addr||'', tax: x.tax||'', pay_method: x.pay_method||'', pay_date: x.pay_date||'', invoice_date: x.invoice_date||'', invoice_no: x.invoice_no||'', invoice_amt: x.invoice_amt||'', drive: x.drive||''}));
  custData = (custData||[]).filter(x=>x).map(x => ({...x, coop: x.coop||'正合作', name: x.name||''}));
  contractData = (contractData||[]).filter(x=>x).map(x => ({...x, customer: x.customer||''}));
}

function getHours(s,e){ if(!s||!e) return 0; try { let [sh,sm] = s.split(':').map(Number); let [eh,em] = e.split(':').map(Number); let min = (eh*60+em) - (sh*60+sm); if(min < 0) min += 1440; return (min/60).toFixed(1); } catch (e) { return 0; } }
function getItemClockHours(item) { return (+getHours(item.am_s, item.am_e)) + (+getHours(item.pm_s, item.pm_e)); }
function getItemSalaryHours(item) { if (item.salary_hours !== undefined && item.salary_hours !== '') return Number(item.salary_hours); return getItemClockHours(item); }
function getItemDeductPoints(item) { if (item.deduct_points !== undefined && item.deduct_points !== '') return Number(item.deduct_points); return Math.ceil(getItemClockHours(item)); }
function getStaffTotalHours(name) { return attendData.filter(x=>x.staff===name).reduce((sum,item)=> sum + getItemSalaryHours(item),0); }
function getStaffTieredHourly(name) { const h = getStaffTotalHours(name); if (h <= 175) return 210; if (h <= 350) return 220; if (h <= 525) return 230; if (h <= 700) return 240; return 250; }

function updateSystemClock() {
  const now = new Date(); const tStr = now.toLocaleString('zh-TW', {year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit', hour12: false}); 
  const ct = el('current-time'); if(ct) ct.innerHTML = `<i class="far fa-clock" style="color:#2d9d5c;"></i> ${tStr}`; 
  const sct = el('staff-current-time'); if(sct) sct.innerHTML = `<i class="far fa-clock" style="color:#2d9d5c;"></i> ${tStr}`;
}

// ================= 雲端同步與備份 =================
function loadDataFromCloud(forceRender = false) {
  if (el('sync-status')) updateSyncStatus('<i class="fas fa-spinner fa-spin"></i> 同步中...');
  fetch(SCRIPT_URL).then(res => res.json()).then(result => {
      
      if(!result.talentData) result.talentData = talentData || [];
      let formRaw = result['Form_Responses'] || result['表單回應 1'] || result['表單回應'] || result['Form Responses 1'];
      let newlyAdded = 0;

      if(formRaw && Array.isArray(formRaw)) {
          const dataRows = (formRaw[0] && (formRaw[0][0]==='時間戳記' || formRaw[0].name==='姓名')) ? formRaw.slice(1) : formRaw;
          dataRows.forEach(row => {
              let name='', tel='', role='', exp='', date='';
              if(Array.isArray(row)) {
                  name=row[1]||''; tel=row[4]||row[2]||row[3]||''; role=row[9]||row[6]||''; date=row[0]||'';
                  let ex=[]; if(row[8])ex.push('經驗:'+row[8]); if(row[10])ex.push('專長:'+row[10]); if(row[5])ex.push('Line:'+row[5]); exp=ex.join(' | ');
              } else {
                  const ks = Object.keys(row); const gv = (ws) => { for(let k of ks){ let cK = String(k).replace(/\s+/g, '').toLowerCase(); for(let w of ws){ if(cK.includes(w.toLowerCase())) return row[k]; } } return ''; };
                  name=gv(['姓名','名字','全名','name']); tel=gv(['電話','手機','號碼','tel','聯絡']); role=gv(['職務','應徵','職位','感興趣']); exp=gv(['專長','經歷','備註','經驗']); date=gv(['時間戳記','日期','時間'])||new Date().toISOString();
              }
              if(name && !name.includes('姓名') && !name.includes('全名') && name !== 'name') {
                  if(!result.talentData.some(t => t.name === name)) {
                      result.talentData.push({ name:String(name).trim(), tel:String(tel).trim(), source:'Google表單', location:'', shift:'', role:String(role).trim(), status:'待聯絡', eval:'', resume:'', exp:String(exp).trim(), date:String(date).split('T')[0].split(' ')[0] });
                      newlyAdded++;
                  }
              }
          });
      }

function generateFtPayslipPDF(isCloud = false) {
  const s = el('fts_filter_staff').value; const m = el('fts_filter_month').value;
  if (s === 'all' || !m) { showToast('請選擇正職員工與發薪年月！', true); return; }
  const staffInfo = ftStaffData.find(x => x.name === s); if (!staffInfo) { showToast('找不到該正職員工資料！', true); return; }
  if (isCloud && !staffInfo.drive) { showToast('未設定雲端資料夾！', true); return; }

  showToast(isCloud ? '📄 雲端上傳中...' : '📄 正職薪資單產生中，即將下載...');

  let bs = Number(staffInfo.salary)||30000; let dly = bs/30; let hr = dly/8;
  let mya = ftAttendData.filter(x => x.staff === s && x.date.startsWith(m)).sort((a,b) => new Date(a.date) - new Date(b.date));
  let tw = 0; let dd = 0; let ov = 0; let tableRows = '';
  mya.forEach(a => {
      let h = Number(a.hours)||0; let payChange = '-';
      if(a.record_type==='正常出勤'||a.record_type==='異常'||a.record_type==='外出'||a.record_type==='換班') { tw+=h; }
      else if(a.record_type==='請假' && a.approval==='已核准'){
          if(a.leave_type==='事假'){ let deduct = h*hr; dd+=deduct; payChange = `扣薪 $${Math.round(deduct)}`; }
          if(a.leave_type==='病假'||a.leave_type==='生理假'){ let deduct = h*hr*0.5; dd+=deduct; payChange = `扣薪 $${Math.round(deduct)}`; }
      } else if(a.record_type==='加班') { let overtimePay = h*hr*1.34; ov+=overtimePay; payChange = `加班費 +$${Math.round(overtimePay)}`; }
      tableRows += `<tr><td style="border:1px solid #ddd; padding:10px; text-align:center;">${a.date}</td><td style="border:1px solid #ddd; padding:10px; text-align:center;">${a.record_type} ${a.leave_type?'('+a.leave_type+')':''}</td><td style="border:1px solid #ddd; padding:10px; text-align:center;">${h} h</td><td style="border:1px solid #ddd; padding:10px; text-align:center;">${payChange}</td></tr>`;
  });
  if (mya.length === 0) tableRows = `<tr><td colspan="4" style="border:1px solid #ddd; padding:15px; text-align:center; color:#666;">本月無出勤紀錄</td></tr>`;

  let net = bs - dd + ov - (Number(staffInfo.labor)||0) - (Number(staffInfo.health)||0);
  const printArea = document.createElement('div'); printArea.style.padding = '40px'; printArea.style.fontFamily = "'Microsoft JhengHei', sans-serif"; printArea.style.color = '#333'; printArea.style.backgroundColor = '#fff';
  const logoHtml = pdfLogoBase64 ? `<img src="${pdfLogoBase64}" style="height: 50px; border-radius: 8px; margin-bottom: 10px;"><br>` : ``;

  printArea.innerHTML = `<div style="text-align:center; margin-bottom:30px; border-bottom: 2px solid #2d9d5c; padding-bottom: 15px;">${logoHtml}<h2 style="font-size:28px; margin:0; color:#2d9d5c;">點籽響有限公司</h2><h3 style="font-size:20px; color:#555;">正職員工薪資單</h3></div><div style="display: flex; justify-content: space-between; margin-bottom: 20px;"><div><p><strong>姓名：</strong>${s}</p></div><div><p><strong>月份：</strong>${m.replace('-',' 年 ')} 月</p></div></div><table style="width:100%; border-collapse:collapse; font-size:14px; margin-bottom:30px;"><thead><tr style="background-color:#f9f9f9; color:#555;"><th style="border:1px solid #ddd; padding:10px;">日期</th><th style="border:1px solid #ddd; padding:10px;">紀錄類型</th><th style="border:1px solid #ddd; padding:10px;">時數</th><th style="border:1px solid #ddd; padding:10px;">薪資異動</th></tr></thead><tbody>${tableRows}</tbody></table><div style="display:flex; justify-content:space-between; background-color:#f9f9f9; padding:20px; border-radius:8px; border:1px solid #eee;"><div style="width:48%;"><p>底薪：<strong>${bs} 元</strong></p><p style="color:#10b981;">加班津貼：<strong>+ ${Math.round(ov)} 元</strong></p><p style="color:#dc2626;">請假扣薪：<strong>- ${Math.round(dd)} 元</strong></p><p style="color:#dc2626;">勞保：<strong>- ${Number(staffInfo.labor)||0} 元</strong></p><p style="color:#dc2626;">健保：<strong>- ${Number(staffInfo.health)||0} 元</strong></p></div><div style="width:48%; display:flex; flex-direction:column; justify-content:center; align-items:center; background-color:#f0fdf4; border-radius:8px; border:2px solid #2d9d5c;"><span style="color:#2d9d5c;">本月實發金額</span><strong style="font-size:28px; color:#2d9d5c;">$ ${Math.round(net)}</strong></div></div>`;
  const fileName = `${s}_${m.replace('-','年')}月薪資單_${new Date().getTime()}.pdf`; const opt = { margin: 15, filename: fileName, image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } };

  if (isCloud) {
      if (el('sync-status')) updateSyncStatus('<i class="fas fa-spinner fa-spin"></i> 上傳中...');
      html2pdf().set(opt).from(printArea).outputPdf('datauristring').then(function(pdfBase64) { fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'savePDF', folderUrl: staffInfo.drive, fileName: fileName, base64Data: pdfBase64 }) }).then(res => res.json()).then(res => { if (res.status === 'success') { showToast('上傳成功！'); if (el('sync-status')) updateSyncStatus('<i class="fas fa-cloud"></i> 系統就緒'); } else { showToast('失敗：' + res.message, true); if (el('sync-status')) updateSyncStatus('<i class="fas fa-exclamation-triangle"></i> 失敗', true); } }).catch(err => {showToast('網路錯誤', true); if (el('sync-status')) updateSyncStatus('<i class="fas fa-exclamation-triangle"></i> 失敗', true);}); });
  } else { html2pdf().set(opt).from(printArea).save().then(()=>showToast('✅ 下載完成！')); }
}

// ================= 頁面顯示與切換 =================
function showAdminPage(page) {
  try {
      const isHr = el('admin-screen').classList.contains('mode-hr');
      if (isHr && ['customer', 'contract', 'point', 'bill', 'boss', 'supplier'].includes(page)) { showToast('此為營業區專屬', true); return; }
      let targetPage = el('page-' + page); if(!targetPage) { page = 'dashboard'; targetPage = el('page-dashboard'); } 
      localStorage.setItem('adminPage', page);
      document.querySelectorAll('#admin-screen .page').forEach(p => p.classList.remove('active')); targetPage.classList.add('active');
      document.querySelectorAll('#admin-screen .sidebar-nav a').forEach(a => a.classList.remove('active')); 
      let autoLink = document.querySelector(`a[onclick*="showAdminPage('${page}')"]`); if(autoLink) autoLink.classList.add('active');
      
      if (page === 'customer') { clearCustForm(); renderCustTable(); } if (page === 'contract') { clearContractForm(); renderContractTable(); }
      if (page === 'staff') { clearStaffForm(); renderStaffTable(); } if (page === 'attend') { clearAttendForm(); renderAttend(); }
      if (page === 'ft_staff') { clearFtStaffForm(); renderFtStaffTable(); } if (page === 'ft_attend') { clearFtAttendForm(); renderFtAttendTable(); }
      if (page === 'talent') { clearTalentForm(); renderTalentTable(); } if (page === 'supplier') { clearSupplierForm(); renderSupplierTable(); }
      if (page === 'dashboard') renderDashboard();
  } catch(e) { console.error('頁面切換保護:', e); }
}

function resetPage(m) { pageConfig.currentPage[m] = 1; }
function getPagedData(l, m) { let t = Math.max(1, Math.ceil(l.length / pageConfig.pageSize)); if (pageConfig.currentPage[m] > t) pageConfig.currentPage[m] = t; const s = (pageConfig.currentPage[m] - 1) * pageConfig.pageSize; return { pagedList: l.slice(s, s + pageConfig.pageSize), total: l.length, totalPages: t }; }
function renderPagination(m, t, tp) { const p = pageConfig.currentPage[m]; const b = el(`${m}TableBox`); if(!b) return; const o = b.parentNode.querySelector('.pagination'); if (o) o.remove(); let html = `<div class="pagination"><button onclick="changePage('${m}', 1)" ${p===1 ? 'disabled' : ''}>首頁</button><button onclick="changePage('${m}', ${p-1})" ${p===1 ? 'disabled' : ''}>上一頁</button><span>第 ${p}/${tp} 頁 </span><button onclick="changePage('${m}', ${p+1})" ${p>=tp ? 'disabled' : ''}>下一頁</button></div>`; b.insertAdjacentHTML('afterend', html); }

function changePage(m, tp) {
  pageConfig.currentPage[m] = tp;
  switch(m) {
    case 'customer': renderCustTable(); break; case 'contract': renderContractTable(); break; case 'staff': renderStaffTable(); break; case 'attend': renderAttend(); break;
    case 'point': renderPoint(); break; case 'bill': renderBill(); break; case 'salary': renderSalary(); break; case 'ft_staff': renderFtStaffTable(); break;
    case 'ft_attend': renderFtAttendTable(); break; case 'talent': renderTalentTable(); break; case 'supplier': renderSupplierTable(); break;
  }
}

function fillFilters() {
  const refill = (s, oh) => { document.querySelectorAll(s).forEach(e => { const v = e.value; e.innerHTML = oh; if(v) e.value = v; }); };
  const y=new Date().getFullYear(); const m=new Date().getMonth()+1;
  let yr = '<option value="all">全部</option>'; for(let i=y-2;i<=y;i++) yr += `<option value="${i}">${i}</option>`; refill('#filter_year,#bill_filter_year,#sal_filter_year,#boss_year', yr);
  let mh = '<option value="all">全部</option>'; for(let i=1;i<=12;i++) mh += `<option value="${i}">月</option>`; refill('#filter_month,#bill_filter_month,#sal_filter_month,#boss_month', mh);
  let ch = '<option value="">全部</option>'; custData.forEach(c=> ch += `<option value="${c.name}">${c.name}</option>`); refill('#cust_filter_company,#contract_filter_company,#filter_company,#point_filter_company,#bill_filter_company,#con_customer,#attend_company', ch);
  let bc = '<option value="" selected>全部客戶</option>'; custData.forEach(c => bc += `<option value="${c.name}">${c.name}</option>`); refill('#boss_cust_filter', bc);
  
  let sh = '<option value="all" selected>全部人員</option><optgroup label="在職">'; 
  staffData.filter(s=>s.status==='在職').forEach(s=>sh+=`<option value="${s.name}">${s.name}</option>`); 
  sh+='</optgroup><optgroup label="離職">'; 
  staffData.filter(s=>s.status==='離職').forEach(s=>sh+=`<option value="${s.name}">${s.name}</option>`); 
  sh+='</optgroup>'; 
  refill('#sal_filter_staff,#attend_staff', sh);
  
  let fh = '<option value="all">全部正職</option>'; ftStaffData.filter(s=>s.status==='在職').forEach(s => fh += `<option value="${s.name}">${s.name}</option>`); refill('#fta_filter_staff,#fta_staff, #fts_filter_staff', fh);
  let su = '<option value="">全部</option>'; supplierData.forEach(s => su += `<option value="${s.name}">${s.name}</option>`); refill('#sup_filter_name', su);
}

function showLeaveInfo() {
    const staffName = el('fta_staff').value; const infoPanel = el('leave-info-panel');
    if(!infoPanel) return; if(!staffName || staffName === 'all' || staffName === '') { infoPanel.style.display = 'none'; return; }
    const staff = ftStaffData.find(x => x.name === staffName);
    if(!staff || !staff.hire_date) { el('leave-info-name').textContent = staffName; el('leave-info-tenure').textContent = '未設到職日'; el('leave-info-total').textContent = '-'; el('leave-info-used').textContent = '-'; el('leave-info-remain').textContent = '-'; el('leave-info-next').textContent = '請先設定'; infoPanel.style.display = 'block'; return; }
    const hireDate = new Date(staff.hire_date); const today = new Date(); let months = (today.getFullYear() - hireDate.getFullYear()) * 12 + (today.getMonth() - hireDate.getMonth()); if (today.getDate() < hireDate.getDate()) months--; let years = months / 12;
    let entitled = 0; let nextDate = new Date(hireDate); let nextDays = 0; let pStart = new Date(hireDate); let pEnd = new Date(hireDate);
    if(months < 6) { entitled = 0; nextDate.setMonth(nextDate.getMonth() + 6); nextDays = 3; pStart = new Date(today); pEnd = new Date(today); } 
    else if (months >= 6 && months < 12) { entitled = 3; nextDate.setFullYear(nextDate.getFullYear() + 1); nextDays = 7; pStart.setMonth(pStart.getMonth() + 6); pEnd.setFullYear(pEnd.getFullYear() + 1); } 
    else { let yFloor = Math.floor(years); if (yFloor >= 10) { entitled = 15 + yFloor - 9; if(entitled>30) entitled=30; } else if (yFloor >= 5) entitled = 15; else if (yFloor >= 3) entitled = 14; else if (yFloor >= 2) entitled = 10; else if (yFloor >= 1) entitled = 7; nextDate.setFullYear(nextDate.getFullYear() + yFloor + 1); let nextYFloor = yFloor + 1; if (nextYFloor >= 10) { nextDays = 15 + nextYFloor - 9; if(nextDays>30) nextDays=30; } else if (nextYFloor >= 5) nextDays = 15; else if (nextYFloor >= 3) nextDays = 14; else if (nextYFloor >= 2) nextDays = 10; else if (nextYFloor >= 1) nextDays = 7; pStart.setFullYear(pStart.getFullYear() + yFloor); pEnd.setFullYear(pEnd.getFullYear() + yFloor + 1); }
    let usedHours = 0; if(entitled > 0) { const sStr = pStart.toISOString().split('T')[0]; const eStr = pEnd.toISOString().split('T')[0]; let leaves = ftAttendData.filter(x => x.staff === staffName && x.record_type === '請假' && x.leave_type === '特休假' && x.date >= sStr && x.date < eStr && x.approval === '已核准'); usedHours = leaves.reduce((sum, x) => sum + (Number(x.hours) || 0), 0); }
    let usedDays = usedHours / 8; let remainDays = entitled - usedDays;
    el('leave-info-name').textContent = staffName; el('leave-info-tenure').textContent = `${Math.floor(years)} 年 ${months % 12} 個月`; el('leave-info-total').textContent = `${entitled} 天`; el('leave-info-used').textContent = `${usedDays.toFixed(1)} 天`; el('leave-info-remain').textContent = `${remainDays.toFixed(1)} 天`; el('leave-info-next').textContent = `${nextDate.toLocaleDateString('zh-TW')} 起可獲 ${nextDays} 天`; infoPanel.style.display = 'block';
}

// 正職薪資
function renderFtSalaryTable(){ const m=el('fts_filter_month').value; const s=el('fts_filter_staff').value; const sd=Number(el('fts_standard_days').value)||22; if(!m)return el('ftSalaryTable').innerHTML='<tr><td colspan="8" style="text-align:center;">請選擇年月</td></tr>'; let list=ftStaffData.filter(x=>x.status==='在職' && (s==='all'||x.name===s)); const {pagedList,total,totalPages}=getPagedData(list,'ft_salary'); let html=''; pagedList.forEach(st=>{ let bs=Number(st.salary)||30000; let dly=bs/30; let hr=dly/8; let mya=ftAttendData.filter(x=>x.staff===st.name&&x.date.startsWith(m)); let tw=0; let dd=0; let ov=0; mya.forEach(a=>{ let h=Number(a.hours)||0; if(a.record_type==='正常出勤'||a.record_type==='異常'||a.record_type==='外出'||a.record_type==='換班')tw+=h; else if(a.record_type==='請假'&&a.approval==='已核准'){if(a.leave_type==='事假')dd+=h*hr; if(a.leave_type==='病假'||a.leave_type==='生理假')dd+=h*hr*0.5;} else if(a.record_type==='加班')ov+=h*hr*1.34; }); let net=bs-dd+ov-(Number(st.labor)||0)-(Number(st.health)||0); html+=`<tr><td>${st.name}</td><td>${bs}</td><td>${tw.toFixed(1)}</td><td class="red">-${Math.round(dd)}</td><td class="green">+${Math.round(ov)}</td><td>${(Number(st.labor)||0)+(Number(st.health)||0)}</td><td style="font-weight:bold;color:#1e3a8a;">$${Math.round(net)}</td><td><button class="btn-sm btn-pdf" onclick="document.getElementById('fts_filter_staff').value='${st.name}'; generateFtPayslipPDF(false)"><i class="fas fa-file-pdf"></i></button></td></tr>`; }); el('ftSalaryTable').innerHTML=html||'<tr><td colspan="8" style="text-align:center;">無資料</td></tr>'; renderPagination('ft_salary',total,totalPages); }

// 人才庫
function renderTalentTable(){ const tr=el('tp_filter_role').value.toLowerCase(); const ts=el('tp_filter_status').value; let list=talentData.filter(x=>(ts==='all'||x.status===ts)&&(!tr||(x.role||'').toLowerCase().includes(tr))); const {pagedList,total,totalPages}=getPagedData(list,'talent'); let html=''; pagedList.forEach(item=>{ const idx=talentData.indexOf(item); let sc='badge-blue'; if(item.status==='已錄取')sc='badge-green'; else if(item.status==='淘汰')sc='badge-red'; let resumeBtn = item.resume ? `<button class="btn-sm btn-excel" onclick="window.open('${item.resume}','_blank')"><i class="fas fa-link"></i> 開啟</button>` : '-'; html+=`<tr><td>${item.name}</td><td>${item.tel||'-'}</td><td>${item.source||'-'}</td><td>${item.location||'-'}</td><td>${item.shift||'-'}</td><td>${item.role||'-'}</td><td><span class="badge ${sc}">${item.status}</span></td><td>${item.eval||'-'}</td><td>${resumeBtn}</td><td>${item.date||'-'}</td><td style="white-space:nowrap;"><button class="btn-sm btn-warning" onclick="editTalent(${idx})"><i class="fas fa-edit"></i></button> <button class="btn-sm btn-pdf" onclick="delTalent(${idx})"><i class="fas fa-trash"></i></button></td></tr>`; }); el('talentTable').innerHTML=html||'<tr><td colspan="11" style="text-align:center;">無資料</td></tr>'; renderPagination('talent',total,totalPages); }
function addTalent(){ const o={name:el('tp_name').value.trim(),tel:el('tp_tel').value.trim(),source:el('tp_source').value.trim(),location:el('tp_location').value.trim(),shift:el('tp_shift').value.trim(),role:el('tp_role').value.trim(),status:el('tp_status').value,eval:el('tp_eval').value.trim(),resume:el('tp_resume').value.trim(),exp:el('tp_exp').value.trim(),date:new Date().toISOString().split('T')[0]}; if(!o.name)return; talentData.push(o); saveAll(); renderTalentTable(); clearTalentForm(); showToast('✅ 儲存成功！'); }
function editTalent(i){ const d=talentData[i]; el('tp_name').value=d.name; el('tp_tel').value=d.tel||''; el('tp_source').value=d.source||''; el('tp_location').value=d.location||''; el('tp_shift').value=d.shift||''; el('tp_role').value=d.role||''; el('tp_status').value=d.status||'待聯絡'; el('tp_eval').value=d.eval||''; el('tp_resume').value=d.resume||''; el('tp_exp').value=d.exp||''; editTalentIndex=i; toggleBtn('btnAddTalent', 'btnUpdateTalent', 'edit'); }
function updateTalent(){ if(editTalentIndex<0)return; const o={name:el('tp_name').value.trim(),tel:el('tp_tel').value.trim(),source:el('tp_source').value.trim(),location:el('tp_location').value.trim(),shift:el('tp_shift').value.trim(),role:el('tp_role').value.trim(),status:el('tp_status').value,eval:el('tp_eval').value.trim(),resume:el('tp_resume').value.trim(),exp:el('tp_exp').value.trim(),date:talentData[editTalentIndex].date}; talentData[editTalentIndex]={...talentData[editTalentIndex], ...o}; saveAll(); renderTalentTable(); clearTalentForm(); showToast('✅ 修改成功！'); }
function delTalent(i){ if(!confirm('刪除？'))return; talentData.splice(i,1); saveAll(); renderTalentTable(); showToast('已刪除'); }
function clearTalentForm(){ document.querySelectorAll('#page-talent .grid input').forEach(i=>i.value=''); el('tp_status').value='待聯絡'; editTalentIndex=-1; toggleBtn('btnAddTalent', 'btnUpdateTalent', 'add'); }

// 報表與統計
function renderPoint(){ const cp=el('point_filter_company').value; let list=custData.filter(x=>!cp||x.name===cp); const {pagedList,total,totalPages}=getPagedData(list,'point'); let html=''; pagedList.forEach(cust=>{ const contractPoints=contractData.filter(x=>x.customer===cust.name).reduce((sum,item)=>sum+(+item.point||0),0); const usedPoints=attendData.filter(x=>x.company===cust.name).reduce((sum,item)=>sum+getItemDeductPoints(item),0); const remainPoints=contractPoints-usedPoints; html+=`<tr><td>${cust.name}</td><td>${contractPoints}</td><td>${usedPoints}</td><td class="${remainPoints<0?'red':'green'}">${remainPoints}</td><td>${remainPoints<0?'不足':'充足'}</td></tr>`; }); el('pointTable').innerHTML=html||'<tr><td colspan=5 style="text-align:center;">無資料</td></tr>'; renderPagination('point',total,totalPages); }
function renderBill(){ const cb=el('bill_filter_company').value; const yb=el('bill_filter_year').value; const mb=el('bill_filter_month').value; if(!cb)return; let list=attendData.filter(x=>x.company===cb&&(yb==='all'||x.date.startsWith(yb))&&(mb==='all'||x.date.slice(5,7)===String(mb).padStart(2,'0'))); const {pagedList,total,totalPages}=getPagedData(list,'bill'); let html=''; pagedList.forEach(item=>{ html+=`<tr><td>${item.date}</td><td>${item.staff}</td><td>${item.service||'-'}</td><td>${getItemClockHours(item).toFixed(1)}</td><td>${getItemDeductPoints(item)}</td></tr>`; }); el('billTable').innerHTML=html||'<tr><td colspan="5" style="text-align:center;">無資料</td></tr>'; renderPagination('bill',total,totalPages); }

function renderSalary(){ const sf=el('sal_filter_staff').value; const ysf=el('sal_filter_year').value; const msf=el('sal_filter_month').value; let list=attendData.filter(x=>(sf==='all'||x.staff===sf)&&isInPayrollPeriod(x.date, ysf, msf)); const {pagedList,total,totalPages}=getPagedData(list,'salary'); let html=''; let tHours=0; let tAmt=0; list.forEach(item=>{ const payHour=getItemSalaryHours(item); let hourly=0; const staff=staffData.find(s=>s.name===item.staff); if(staff) hourly=+staff.hourly||getStaffTieredHourly(item.staff); tHours+=payHour; tAmt+=Math.round(payHour*hourly); }); pagedList.forEach(item=>{ const payHour=getItemSalaryHours(item); let hourly=0; const staff=staffData.find(s=>s.name===item.staff); if(staff) hourly=+staff.hourly||getStaffTieredHourly(item.staff); const amt=Math.round(payHour*hourly); html+=`<tr><td>${item.staff}</td><td>${item.date}</td><td>${item.company}</td><td>${item.service||'-'}</td><td>${payHour.toFixed(1)}</td><td>${amt}</td></tr>`; }); el('salaryTable').innerHTML=html||'<tr><td colspan="6" style="text-align:center;">無資料</td></tr>'; renderPagination('salary',total,totalPages); el('salResult').innerHTML=`總工時: ${tHours.toFixed(1)} <br> 應付額: ${tAmt} 元`; let labor=0; let health=0; if(sf!=='all'){ const staffInfo=staffData.find(x=>x.name===sf); if(staffInfo){ labor=Number(staffInfo.labor)||0; health=Number(staffInfo.health)||0; } } el('salLabor').textContent=labor; el('salHealth').textContent=health; el('salNet').textContent=tAmt-labor-health; }

function isInPayrollPeriod(dateStr, year, month) { if (year === 'all' || month === 'all') return true; const d = new Date(dateStr); const y = d.getFullYear(); const m = d.getMonth() + 1; return String(y) === String(year) && String(m) === String(month); }

function showBoss() {
  const y = el('boss_year').value; const m = el('boss_month').value; const c = el('boss_cust_filter').value; let html = '';
  custData.forEach(cust => {
      if (c && cust.name !== c) return;
      const contracts = contractData.filter(x => x.customer === cust.name).sort((a,b) => new Date(b.date) - new Date(a.date));
      const totalPoints = contracts.reduce((sum, item) => sum + (+item.point || 0), 0);
      const contractDates = contracts.map(x => x.date).join('<br>'); const contractStatus = contracts.length > 0 ? contracts[0].status : '-';
      const usedHours = attendData.filter(x => x.company === cust.name && isInPayrollPeriod(x.date, y, m)).reduce((sum, item) => sum + getItemSalaryHours(item), 0);
      const totalUsedPoints = attendData.filter(x => x.company === cust.name).reduce((sum, item) => sum + getItemDeductPoints(item), 0);
      const remainPoints = totalPoints - totalUsedPoints;
      html += `<tr><td>${cust.coop}</td><td>${cust.name}</td><td>${contractDates || '-'}</td><td>${totalPoints}</td><td>${usedHours.toFixed(1)} h</td><td class="${remainPoints<0?'red':'green'}">${remainPoints}</td><td>${contractStatus}</td></tr>`;
  });
  el('bossTable').innerHTML = html || '<tr><td colspan="7" style="text-align:center;">無資料</td></tr>';
}

function renderDashboard(){
  el('dash_total_cust').textContent=custData.length; el('dash_active_cust').textContent=custData.filter(x=>x.coop==='正合作').length;
  let pointGe50 = 0; let pointLt50 = 0; let alertHtml = '';
  custData.forEach(cust=>{ const contractPoints=contractData.filter(x=>x.customer===cust.name).reduce((sum,item)=>sum+(+item.point||0),0); const usedPoints=attendData.filter(x=>x.company===cust.name).reduce((sum,item)=>sum + getItemDeductPoints(item),0); const remainPoints = contractPoints - usedPoints; if(remainPoints >= 50) pointGe50++; else { pointLt50++; if (cust.coop !== '無合作') alertHtml += `<tr><td>${cust.name}</td><td class="red">${remainPoints} 點</td><td><button class="btn-sm btn-success" onclick="showAdminPage('contract');"><i class="fas fa-file-contract"></i></button></td></tr>`; } });
  el('dash_point_ge50').textContent=pointGe50; el('dash_point_lt50').textContent=pointLt50; el('dash_alert_table').innerHTML = alertHtml || '<tr><td colspan="3" style="text-align:center; color:#999; padding: 15px;">無</td></tr>';
  
  let activeStaff = staffData.filter(x => x.status === '在職'); let activeFtStaff = ftStaffData.filter(x => x.status === '在職'); let allActive = activeStaff.concat(activeFtStaff);
  el('dash_staff_active').textContent = allActive.length; el('dash_miss_id').textContent = allActive.filter(x => !x.doc_id).length; el('dash_miss_bank').textContent = allActive.filter(x => !x.doc_bank).length; el('dash_miss_contract').textContent = allActive.filter(x => !x.doc_contract).length;

  let missingDocsHtml = '';
  allActive.forEach(staff => {
      let missing = []; if(!staff.doc_id) missing.push('<span class="badge badge-red">缺身分</span>'); if(!staff.doc_bank) missing.push('<span class="badge badge-red">缺存摺</span>'); if(!staff.doc_contract) missing.push('<span class="badge badge-red">缺合約</span>'); if(!staff.doc_resume) missing.push('<span class="badge badge-red">缺履歷</span>');
      if(missing.length > 0) { const isFt = ftStaffData.some(x=>x.name === staff.name); const tag = isFt ? '<span class="badge badge-blue">正職</span>' : '<span class="badge badge-yellow">派遣</span>'; missingDocsHtml += `<tr><td style="font-weight:bold; color:#444;">${staff.name} ${tag}</td><td><div style="display:flex; flex-wrap:wrap; gap:5px;">${missing.join('')}</div></td><td><button class="btn-sm btn-warning" onclick="showAdminPage('${isFt ? 'ft_staff' : 'staff'}'); setTimeout(()=>${isFt ? 'editFtStaff' : 'editStaff'}(${isFt ? ftStaffData.findIndex(x=>x.name===staff.name) : staffData.findIndex(x=>x.name===staff.name)}), 300);"><i class="fas fa-edit"></i></button></td></tr>`; }
  });
  el('dash_missing_docs_table').innerHTML = missingDocsHtml || '<tr><td colspan="3" style="text-align:center; color:#999; padding: 20px;">🎉 恭喜！所有資料已繳齊</td></tr>';

  const td = new Date(); const tStr = td.getFullYear()+'-'+String(td.getMonth()+1).padStart(2,'0')+'-'+String(td.getDate()).padStart(2,'0');
  let tHtml=''; attendData.filter(x=>x.date===tStr).forEach(i=>{ const am=i.am_s&&i.am_e?`${i.am_s}-${i.am_e}`:''; const pm=i.pm_s&&i.pm_e?`${i.pm_s}-${i.pm_e}`:''; tHtml+=`<tr><td>${i.staff}</td><td>${i.company}</td><td>${[am,pm].filter(x=>x).join('/')||'-'}</td></tr>`; });
  el('dash_today_table').innerHTML = tHtml||'<tr><td colspan="3" style="text-align:center;color:#999;">本日無記錄</td></tr>';
  let bHtml=''; const cm=td.getMonth()+1; allActive.filter(x=>x.birthday&&parseInt(x.birthday.split('-')[1],10)===cm).sort((a,b)=>parseInt(a.birthday.split('-')[2],10)-parseInt(b.birthday.split('-')[2],10)).forEach(i=>{ const isFt = ftStaffData.some(x=>x.name === i.name); const tag = isFt ? '<span class="badge badge-blue">正職</span>' : '<span class="badge badge-yellow">派遣</span>'; bHtml+=`<tr><td style="font-weight:bold;">${i.name} ${tag}</td><td>${i.birthday.substring(5)}</td><td><span style="color:#e91e63;"><i class="fas fa-gift"></i> 生日禮</span></td></tr>`; });
  el('dash_birthday_table').innerHTML = bHtml||'<tr><td colspan="3" style="text-align:center;color:#999;">本月無壽星</td></tr>';

  let apHtml = ''; let todayStr = td.getTime();
  supplierData.forEach((s, idx) => {
      if(s.pay_date) {
          let pDate = new Date(s.pay_date).getTime(); let diffDays = Math.ceil((pDate - todayStr) / (1000 * 60 * 60 * 24));
          if(diffDays <= 7) { let st = diffDays < 0 ? `<span class="badge badge-red">逾期 ${Math.abs(diffDays)} 天</span>` : (diffDays===0 ? `<span class="badge badge-red">今日到期</span>` : `<span class="badge badge-yellow">剩 ${diffDays} 天</span>`); apHtml += `<tr><td style="font-weight:bold;">${s.name}</td><td>$${s.invoice_amt||0}</td><td>${s.pay_date}</td><td>${st}</td><td><button class="btn-sm btn-warning" onclick="showAdminPage('supplier'); setTimeout(()=>editSupplier(${idx}),300)"><i class="fas fa-eye"></i></button></td></tr>`; }
      }
  });
  el('dash_ap_table').innerHTML = apHtml || '<tr><td colspan="5" style="text-align:center; color:#999; padding: 15px;">無帳款提醒</td></tr>';
}
</script>
