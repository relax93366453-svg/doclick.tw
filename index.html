<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>點籽響客戶及派遣管理系統</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:'Microsoft JhengHei',sans-serif}body{background:#f4f7fb;color:#334155;line-height:1.6}
  .app-container,.staff-container{display:none;min-height:100vh}
  .sidebar{width:240px;background:#fff;box-shadow:2px 0 15px rgba(0,0,0,.05);position:fixed;height:100vh;z-index:10}
  .main-content{margin-left:240px;padding:25px;width:calc(100% - 240px)}
  .page{display:none;background:#fff;border-radius:12px;padding:25px;box-shadow:0 4px 6px rgba(0,0,0,.05);margin-bottom:20px}
  .page.active{display:block}.sidebar-nav{list-style:none;padding:10px}.sidebar-nav a{display:flex;align-items:center;gap:10px;padding:12px;color:#64748b;text-decoration:none;border-radius:8px;cursor:pointer}
  .sidebar-nav a:hover,.sidebar-nav a.active{background:#ecfdf5;color:#2d9d5c}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:15px;margin-bottom:20px}
  .filter-bar{background:#f8fafc;padding:15px;border-radius:8px;margin-bottom:15px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  table{width:100%;border-collapse:collapse;font-size:13px}th,td{padding:12px;border-bottom:1px solid #e2e8f0;text-align:left}th{background:#f8fafc}
  .btn{padding:10px 15px;border:none;border-radius:6px;cursor:pointer;font-weight:600;color:#fff;margin-right:5px}.btn-success{background:#10b981}.btn-warning{background:#f59e0b}.btn-pdf{background:#ef4444}.btn-excel{background:#3b82f6}
  .badge{padding:3px 8px;border-radius:10px;font-size:11px}.badge-green{background:#dcfce7;color:#166534}.badge-red{background:#fee2e2;color:#991b1b}
  #login-screen{position:fixed;inset:0;background:#1e293b;display:flex;justify-content:center;align-items:center;z-index:9999}
  .login-box{background:#fff;padding:40px;border-radius:16px;width:100%;max-width:400px;text-align:center}
  .pagination{margin-top:15px;display:flex;gap:5px;justify-content:flex-end}
  #toast{display:none;position:fixed;top:20px;right:20px;padding:15px 25px;border-radius:8px;color:#fff;z-index:10000;font-weight:bold}
  .ws-business, .ws-hr { display: none; } .workspace-business .ws-business { display: block; } .workspace-hr .ws-hr { display: block; }
  #preview-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:9999;padding:20px;overflow-y:auto}
  .pdf-box{background:#fff;width:794px;margin:0 auto;padding:40px;min-height:1122px}
</style>
</head>
<body class="workspace-business">
<div id="toast"></div>
<datalist id="list_cust"></datalist><datalist id="list_staff"></datalist><datalist id="list_ft_staff"></datalist><datalist id="list_supplier"></datalist>

<div id="login-screen">
  <div class="login-box">
    <h1>點籽響管理系統</h1><br>
    <select id="login_role" style="width:100%;padding:10px;margin-bottom:10px;"><option value="admin">系統管理員</option><option value="staff">員工專區</option></select>
    <input type="text" id="login_acc" placeholder="帳號" style="width:100%;padding:10px;margin-bottom:10px;">
    <input type="password" id="login_pwd" placeholder="密碼" style="width:100%;padding:10px;margin-bottom:10px;">
    <button class="btn btn-success" style="width:100%" onclick="handleLogin()">登入</button>
  </div>
</div>

<div class="app-container" id="admin-screen">
  <div class="sidebar">
    <div style="padding:20px;text-align:center;font-weight:bold;color:#2d9d5c;border-bottom:1px solid #eee;">點籽響系統</div>
    <ul class="sidebar-nav">
      <li class="ws-business"><a onclick="showAdminPage('dashboard')">總覽儀表板</a></li>
      <li class="ws-business"><a onclick="showAdminPage('customer')">客戶資料</a></li>
      <li class="ws-business"><a onclick="showAdminPage('attend')">派遣記錄</a></li>
      <li class="ws-business"><a onclick="showAdminPage('salary')">派遣薪資</a></li>
      <li class="ws-business"><a onclick="showAdminPage('bill')">對帳單生成</a></li>
      <li class="ws-business"><a onclick="showAdminPage('boss')">老闆專區</a></li>
      <li class="ws-hr"><a onclick="showAdminPage('ft_staff')">正職員工</a></li>
      <li class="ws-hr"><a onclick="showAdminPage('ft_attend')">正職出勤</a></li>
      <li class="ws-hr"><a onclick="showAdminPage('ft_salary')">正職薪資</a></li>
      <li><a onclick="toggleWorkspace()" style="color:#3b82f6;">切換區域</a></li>
      <li><a onclick="logout()" style="color:#ef4444;">登出系統</a></li>
    </ul>
  </div>
  <div class="main-content">
    <div id="sync-status" style="float:right;font-size:12px;color:#888;"></div>
    <div class="page" id="page-customer">
      <h2>客戶資料管理</h2><br>
      <div class="filter-bar"><label>搜尋公司：</label><input list="list_cust" id="cust_filter_company" oninput="resetPage('customer'); renderCustTable()"></div>
      <div class="grid">
        <input id="c_name" placeholder="*客戶名稱"><input id="c_tel" placeholder="電話"><input id="c_addr" placeholder="地址">
        <select id="c_coop"><option>正合作</option><option>無合作</option></select>
      </div>
      <button class="btn btn-success" onclick="addCust()">新增客戶</button>
      <div style="overflow-x:auto;margin-top:20px;"><table id="customerTableBox"><thead><tr><th>狀態</th><th>公司名稱</th><th>電話</th><th>地址</th><th>操作</th></tr></thead><tbody id="custTable"></tbody></table></div>
    </div>
    <div class="page" id="page-attend">
      <h2>派遣記錄登記</h2><br>
      <div class="filter-bar">
        <input list="list_cust" id="filter_company" placeholder="搜尋公司" oninput="renderAttend()">
        <input list="list_staff" id="filter_staff" placeholder="搜尋人員" oninput="renderAttend()">
        <select id="filter_year" onchange="renderAttend()"></select><select id="filter_month" onchange="renderAttend()"></select>
      </div>
      <div class="grid">
        <input list="list_cust" id="attend_company" placeholder="*客戶公司">
        <input list="list_staff" id="attend_staff" placeholder="*派遣人員">
        <input type="date" id="attend_date">
        <input type="text" id="attend_service" placeholder="服務類型">
      </div>
      <div class="grid">
        <input type="text" id="am_s" placeholder="上午上班(0830)" onblur="formatTimeInput(this);calcAttendTemp()">
        <input type="text" id="am_e" placeholder="上午下班(1200)" onblur="formatTimeInput(this);calcAttendTemp()">
        <input type="text" id="pm_s" placeholder="下午上班(1300)" onblur="formatTimeInput(this);calcAttendTemp()">
        <input type="text" id="pm_e" placeholder="下午下班(1700)" onblur="formatTimeInput(this);calcAttendTemp()">
        <input type="number" id="attend_salary_hours" placeholder="發薪工時">
        <input type="number" id="attend_deduct_points" placeholder="扣除點數">
      </div>
      <button class="btn btn-success" onclick="addAttend()">儲存記錄</button>
      <div style="overflow-x:auto;margin-top:20px;"><table id="attendTableBox"><thead><tr><th>公司</th><th>人員</th><th>日期</th><th>工時</th><th>扣點</th><th>操作</th></tr></thead><tbody id="attendTable"></tbody></table></div>
    </div>
    <div class="page" id="page-boss">
      <h2>老闆專區 - 客戶工時統計</h2><br>
      <div class="filter-bar">
        <select id="boss_year" onchange="showBoss()"></select><select id="boss_month" onchange="showBoss()"></select>
        <input list="list_cust" id="boss_cust_filter" placeholder="搜尋客戶" oninput="showBoss()">
      </div>
      <table><thead><tr><th>客戶</th><th>合約點數</th><th>本月工時</th><th>剩餘點數</th><th>狀態</th></tr></thead><tbody id="bossTable"></tbody></table>
    </div>
    <div class="page" id="page-dashboard"><h2>儀表板</h2><div id="dash_content">載入中...</div></div>
    <div class="page" id="page-salary"><h2>派遣薪資計算</h2><div class="filter-bar"><input list="list_staff" id="sal_filter_staff" oninput="renderSalary()"><select id="sal_filter_year" onchange="renderSalary()"></select><select id="sal_filter_month" onchange="renderSalary()"></select></div><div id="salResult"></div><table id="salaryTableBox"><thead><tr><th>人員</th><th>日期</th><th>工時</th><th>金額</th></tr></thead><tbody id="salaryTable"></tbody></table></div>
    <div class="page" id="page-bill"><h2>對帳單生成</h2><div class="filter-bar"><input list="list_cust" id="bill_filter_company" oninput="renderBill()"><select id="bill_filter_year" onchange="renderBill()"></select><select id="bill_filter_month" onchange="renderBill()"></select></div><table id="billTableBox"><thead><tr><th>日期</th><th>人員</th><th>工時</th><th>扣點</th></tr></thead><tbody id="billTable"></tbody></table></div>
    <div class="page" id="page-ft_staff"><h2>正職員工管理</h2><button class="btn btn-success" onclick="showAdminPage('ft_staff')">更新名單</button><tbody id="ftStaffTable"></tbody></div>
    <div class="page" id="page-ft_attend"><h2>正職出勤紀錄</h2><div class="filter-bar"><input list="list_ft_staff" id="fta_filter_staff" oninput="renderFtAttendTable()"></div><tbody id="ftAttendTable"></tbody></div>
    <div class="page" id="page-ft_salary"><h2>正職薪資結算</h2><div class="filter-bar"><input list="list_ft_staff" id="fts_filter_staff" oninput="renderFtSalaryTable()"></div><tbody id="ftSalaryTable"></tbody></div>
  </div>
</div>

<div id="preview-overlay"><div id="preview-header-bar" style="background:#fff;padding:10px;text-align:center;"><button onclick="closePreview()" class="btn btn-warning">關閉預覽</button></div><div id="preview-body"></div></div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwTtT9kLu7OFl2zfxYhyWb94tVp6p-v3KIQYthcnwNE5mszbUDj7lm7Q7XS6LubWCjjXQ/exec';
const el = id => document.getElementById(id);
let custData=[], contractData=[], staffData=[], attendData=[], ftStaffData=[], ftAttendData=[], talentData=[], supplierData=[];
const pageConfig = { pageSize: 10, currentPage: { customer:1, attend:1 } };

// 🚀 核心邏輯：扣點等於工時
function calcAttendTemp(){
  const hs = (+getHours(el('am_s').value, el('am_e').value)) + (+getHours(el('pm_s').value, el('pm_e').value));
  if(hs > 0){
    el('attend_salary_hours').value = hs.toFixed(1);
    el('attend_deduct_points').value = hs.toFixed(1); // 4.5 還是 4.5
  }
}

function getHours(s,e){if(!s||!e)return 0;let[sh,sm]=s.split(':').map(Number);let[eh,em]=e.split(':').map(Number);return ((eh*60+em)-(sh*60+sm))/60;}
function getItemSalaryHours(i){ return i.salary_hours ? Number(i.salary_hours) : 0; }
function getItemDeductPoints(i){ return i.deduct_points ? Number(i.deduct_points) : 0; }

// 🚀 時間區間判定 (老闆專區用)
function isDispatchPayrollPeriod(d, y, m) {
  if(y==='all'||m==='all'||!y||!m) return true;
  if(!d) return false;
  let p=d.split('-'); 
  let rY=parseInt(p[0]), rM=parseInt(p[1]), rD=parseInt(p[2]);
  let tY=parseInt(y), tM=parseInt(m);
  let pY=tY, pM=tM-1; if(pM===0){pM=12; pY-=1;}
  if(rY===pY && rM===pM && rD>=26) return true;
  if(rY===tY && rM===tM && rD<=25) return true;
  return false;
}

// 🚀 搜尋名單更新 (Datalist)
function fillFilters() {
  let custH = '<option value="全部公司">'; custData.forEach(c=>custH+=`<option value="${c.name}">`);
  el('list_cust').innerHTML = custH;
  let staffH = '<option value="全部人員">'; staffData.forEach(s=>staffH+=`<option value="${s.name}">`);
  el('list_staff').innerHTML = staffH;
  let ftH = '<option value="全部員工">'; ftStaffData.forEach(s=>ftH+=`<option value="${s.name}">`);
  el('list_ft_staff').innerHTML = ftH;
  
  const y = new Date().getFullYear();
  let yr = '<option value="all">全部</option>'; for(let i=y-1;i<=y;i++) yr+=`<option value="${i}">${i}</option>`;
  document.querySelectorAll('#filter_year,#sal_filter_year,#bill_filter_year,#boss_year').forEach(e=>e.innerHTML=yr);
  let mh = '<option value="all">全部</option>'; for(let i=1;i<=12;i++) mh+=`<option value="${i}">${i}月</option>`;
  document.querySelectorAll('#filter_month,#sal_filter_month,#bill_filter_month,#boss_month').forEach(e=>e.innerHTML=mh);
}

// 🚀 頁面渲染：派遣記錄 (手打過濾)
function renderAttend() {
  const y=el('filter_year').value, m=el('filter_month').value, c=el('filter_company').value.trim(), s=el('filter_staff').value.trim();
  let l = attendData.filter(x => (y==='all'||x.date.startsWith(y)) && (m==='all'||x.date.slice(5,7)===String(m).padStart(2,'0')) && (!c||c==='全部公司'||x.company===c) && (!s||s==='全部人員'||x.staff===s));
  let h = '';
  l.forEach((item, idx) => {
    h += `<tr><td>${item.company}</td><td>${item.staff}</td><td>${item.date}</td><td>${getItemSalaryHours(item)}</td><td>${getItemDeductPoints(item)}</td><td><button onclick="delAttend(${idx})">刪</button></td></tr>`;
  });
  el('attendTable').innerHTML = h || '<tr><td colspan="6">無資料</td></tr>';
}

// 🚀 老闆專區：修復函數名與過濾
function showBoss() {
  const y=el('boss_year').value, m=el('boss_month').value, c=el('boss_cust_filter').value.trim();
  let h = '';
  custData.forEach(ct => {
    if(c && c!=='全部公司' && ct.name!==c) return;
    const cs = contractData.filter(x=>x.customer===ct.name);
    const totalP = cs.reduce((s,i)=>s+(+i.point||0),0);
    const usedH = attendData.filter(x=>x.company===ct.name && isDispatchPayrollPeriod(x.date,y,m)).reduce((s,i)=>s+getItemSalaryHours(i),0);
    const totalUsedP = attendData.filter(x=>x.company===ct.name).reduce((s,i)=>s+getItemDeductPoints(i),0);
    h += `<tr><td>${ct.name}</td><td>${totalP}</td><td>${usedH.toFixed(1)}</td><td>${(totalP-totalUsedP).toFixed(1)}</td><td>${ct.coop}</td></tr>`;
  });
  el('bossTable').innerHTML = h;
}

// 🚀 客戶分頁修正 ID
function renderCustTable() {
  const f=el('cust_filter_company').value.trim();
  let l = custData.filter(x => !f || f==='全部公司' || x.name===f);
  const {pagedList, total, totalPages} = getPagedData(l, 'customer');
  let h = '';
  pagedList.forEach((item, idx) => {
    h += `<tr><td>${item.coop}</td><td>${item.name}</td><td>${item.tel}</td><td>${item.addr}</td><td><button onclick="editCust(${idx})">改</button></td></tr>`;
  });
  el('custTable').innerHTML = h;
  renderPagination('customer', total, totalPages);
}

function renderPagination(m, t, tp) {
  const box = el(m === 'customer' ? 'customerTableBox' : 'attendTableBox');
  const old = box.parentNode.querySelector('.pagination'); if(old) old.remove();
  box.insertAdjacentHTML('afterend', `<div class="pagination"><span>第 ${pageConfig.currentPage[m]}/${tp} 頁</span><button onclick="changePage('${m}',${pageConfig.currentPage[m]+1})" ${pageConfig.currentPage[m]>=tp?'disabled':''}>下頁</button></div>`);
}

function handleLogin() {
  const acc=el('login_acc').value, pwd=el('login_pwd').value;
  if(acc==='admin' && pwd==='doclick888') { localStorage.setItem('loginRole','admin'); location.reload(); }
  else { showToast('登入失敗', true); }
}
function restoreLoginState() {
  const r=localStorage.getItem('loginRole'); if(!r) return;
  el('login-screen').style.display='none'; el('admin-screen').style.display='flex';
}
function logout() { localStorage.removeItem('loginRole'); location.reload(); }
function toggleWorkspace() { 
  const b = document.body;
  if(b.classList.contains('workspace-business')) { b.classList.replace('workspace-business','workspace-hr'); }
  else { b.classList.replace('workspace-hr','workspace-business'); }
}
function showAdminPage(p) { 
  document.querySelectorAll('.page').forEach(x=>x.classList.remove('active')); el('page-'+p).classList.add('active');
  if(p==='customer') renderCustTable(); if(p==='attend') renderAttend(); if(p==='boss') showBoss();
}
function showToast(m,e){ const t=el('toast'); t.innerHTML=m; t.style.background=e?'#ef4444':'#10b981'; t.style.display='block'; setTimeout(()=>t.style.display='none',2000); }
function updateSyncStatus(m){ el('sync-status').innerHTML=m; }
function formatTimeInput(e){ let v=e.value.replace(/\D/g,''); if(v.length>=3) e.value=v.slice(0,2)+':'+v.slice(2,4); }
function resetPage(m){ pageConfig.currentPage[m]=1; }
function changePage(m,p){ pageConfig.currentPage[m]=p; showAdminPage(m); }
function getPagedData(l,m){ let tp=Math.ceil(l.length/pageConfig.pageSize)||1; return {pagedList:l.slice((pageConfig.currentPage[m]-1)*10, pageConfig.currentPage[m]*10), totalPages:tp}; }

function loadDataFromCloud(){
  updateSyncStatus('同步中...');
  fetch(SCRIPT_URL).then(res=>res.json()).then(r=>{
    custData=r.custData||[]; staffData=r.staffData||[]; attendData=r.attendData||[]; contractData=r.contractData||[]; ftStaffData=r.ftStaffData||[];
    fillFilters(); showAdminPage('dashboard'); updateSyncStatus('已就緒');
  });
}
function saveAll(){
  updateSyncStatus('儲存中...');
  fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify({custData,staffData,attendData,contractData,ftStaffData}),headers:{'Content-Type':'text/plain;charset=utf-8'}})
  .then(()=>updateSyncStatus('已存檔'));
}
function addCust(){ custData.push({name:el('c_name').value, tel:el('c_tel').value, addr:el('c_addr').value, coop:el('c_coop').value}); saveAll(); renderCustTable(); }
function addAttend(){ attendData.push({company:el('attend_company').value, staff:el('attend_staff').value, date:el('attend_date').value, salary_hours:el('attend_salary_hours').value, deduct_points:el('attend_deduct_points').value, am_s:el('am_s').value, am_e:el('am_e').value, pm_s:el('pm_s').value, pm_e:el('pm_e').value}); saveAll(); renderAttend(); }
function delAttend(i){ attendData.splice(i,1); saveAll(); renderAttend(); }
function closePreview(){ el('preview-overlay').style.display='none'; }
function updateSystemClock(){ el('sync-status').title = new Date().toLocaleString(); }
</script>
</body>
</html>
