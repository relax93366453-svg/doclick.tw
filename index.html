<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>點籽響客戶及派遣管理系統</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
/* 全域基本樣式 [cite: 1] */
*{margin:0;padding:0;box-sizing:border-box;font-family:'Microsoft JhengHei',sans-serif}
body{background:#f4f7fb;color:#334155;line-height:1.6}
::-webkit-scrollbar{width:8px;height:8px}::-webkit-scrollbar-track{background:#f1f5f9}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:4px}

/* 登入介面 [cite: 1] */
#login-screen{display:flex;justify-content:center;align-items:center;height:100vh;background-color:#1e293b;position:fixed;top:0;left:0;width:100%;z-index:9998}
.login-box{background:rgba(255,255,255,.95);padding:45px 40px;border-radius:16px;box-shadow:0 25px 50px -12px rgba(0,0,0,.5);width:100%;max-width:420px;text-align:center;position:relative;z-index:1;border-top:6px solid #2d9d5c}
.login-logo-container{margin-bottom:20px;height:80px;display:flex;justify-content:center;align-items:center}
#login-logo-icon{font-size:50px;color:#2d9d5c}
.login-box h1{color:#1e293b;margin-bottom:5px;font-size:24px;font-weight:900}
.pro-badge{display:inline-block;background:linear-gradient(135deg,#f59e0b,#d97706);color:white;padding:5px 14px;border-radius:20px;font-size:12px;font-weight:bold;margin-bottom:25px}
.login-field{margin-bottom:18px;text-align:left}
.login-field label{display:block;margin-bottom:6px;font-weight:700;color:#475569;font-size:13px}
.login-field input,.login-field select{width:100%;padding:14px 16px;border:1px solid #cbd5e1;border-radius:8px;font-size:15px;outline:none}
.btn-login{width:100%;padding:16px;background:linear-gradient(135deg,#2d9d5c,#15803d);color:white;border:none;border-radius:8px;font-size:16px;font-weight:bold;cursor:pointer;margin-top:10px}

/* 主介面佈局 [cite: 1] */
.app-container,.staff-container{display:none;min-height:100vh}
.sidebar{width:240px;background-color:#fff;box-shadow:2px 0 15px rgba(0,0,0,.03);padding:20px 0;position:fixed;height:100vh;overflow-y:auto;z-index:10;border-right:1px solid #e2e8f0}
.sidebar-header{padding:0 20px 20px;border-bottom:1px solid #f1f5f9;margin-bottom:15px;text-align:center}
.sidebar-header h1{font-size:16px;color:#2d9d5c;font-weight:800}
.sidebar-nav{list-style:none;padding:0 10px}
.sidebar-nav li{margin:4px 0}
.sidebar-nav a{display:flex;align-items:center;gap:12px;padding:12px 15px;color:#64748b;text-decoration:none;border-radius:8px;cursor:pointer;font-weight:600}
.sidebar-nav a:hover,.sidebar-nav a.active{background-color:#ecfdf5;color:#2d9d5c}

.main-content{flex:1;margin-left:240px;padding:25px 35px;width:calc(100% - 240px);overflow-x:auto}
.page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:25px}
.sys-time{font-size:14px;font-weight:700;color:#334155;background:#fff;padding:8px 16px;border-radius:8px;border:1px solid #cbd5e1}

/* 頁面內容 [cite: 1, 2] */
.page{display:none;background:#fff;border-radius:12px;box-shadow:0 4px 6px -1px rgba(0,0,0,.05);padding:30px;margin-bottom:20px;border:1px solid #f1f5f9}
.page.active{display:block}
.filter-bar{background:#f8fafc;padding:15px 20px;border-radius:8px;margin-bottom:20px;display:flex;gap:15px;align-items:center;border:1px solid #e2e8f0}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:800px;background:#fff}
table th{padding:14px 12px;background:#f8fafc;font-weight:700;text-align:left;border-bottom:2px solid #e2e8f0}
table td{padding:12px 12px;border-bottom:1px solid #e2e8f0}
.badge{padding:4px 10px;border-radius:20px;font-size:12px;font-weight:700}
.badge-green{background:#dcfce7;color:#166534}.badge-red{background:#fee2e2;color:#991b1b}

/* 預覽區樣式 [cite: 2, 3] */
#toast{display:none;position:fixed;top:30px;right:30px;background:#10b981;color:#fff;padding:15px 25px;border-radius:8px;z-index:1000000;font-weight:bold}
#preview-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:99999;overflow-y:auto;padding:20px}
#preview-header-bar{background:#fff;padding:15px 25px;border-radius:8px;margin:0 auto 20px auto;max-width:850px;display:flex;justify-content:space-between;align-items:center}
#preview-body{max-width:850px;margin:0 auto;padding-bottom:40px}
.pdf-box{width:100%;max-width:794px;margin:0 auto;background:#fff;padding:35px;color:#333;font-family:'Microsoft JhengHei',sans-serif;text-align:left;box-shadow:0 5px 15px rgba(0,0,0,0.3)}
.pdf-box table{min-width:0 !important;}
</style>
</head>
<body>
<div id="toast"></div>

<div id="preview-overlay">
  <div id="preview-header-bar">
    <h3 id="preview-title" style="margin:0; color:#1e293b;">報表預覽</h3>
    <div style="display:flex;gap:8px;">
      <button onclick="doDownloadPdf(false)" class="btn-login" style="margin:0; padding:10px 20px; font-size:14px;">下載 PDF</button>
      <button onclick="closePreview()" class="btn-login" style="background:#64748b; margin:0; padding:10px 20px; font-size:14px;">關閉</button>
    </div>
  </div>
  <div id="preview-body"></div>
</div>

<div id="login-screen">
  <div class="login-box">
    <h1>點籽響管理系統</h1>
    <div class="pro-badge">專業企業版</div>
    <div class="login-field auth-input"><label>登入帳號</label><input type="text" id="login_acc" placeholder="請輸入帳號"></div>
    <div class="login-field auth-input"><label>登入密碼</label><input type="password" id="login_pwd" placeholder="請輸入密碼"></div>
    <button class="btn-login" onclick="handleLogin()">登入系統</button>
  </div>
</div>

<div class="app-container" id="admin-screen">
  <div class="sidebar">
    <div class="sidebar-header"><h1>管理後台</h1></div>
    <ul class="sidebar-nav">
      <li><a onclick="showAdminPage('bill')" class="active">對帳單生成</a></li>
      <li><a onclick="logout()">登出系統</a></li>
    </ul>
  </div>
  <div class="main-content">
    <div class="page-header"><span id="current-time" class="sys-time"></span></div>
    
    <div class="page active" id="page-bill">
      <div class="page-title">對帳單生成</div>
      <div class="filter-bar">
        <label>選擇客戶</label><select id="bill_filter_company" onchange="renderBill()"></select>
        <button class="btn-login" style="margin:0; padding:10px 20px; font-size:14px;" onclick="generateStatementPDF()">產生報表</button>
      </div>
      <div class="table-responsive"><table id="billTableBox"><thead><tr><th>日期</th><th>人員</th><th>項目</th><th>工時</th><th>扣點</th></tr></thead><tbody id="billTable"></tbody></table></div>
    </div>
  </div>
</div>

<script>
// --- 基礎變數與資料解析 [cite: 63, 65, 92] ---
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwTtT9kLu7OFl2zfxYhyWb94tVp6p-v3KIQYthcnwNE5mszbUDj7lm7Q7XS6LubWCjjXQ/exec';
const el = id => document.getElementById(id);
function safeJSONParse(k, f) { try { const v=localStorage.getItem(k); return v?JSON.parse(v):f; } catch(e) { return f; } }

let custData=safeJSONParse('custData',[]), contractData=safeJSONParse('contractData',[]), staffData=safeJSONParse('staffData',[]), attendData=safeJSONParse('attendData',[]);

// 🚀 核心優化：終極 PDF 下載引擎 (解決切邊/縮小問題) [cite: 100, 104, 114]
function doDownloadPdf(isCloud) {
  showToast('📄 正在處理，請稍後...');
  let d = window.currentPdfData;
  closePreview();

  // 1. 【清場】隱藏原本所有介面，避免側邊欄或解析度干擾 
  const hiddenElements = [];
  Array.from(document.body.children).forEach(child => {
      if (child.tagName !== 'SCRIPT' && child.tagName !== 'STYLE' && child.id !== 'toast') {
          hiddenElements.push({ el: child, display: child.style.display });
          child.style.display = 'none';
      }
  });

  const oldBg = document.body.style.background;
  const oldWidth = document.body.style.width;
  
  // 強制 Body 寬度固定為 A4 (約 800px) [cite: 102, 104]
  document.body.style.background = '#ffffff';
  document.body.style.width = '800px'; 
  document.body.style.overflow = 'visible';

  // 2. 建立專屬截圖容器，使用物理像素寬度 800 [cite: 103, 104]
  let c = document.createElement('div');
  c.id = 'pdf-export-box';
  c.style.cssText = 'width:800px; padding:40px; margin:0; background:#fff; color:#333; font-family:"Microsoft JhengHei",sans-serif; text-align:left; box-sizing:border-box; min-height:1122px;';
  
  c.innerHTML = `
    <style>
      #pdf-export-box table { width: 100% !important; border-collapse: collapse; margin-bottom: 20px; font-size: 14px; table-layout: fixed; word-break: break-all; }
      #pdf-export-box th, #pdf-export-box td { border: 1px solid #cbd5e1; padding: 10px; text-align: center; }
      #pdf-export-box th { background: #f1f5f9 !important; font-weight: bold; }
      #pdf-export-box .summary-table { background: #ecfdf5 !important; border: 1px solid #a7f3d0 !important; border-radius: 8px; margin-bottom: 25px; display: table; width: 100%; border-collapse: collapse; }
      #pdf-export-box .summary-table td { padding: 18px; border: none !important; border-right: 1px solid #d1fae5 !important; }
      #pdf-export-box .info-table { width: 100%; margin-bottom: 20px; border: none !important; }
      #pdf-export-box h2 { color: #2d9d5c; font-size: 28px; margin-bottom: 10px; }
    </style>
    <div class="pdf-inner-content">${d.contentHtml}</div>
  `;
  document.body.appendChild(c);
  window.scrollTo(0,0);
  
  // 3. 【關鍵】鎖定 windowWidth 參考寬度，這能防止大螢幕將內容壓縮至左側 
  let opt = { 
    margin: [10, 0, 10, 0], 
    filename: `${d.filename}.pdf`, 
    image: { type: 'jpeg', quality: 1 }, 
    html2canvas: { 
      scale: 2, 
      useCORS: true, 
      scrollY: 0,
      width: 800, // 截取區域寬度
      windowWidth: 800 // 強制模擬視窗寬度，這最重要
    }, 
    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } 
  };

  const finish = () => {
      if(document.body.contains(c)) document.body.removeChild(c);
      document.body.style.background = oldBg;
      document.body.style.width = oldWidth;
      hiddenElements.forEach(item => item.el.style.display = item.display);
  };

  setTimeout(() => {
      html2pdf().set(opt).from(c).save().then(() => { finish(); showToast('✅ 下載成功'); });
  }, 1000);
}

// 報表生成與對帳邏輯 [cite: 119, 120, 123]
function generateStatementPDF() {
  const cb = el('bill_filter_company').value;
  if(!cb) return showToast('請先選擇公司', true);
  
  const ci = custData.find(x=>x.name===cb);
  const ats = attendData.filter(x=>x.company===cb);
  
  let ah = '';
  ats.forEach(i => {
    ah += `<tr><td>${i.date}</td><td>${i.staff}</td><td>${i.service||'-'}</td><td>${i.salary_hours||0}</td><td>${i.deduct_points||0}</td></tr>`;
  });

  let c = `
    <h2>服務對帳單</h2>
    <table class="info-table"><tr><td><strong>客戶：</strong>${cb}</td><td style="text-align:right;"><strong>列印日期：</strong>${new Date().toLocaleDateString()}</td></tr></table>
    <table><thead><tr style="background:#f1f5f9;"><th>日期</th><th>人員</th><th>項目</th><th>工時</th><th>扣點</th></tr></thead><tbody>${ah||'<tr><td colspan="5">無紀錄</td></tr>'}</tbody></table>
  `;
  openPreview('對帳單', c, '', cb);
}

// --- 其餘系統功能輔助函數 ---
function handleLogin() {
  localStorage.setItem('loginRole','admin');
  restoreLoginState();
  showToast('登入成功');
}

function restoreLoginState() {
  if(localStorage.getItem('loginRole')) {
    el('login-screen').style.display='none';
    el('admin-screen').style.display='flex';
    fillFilters();
  }
}

function fillFilters() {
  let ch='<option value="">請選擇客戶</option>';
  custData.forEach(c=>ch+=`<option value="${c.name}">${c.name}</option>`);
  el('bill_filter_company').innerHTML = ch;
}

function openPreview(title, contentHtml, fUrl, filename) {
  el('preview-body').innerHTML = `<div class="pdf-box">${contentHtml}</div>`;
  el('preview-overlay').style.display = 'block';
  window.currentPdfData = { title, filename, contentHtml };
}

function closePreview() { el('preview-overlay').style.display = 'none'; }
function logout() { localStorage.clear(); location.reload(); }
function showToast(m, err=false) { 
  const t=el('toast'); t.style.display='block'; t.textContent=m; 
  setTimeout(()=>t.style.display='none', 3000); 
}

document.addEventListener('DOMContentLoaded', restoreLoginState);
</script>
</body>
</html>
