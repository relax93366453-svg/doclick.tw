function showToast(m, err = false) { const t=el('toast'); if(!t)return; t.style.background=err?'#ef4444':'#10b981'; t.innerHTML=m; t.style.display='block'; t.style.opacity='1'; setTimeout(()=>{t.style.opacity='0'; setTimeout(()=>t.style.display='none',300);}, 3500); }
function updateSyncStatus(m, err = false) { const e=el('sync-status'); if(!e)return; e.innerHTML=m; e.style.backgroundColor=err?'#fee2e2':'#f1f5f9'; e.style.color=err?'#dc2626':'#475569'; }
function safeJSONParse(k, f) { try { const v=localStorage.getItem(k); return v?JSON.parse(v):f; } catch(e) { return f; } }

function isDispatchPayrollPeriod(d, y, m, cycle = '26') { 
  if(y==='all'||m==='all'||!y||!m) return true; 
  if(!d) return false; 
  let p=d.split('-'); if(p.length!==3) return false;
  let rY=parseInt(p[0],10), rM=parseInt(p[1],10), rD=parseInt(p[2],10); 
  let tY=parseInt(y,10), tM=parseInt(m,10);
  if(cycle === '1') { return rY === tY && rM === tM; } 
  else {
    let pY=tY, pM=tM-1; if(pM===0){pM=12; pY-=1;} 
    if(rY===pY && rM===pM && rD>=26) return true; 
    if(rY===tY && rM===tM && rD<=25) return true;
    return false;
  }
}

function toRocDate(d) { return d || '-'; }
function formatTimeInput(e) { let v=e.value.replace(/[^0-9]/g,''); if(!v){e.value='';return;} if(v.length===1)v='0'+v+'00'; else if(v.length===2)v=v+'00'; else if(v.length===3)v='0'+v;
  else if(v.length>4)v=v.substring(0,4); let h=parseInt(v.substring(0,2)), m=parseInt(v.substring(2,4)); if(h>23)h=23; if(m>59)m=59; e.value=String(h).padStart(2,'0')+':'+String(m).padStart(2,'0'); }

let custData=safeJSONParse('custData',[]), contractData=safeJSONParse('contractData',[]), staffData=safeJSONParse('staffData',[]), attendData=safeJSONParse('attendData',[]), ftStaffData=safeJSONParse('ftStaffData',[]), ftAttendData=safeJSONParse('ftAttendData',[]), talentData=safeJSONParse('talentData',[]), supplierData=safeJSONParse('supplierData',[]);

function exportAllStaffHoursSummary() {
    const y = el('sal_filter_year').value, m = el('sal_filter_month').value;
    if(y === 'all' || m === 'all') return showToast('請選擇年份與月份', true);
    const activeStaffNames = [...new Set(attendData.filter(a => isDispatchPayrollPeriod(a.date, y, m)).map(a => a.staff))];
    if(activeStaffNames.length === 0) return showToast('該月份無派遣紀錄', true);
    let tb = document.createElement('table');
    let head = `<thead><tr><th colspan="7" style="font-size:18px;font-weight:bold;text-align:center;">調薪進度明細表 (${y}年${m}月)</th></tr><tr><th>姓名</th><th>方案</th><th>本月工時</th><th>歷史累計工時</th><th>目前時薪</th><th>下一階門檻</th><th>跳級金額</th></tr></thead><tbody>`;
    let body = '';
    activeStaffNames.forEach(name => {
        const monthlyRecords = attendData.filter(a => a.staff === name && isDispatchPayrollPeriod(a.date, y, m));
        const mHrs = monthlyRecords.reduce((sum, r) => sum + getItemSalaryHours(r), 0);
        const info = getStaffCurrentHourlyInfo(name);
        body += `<tr><td>${name}</td><td>${info.rule}</td><td>${mHrs.toFixed(1)}</td><td>${info.hours.toFixed(1)}</td><td>$${info.wage}</td><td>${info.nextTier === 'FIXED' ? '接案' : (info.nextTier || '無')}</td><td>${info.nextWage || '無'}</td></tr>`;
    });
    tb.innerHTML = head + body + '</tbody>';
    XLSX.writeFile(XLSX.utils.table_to_book(tb, {sheet: "進度明細"}), `愜易居_${y}年${m}月_派遣調薪進度明細.xlsx`);
    showToast('✅ 匯出成功');
}

function exportStaffYearlyMatrix() {
    const yInput = el('sal_filter_year').value;
    if(yInput === 'all') return showToast('請先選擇年份', true);
    const targetY = parseInt(yInput);
    const historyYears = [];
    for(let y = 2024; y < targetY; y++) historyYears.push(y);
    let tb = document.createElement('table');
    const totalCols = 2 + historyYears.length + 12 + 3;
    let head = `<thead><tr><th colspan="${totalCols}" style="font-size:20px;font-weight:bold;text-align:center;">${targetY}年度 全員派遣工時累計矩陣總表 (愜易居)</th></tr><tr><th>姓名</th><th>狀態</th>`;
    historyYears.forEach(hy => head += `<th style="background:#e0f2fe;">${hy}年累計</th>`);
    for(let i=1; i<=12; i++) head += `<th>${i}月</th>`;
    head += `<th style="background:#dcfce7;">最新總累計</th><th>時薪</th><th>跳級進度</th></tr></thead><tbody>`;
    let body = '';
    staffData.forEach(s => {
        const statusBadge = s.status === '在職' ? '在職' : '離職';
        body += `<tr><td>${s.name}</td><td>${statusBadge}</td>`;
        let allHistorySum = 0;
        historyYears.forEach(hy => {
            const hyHrs = attendData.filter(a => a.staff === s.name && a.date.startsWith(hy.toString())).reduce((sum, r) => sum + getItemSalaryHours(r), 0);
            body += `<td style="background:#f8fafc; text-align:center;">${hyHrs > 0 ? hyHrs.toFixed(1) : '0'}</td>`;
            allHistorySum += hyHrs;
        });
        let currentYearSum = 0;
        for(let m=1; m<=12; m++) {
            const hrs = attendData.filter(a => a.staff === s.name && isDispatchPayrollPeriod(a.date, targetY, m)).reduce((sum, r) => sum + getItemSalaryHours(r), 0);
            body += `<td style="text-align:center;">${hrs > 0 ? hrs.toFixed(1) : '0'}</td>`;
            currentYearSum += hrs;
        }
        const latestTotal = allHistorySum + currentYearSum;
        const info = getStaffCurrentHourlyInfo(s.name);
        let tierStatus = '';
        if(info.rule === '自訂' || info.rule === '接案') { tierStatus = '接案/固定'; } 
        else { tierStatus = info.nextTier && info.nextTier !== 'FIXED' ? '還差 ' + (info.nextTier - latestTotal).toFixed(1) + 'h 跳級' : '已最高級'; }
        body += `<td style="font-weight:bold; color:#2563eb; background:#dbeafe; text-align:center;">${latestTotal.toFixed(1)}</td><td style="color:#16a34a; font-weight:bold; text-align:center;">$${info.wage}</td><td style="white-space:nowrap; text-align:center;">${tierStatus}</td></tr>`;
    });
    tb.innerHTML = head + body + '</tbody>';
    XLSX.writeFile(XLSX.utils.table_to_book(tb, {sheet: "年度分欄總表"}), `愜易居_${targetY}年度_全員派遣工時累計表.xlsx`);
    showToast('✅ 年度分欄總表匯出成功');
}

function setupGlobalNavigation() {
    document.addEventListener('keydown', (e) => {
        const activePage = document.querySelector('.page.active');
        if (!activePage) return;
        const target = e.target;
        if (!target.matches('.grid input:not([readonly]):not([type="checkbox"]), .grid select, .grid textarea')) return;
        const inputs = Array.from(activePage.querySelectorAll('.grid input:not([readonly]):not([type="checkbox"]), .grid select, .grid textarea'));
        const idx = inputs.indexOf(target);
        if (idx === -1) return;
        const isDate = target.type === 'date';
        const isSelect = target.tagName === 'SELECT';
        const canSelect = ['text', 'password', 'search', 'tel', 'url'].includes(target.type) || !target.type;
        if (e.key === 'Enter') {
            e.preventDefault();
            if (idx === inputs.length - 1) {
                const saveBtn = activePage.querySelector('.btn-success[id^="btnAdd"]');
                if (saveBtn && saveBtn.style.display !== 'none') { saveBtn.click(); return; }
                const updateBtn = activePage.querySelector('.btn-warning[id^="btnUpdate"]');
                if (updateBtn && updateBtn.style.display !== 'none') { updateBtn.click(); return; }
            } else {
                const nextEl = inputs[idx + 1];
                if (nextEl) { nextEl.focus(); if (canSelect && nextEl.select) nextEl.select(); }
            }
        } else if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
            if (isSelect) return;
            if (isDate && e.key === 'ArrowRight') return; 
            if (e.key === 'ArrowRight' && target.tagName === 'INPUT' && canSelect && target.selectionEnd !== null && target.selectionEnd < target.value.length) return;
            e.preventDefault();
            const nextEl = inputs[idx + 1];
            if (nextEl) { nextEl.focus(); if (['text', 'password', 'search', 'tel', 'url'].includes(nextEl.type) || !nextEl.type) nextEl.select(); }
        } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
            if (isSelect) return;
            if (isDate && e.key === 'ArrowLeft') return;
            if (e.key === 'ArrowLeft' && target.tagName === 'INPUT' && canSelect && target.selectionStart !== null && target.selectionStart > 0) return;
            e.preventDefault();
            const prevEl = inputs[idx - 1];
            if (prevEl) { prevEl.focus(); if (['text', 'password', 'search', 'tel', 'url'].includes(prevEl.type) || !prevEl.type) prevEl.select(); }
        }
    });
}

function handleLogin() {
  const role=el('login_role').value, acc=el('login_acc').value.trim(), pwd=el('login_pwd').value.trim();
  if(!acc||!pwd) return showToast('請輸入帳密', true);
  const sAA=localStorage.getItem('adminAcc')||'admin', sAP=localStorage.getItem('adminPwd')||'1234', sHA=localStorage.getItem('hrAcc')||'hr', sHP=localStorage.getItem('hrPwd')||'1234';
  if (role === 'admin') {
    if ((acc===sAA&&pwd===sAP)||(acc==='admin'&&pwd==='doclick888')) { localStorage.setItem('loginRole','admin'); localStorage.setItem('workspace','business'); restoreLoginState(); showToast('登入成功'); } 
    else if ((acc===sHA&&pwd===sHP)||(acc==='hr'&&pwd==='doclick888')) { localStorage.setItem('loginRole','admin'); localStorage.setItem('workspace','hr'); restoreLoginState(); showToast('登入成功'); } 
    else showToast('帳密錯誤', true);
  } else {
    const s = staffData.find(x=>x&&String(x.account||'').trim()===acc&&String(x.pwd||'').trim()===pwd), fs = ftStaffData.find(x=>x&&String(x.account||'').trim()===acc&&String(x.pwd||'').trim()===pwd);
    if(s||fs) { currentLoginStaff=s||fs; localStorage.setItem('loginRole','staff'); localStorage.setItem('loginAcc',acc); restoreLoginState(); showToast('登入成功'); } 
    else showToast('帳密錯誤', true);
  }
}

function restoreLoginState() {
  try {
      const r=localStorage.getItem('loginRole'), a=localStorage.getItem('loginAcc');
      if(!r) { el('login-screen').style.display='flex'; el('admin-screen').style.display='none'; el('staff-screen').style.display='none'; return; }
      el('login-screen').style.display='none';
      if(r==='admin') {
        const sc=el('admin-screen'); sc.style.display='flex'; el('staff-screen').style.display='none';
        currentWorkspace=localStorage.getItem('workspace')||'business';
        if(currentWorkspace==='hr') { sc.classList.remove('workspace-business'); sc.classList.add('workspace-hr','mode-hr'); el('admin-sidebar-title-business').style.display='none'; el('admin-sidebar-title-hr').style.display='flex'; if(el('workspace-toggle-btn')) el('workspace-toggle-btn').innerHTML='<i class="fas fa-exchange-alt"></i> 切換至營業區'; } 
        else { sc.classList.remove('workspace-hr','mode-hr'); sc.classList.add('workspace-business'); el('admin-sidebar-title-business').style.display='flex'; el('admin-sidebar-title-hr').style.display='none'; if(el('workspace-toggle-btn')) el('workspace-toggle-btn').innerHTML='<i class="fas fa-exchange-alt"></i> 切換至人事區'; }
        fillFilters(); showAdminPage(localStorage.getItem('adminPage')||'dashboard');
      } else if(r==='staff') {
        el('staff-screen').style.display='flex'; el('admin-screen').style.display='none';
        if(!currentLoginStaff) currentLoginStaff = staffData.find(x=>x&&String(x.account||'').trim()===String(a||'').trim()) || ftStaffData.find(x=>x&&String(x.account||'').trim()===String(a||'').trim());
        initStaffFrontend();
        showStaffPage(localStorage.getItem('staffPage')||'home');
      }
  } catch(e) { el('login-screen').style.display='flex'; }
}

  attendData=(attendData||[]).filter(x=>x).map(x=>({company:x.company||'',staff:x.staff||'',date:x.date||'',service:x.service||'',remark:x.remark||'',am_s:x.am_s||'',am_e:x.am_e||'',pm_s:x.pm_s||'',pm_e:x.pm_e||'',salary_hours:x.salary_hours!==undefined?x.salary_hours:'',deduct_points:x.deduct_points!==undefined?x.deduct_points:'',special_hourly:x.special_hourly!==undefined?x.special_hourly:''}));

// ★ 實作五大計薪制度與特殊案例 ★
function getStaffCurrentHourlyInfo(name){
  const si=staffData.find(x=>x.name===name);
  if(!si)return {wage:210, nextTier:null, nextWage:null, hours:0, rule:'未知'};
  const h=getStaffTotalHours(name);
  const rule=si.salary_rule||'114年標準';
  const agreed=(si.remark||'').includes('已同意調薪');
  let w=Number(si.hourly)||0, nt=null, nw=null;

  if(rule==='自訂' || rule==='接案'){ w=Number(si.hourly)||0; return {wage:w, nextTier:'FIXED', nextWage:null, hours:h, rule:rule}; }

  if(rule==='114年標準' || rule==='標準階梯'){
    if(h<=175){w=210;nt=176;nw=220;}
    else if(h<=350){w=220;nt=351;nw=230;}
    else if(h<=525){w=230;nt=526;nw=240;}
    else if(h<=700){w=240;nt=701;nw=agreed?250:'250(需備註同意)';}
    else{w=agreed?250:240; if(!agreed){nt=701;nw='250(需備註同意)';}}
  }else if(rule==='早期約' || rule==='245起跳'){
    if(h<=700){w=245;nt=701;nw=agreed?250:'250(需備註同意)';}
    else{w=agreed?250:245; if(!agreed){nt=701;nw='250(需備註同意)';}}
  }else if(rule==='固定205'){
    if(h<=350){w=205;nt=351;nw=220;}
    else if(h<=700){w=220;nt=701;nw=agreed?245:'245(需備註同意)';}
    else{w=agreed?245:220; if(!agreed){nt=701;nw='245(需備註同意)';}}
  }else if(rule==='固定220'){
    if(h<=350){w=220;nt=351;nw=245;}
    else if(h<=700){w=245;nt=701;nw=agreed?250:'250(需備註同意)';}
    else{w=agreed?250:245; if(!agreed){nt=701;nw='250(需備註同意)';}}
  }else if(rule==='特殊225'){
    if(h<=350){w=225;nt=351;nw=245;}

// ★ 歷史紀錄時薪計算 ★
function getHistoricalRate(item) {
  if(item.special_hourly) return Number(item.special_hourly);
  const si=staffData.find(x=>x.name===item.staff);
  if(!si) return 210;
  const pastRecords = attendData.filter(x=>x.staff===item.staff && new Date(x.date) <= new Date(item.date));
  const h = pastRecords.reduce((sum, r) => sum + getItemSalaryHours(r), 0);
  const rule=si.salary_rule||'114年標準';
  const agreed=(si.remark||'').includes('已同意調薪');
  let w=Number(si.hourly)||0;
  
  if(rule==='自訂' || rule==='接案') return w;
  
  if(rule==='114年標準' || rule==='標準階梯'){
    if(h<=175) w=210; else if(h<=350) w=220; else if(h<=525) w=230; else if(h<=700) w=240; else w=agreed?250:240;
  }else if(rule==='早期約' || rule==='245起跳'){
    if(h<=700) w=245; else w=agreed?250:245;
  }else if(rule==='固定205'){
    if(h<=350) w=205; else if(h<=700) w=220; else w=agreed?245:220;
  }else if(rule==='固定220'){
    if(h<=350) w=220; else if(h<=700) w=245; else w=agreed?250:245;
  }else if(rule==='特殊225'){
    if(h<=350) w=225; else if(h<=700) w=245; else w=agreed?250:245;
  }
  if(w===0) w=210;
  return w;
}

// ★ 跨階預警系統與時數邏輯 ★
function checkHourlyUpgradeAlert() {
  const s = el('attend_staff').value.trim();
  const hInp = parseFloat(el('attend_salary_hours').value) || 0;
  const dInp = el('attend_date').value;
  const box = el('attend_upgrade_alert');
  if(!box) return;
  if(!s || hInp <= 0 || !dInp) { box.style.display = 'none'; return; }

  let cH = 0;
  let targetDate = new Date(dInp).getTime();
  attendData.forEach((r, idx) => {
      if(r.staff === s) {
          let rDate = new Date(r.date).getTime();
          if(rDate < targetDate) { cH += getItemSalaryHours(r); } 
          else if (rDate === targetDate) {
              if (editAttendIndex > -1 && idx < editAttendIndex) { cH += getItemSalaryHours(r); } 
              else if (editAttendIndex === -1) { cH += getItemSalaryHours(r); }
          }
      }
  });

  const si = staffData.find(x => x.name === s);
  if(!si) return;
  const rule = si.salary_rule || '114年標準';
  const agreed = (si.remark||'').includes('已同意調薪');
  let th = 0, oW = 0, nW = 0, nWText='';
  
  if(rule==='114年標準' || rule==='標準階梯'){
      if(cH<176 && cH+hInp>=176){th=175;oW=210;nW=220;nWText='220';}
      else if(cH<351 && cH+hInp>=351){th=350;oW=220;nW=230;nWText='230';}
      else if(cH<526 && cH+hInp>=526){th=525;oW=230;nW=240;nWText='240';}
      else if(cH<701 && cH+hInp>=701){th=700;oW=240;nW=agreed?250:240;nWText=agreed?'250':'250 (需備註同意調薪)';}
  }else if(rule==='早期約' || rule==='245起跳'){
      if(cH<701 && cH+hInp>=701){th=700;oW=245;nW=agreed?250:245;nWText=agreed?'250':'250 (需備註同意調薪)';}
  }else if(rule==='固定205'){
      if(cH<351 && cH+hInp>=351){th=350;oW=205;nW=220;nWText='220';}
      else if(cH<701 && cH+hInp>=701){th=700;oW=220;nW=agreed?245:220;nWText=agreed?'245':'245 (需備註同意調薪)';}
  }else if(rule==='固定220'){
      if(cH<351 && cH+hInp>=351){th=350;oW=220;nW=245;nWText='245';}
      else if(cH<701 && cH+hInp>=701){th=700;oW=245;nW=agreed?250:245;nWText=agreed?'250':'250 (需備註同意調薪)';}
  }else if(rule==='特殊225'){
      if(cH<351 && cH+hInp>=351){th=350;oW=225;nW=245;nWText='245';}
      else if(cH<701 && cH+hInp>=701){th=700;oW=245;nW=agreed?250:245;nWText=agreed?'250':'250 (需備註同意調薪)';}
  }

  if(th > 0 && cH <= th && cH + hInp > th) { 
      const h1 = (th - cH).toFixed(1); 
      const h2 = (hInp - parseFloat(h1)).toFixed(1);
      if (parseFloat(h1) === 0) {
          box.innerHTML = `<i class="fas fa-check-circle"></i> <b>升級通知：</b> 從此筆排班開始，${s} 的歷史總時數已達 <b>${th}h</b>，系統將自動套用下一階時薪 <b>$${nWText||nW}</b>！無須拆單。`;
          box.style.display = 'block'; return;
      } else if(parseFloat(h2) > 0) { 
          box.innerHTML = `<i class="fas fa-exclamation-circle"></i> <b>跨階預警：</b> 結算至此日，${s} 的總時數將從 <b>${cH.toFixed(1)}h</b> 變成 <b>${(cH+hInp).toFixed(1)}h</b>，正式跨越 <b>${th}h</b> 升級門檻！<br><span style="color:#059669; margin-top:5px; display:block;">💡 建議直接拆成兩筆登記以精準計薪：</span>1️⃣ 第一筆：工時填 <b>${h1}</b>，特殊時薪填 <b>${oW}</b> (備註: 跨階前)<br>2️⃣ 第二筆：工時填 <b>${h2}</b>，特殊時薪留空自動抓 <b>${nWText||nW}</b> (備註: 升級)`;
          box.style.display = 'block'; return;
      }
  }
  box.style.display = 'none';
}

function calculateMilestones(staffName, boxId, contentId) {
    const box = el(boxId);
    const content = el(contentId);
    if (!staffName || staffName === '全部人員') {
        if(box) box.style.display = 'none';
        return;
    }

    let records = attendData.filter(x => x.staff === staffName).sort((a, b) => new Date(a.date) - new Date(b.date));

    let cumulativeHours = 0;
    let milestones = { 175: null, 350: null, 525: null, 700: null };
    let mKeys = [175, 350, 525, 700];

    records.forEach(r => {
        let h = getItemSalaryHours(r);
        if (h > 0) {
            let prev = cumulativeHours;
            cumulativeHours += h;
            for (let k of mKeys) {
                if (prev < k && cumulativeHours >= k && !milestones[k]) {
                    milestones[k] = r.date;
                }
            }
        }
    });

    let html = '';
    mKeys.forEach(k => {
        let dateStr = milestones[k];
        if (dateStr) {
            html += `<div style="background:#fff; padding:10px 15px; border-radius:6px; border:1px solid #fca5a5; min-width:120px; box-shadow:0 2px 4px rgba(239,68,68,0.1);">
                        <div style="font-size:12px; color:#ef4444; font-weight:bold;">滿 ${k}h</div>
                        <div style="font-size:15px; color:#1e293b; font-weight:900; margin-top:4px;">${dateStr}</div>
                     </div>`;
        } else {
            html += `<div style="background:#f8fafc; padding:10px 15px; border-radius:6px; border:1px solid #e2e8f0; min-width:120px; opacity:0.8;">
                        <div style="font-size:12px; color:#94a3b8; font-weight:bold;">滿 ${k}h</div>
                        <div style="font-size:15px; color:#cbd5e1; font-weight:bold; margin-top:4px;">尚未達成</div>
                     </div>`;
        }
    });

    if(content) content.innerHTML = html;
    if(box) box.style.display = 'block';
}

function renderAttend(){ 
    const y=el('filter_year').value, m=el('filter_month').value, c=el('filter_company').value.trim(), s=el('filter_staff').value.trim();
    
    // 呼叫里程碑紅盒邏輯
    calculateMilestones(s, 'attend_milestoneRedBox', 'attend_milestoneContent');

    let l=attendData.filter(x=>{
        let matchCust = (!c || c==='全部' || x.company===c);
        let matchStaff = (!s || s==='全部人員' || x.staff===s);
        let matchDate = isDispatchPayrollPeriod(x.date, y, m);
        return matchCust && matchStaff && matchDate;
    });
    l.sort((a, b) => new Date(b.date) - new Date(a.date));
    let sumH = 0, sumP = 0;
    l.forEach(i => { sumH += getItemSalaryHours(i); sumP += getItemDeductPoints(i); });
    
    let accH = 0;
    let accHtml = '';
    if (s && s !== '全部人員') {
        let cutoffDate = '9999-12-31';
        if (y !== 'all' && m !== 'all') {
            cutoffDate = `${y}-${String(m).padStart(2,'0')}-25`;
        }
        accH = attendData.filter(x => x.staff === s && x.date <= cutoffDate).reduce((sum, i) => sum + getItemSalaryHours(i), 0);
        accHtml = `目前累積工時：<strong style="font-size:20px;color:#3b82f6;">${accH.toFixed(1)} h</strong> &nbsp; | &nbsp; `;
    }

    let sumEl = el('attend_summary');
    if(sumEl) {
        if(l.length > 0 && (y !== 'all' || m !== 'all' || (c && c !== '全部') || (s && s !== '全部人員'))) {
            let ptxt = '';
            if(y !== 'all' && m !== 'all') {
                let pm = parseInt(m) - 1, py = parseInt(y);
                if (pm === 0) { pm = 12; py -= 1; }
                ptxt = ` <span style="color:#64748b;font-size:13px;margin-left:10px;">(區間：${py}/${String(pm).padStart(2,'0')}/26 ~ ${y}/${String(m).padStart(2,'0')}/25)</span>`;
            }
            sumEl.style.display = 'flex';
            sumEl.innerHTML = `<span><i class="fas fa-info-circle"></i> 篩選結果共 ${l.length} 筆紀錄 ${ptxt}</span> <span style="font-size:15px;">${accHtml}發薪工時：<strong style="font-size:20px;color:#059669;">${sumH.toFixed(1)} h</strong> &nbsp; | &nbsp; 扣除點數：<strong style="font-size:20px;color:#dc2626;">${sumP.toFixed(1)} 點</strong></span>`;
        } else { sumEl.style.display = 'none'; }
    }
    
    const {pagedList,total,totalPages}=getPagedData(l,'attend'); 
    let h='';
    pagedList.forEach(item=>{ 
        const idx = attendData.indexOf(item); 
        const am = item.am_s&&item.am_e?`${item.am_s}-${item.am_e}`:'-'; 
        const pm = item.pm_s&&item.pm_e?`${item.pm_s}-${item.pm_e}`:'-';
        
        // 計算當下時薪，視覺化顯示
        const hr = getHistoricalRate(item);
        const hrDisplay = item.special_hourly ? `<span class="badge badge-yellow">${item.special_hourly} (特)</span>` : `<span style="color:#059669; font-weight:bold;">$${hr}</span>`;

        h+=`<tr><td>${item.company}</td><td>${item.staff}</td><td>${item.date}</td><td>${item.service||'-'}</td><td>${am}</td><td>${pm}</td><td>${getItemSalaryHours(item)}</td><td>${hrDisplay}</td><td><b class="red">${getItemDeductPoints(item)}</b></td><td>${item.remark||'-'}</td><td style="white-space:nowrap;"><button class="btn-sm btn-warning" onclick="editAttend(${idx})"><i class="fas fa-edit"></i></button> <button class="btn-sm btn-pdf" onclick="delAttend(${idx})"><i class="fas fa-trash"></i></button></td></tr>`; 
    });
    el('attendTable').innerHTML=h||'<tr><td colspan="11" style="text-align:center;">無資料</td></tr>'; 
    renderPagination('attend',total,totalPages); 
}

  el('dash_missing_docs_table').innerHTML=mH||'<tr><td colspan="3" style="text-align:center; color:#999; padding: 20px;">資料已繳齊</td></tr>';
  const td=new Date(), tS=td.getFullYear()+'-'+String(td.getMonth()+1).padStart(2,'0')+'-'+String(td.getDate()).padStart(2,'0');
  let tH=''; attendData.filter(x=>x.date===tS).forEach(i=>{ const am=i.am_s&&i.am_e?`${i.am_s}-${i.am_e}`:'', pm=i.pm_s&&i.pm_e?`${i.pm_s}-${i.pm_e}`:''; tH+=`<tr><td>${i.staff}</td><td>${i.company}</td><td>${[am,pm].filter(x=>x).join('/')||'-'}</td></tr>`; });
  el('dash_today_table').innerHTML=tH||'<tr><td colspan="3" style="text-align:center;color:#999;">本日無記錄</td></tr>';
  let bH=''; const cm=td.getMonth()+1; let bList = aA.filter(x => { if(!x.birthday) return false; let p = x.birthday.split(/[-/]/); return p.length >= 2 && parseInt(p[1],10) === cm; }).sort((a,b) => { let pA = a.birthday.split(/[-/]/), pB = b.birthday.split(/[-/]/); let dA = pA.length>=3 ? parseInt(pA[2],10) : 0, dB = pB.length>=3 ? parseInt(pB[2],10) : 0; return dA - dB; });

  let apH='';
  let tMs=td.getTime(); supplierData.forEach((s, idx) => { if(s.pay_date){ let pD=new Date(s.pay_date).getTime(), dD=Math.ceil((pD-tMs)/(1000*60*60*24)); if(dD<=7){ let st=dD<0?`<span class="badge badge-red">逾期 ${Math.abs(dD)} 天</span>`:(dD===0?`<span class="badge badge-red">今日到期</span>`:`<span class="badge badge-yellow">剩 ${dD} 天</span>`); apH+=`<tr><td style="font-weight:bold;">${s.name}</td><td>$${s.invoice_amt||0}</td><td>${s.pay_date}</td><td>${st}</td><td><button class="btn-sm btn-warning" onclick="showAdminPage('supplier'); setTimeout(()=>editSupplier(${idx}),300)"><i class="fas fa-eye"></i></button></td></tr>`; } } });

  if(el('dash_upgrade_table')) el('dash_upgrade_table').innerHTML=upH||'<tr><td colspan="5" style="text-align:center;color:#999;padding:20px;">近期無人即將調薪</td></tr>';

  if(el('dash_ins_alert_table')) el('dash_ins_alert_table').innerHTML = insH || '<tr><td colspan="5" style="text-align:center;color:#999;padding:20px;">本月無人需調整勞保級距</td></tr>';
